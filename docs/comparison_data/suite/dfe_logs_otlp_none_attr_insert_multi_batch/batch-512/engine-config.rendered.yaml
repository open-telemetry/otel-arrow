version: otel_dataflow/v1
policies:
  channel_capacity:
    control:
      node: 100
      pipeline: 100
    pdata: 100
  resources:
    core_allocation:
      type: core_set
      set:
        - start: 0
          end: 0
engine:
  telemetry:
    logs:
      level: info
groups:
  default:
    pipelines:
      main:
        nodes:
          receiver:
            type: urn:otel:receiver:otlp
            config:
              protocols:
                grpc:
                  listening_addr: 0.0.0.0:4317
                  wait_for_result: true
          processor:
            type: urn:otel:processor:attribute
            config:
              actions:
                - action: "insert"
                  key: "processing.engine"
                  value: "benchmark"
          exporter:
            type: urn:otel:exporter:otlp_grpc
            config:
              grpc_endpoint: http://backend-service:1235
              compression_method: null
        connections:
          - from: receiver
            to: processor
          - from: processor
            to: exporter