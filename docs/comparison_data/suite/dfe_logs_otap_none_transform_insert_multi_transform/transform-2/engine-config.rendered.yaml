version: otel_dataflow/v1
policies:
  channel_capacity:
    control:
      node: 100
      pipeline: 100
    pdata: 100
  resources:
    core_allocation:
      type: core_set
      set:
        - start: 0
          end: 0
engine:
  telemetry:
    logs:
      level: info
groups:
  default:
    pipelines:
      main:
        nodes:
          receiver:
            type: urn:otel:receiver:otap
            config:
              listening_addr: 0.0.0.0:4317
              response_stream_channel_size: 100
              max_concurrent_requests_per_stream: 64
              wait_for_result: true
              compression_method: null
          processor:
            type: urn:otel:processor:transform
            config:
              opl_query: 'logs | set attributes["processing.engine"] = "benchmark" | set attributes["processing.stage"] = "benchmark"'
          exporter:
            type: urn:otel:exporter:otap
            config:
              grpc_endpoint: http://backend-service:1235
              compression_method: none
              arrow:
                payload_compression: none
        connections:
          - from: receiver
            to: processor
          - from: processor
            to: exporter