receivers:
  otelarrow:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  attributes:
    actions:
      - key: processing.engine
        value: benchmark
        action: insert
      - key: processing.stage
        value: benchmark
        action: insert
      - key: processing.batch.id
        value: benchmark
        action: insert
      - key: processing.cluster
        value: benchmark
        action: insert

exporters:
  otelarrow:
    endpoint: 'backend-service:1235'
    compression: none
    tls:
      insecure: true
    arrow:
      payload_compression: none
      disabled: false
    sending_queue:
      enabled: True
      wait_for_result: True
      block_on_overflow: True
      sizer: requests
      queue_size: 100

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8086
  pipelines:
    logs/arrow:
      receivers: [otelarrow]
      processors: [attributes]
      exporters: [otelarrow]
    metrics/arrow:
      receivers: [otelarrow]
      exporters: [otelarrow]
    traces/arrow:
      receivers: [otelarrow]
      exporters: [otelarrow]