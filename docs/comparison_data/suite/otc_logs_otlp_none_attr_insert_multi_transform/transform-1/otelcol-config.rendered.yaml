receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  attributes:
    actions:
      - key: processing.engine
        value: benchmark
        action: insert

exporters:
  otlp:
    endpoint: 'backend-service:1235'
    compression: none
    tls:
      insecure: true
    sending_queue:
      enabled: True
      wait_for_result: True
      block_on_overflow: True
      sizer: requests
      queue_size: 100

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8086
  pipelines:
    logs:
      receivers: [otlp]
      processors: [attributes]
      exporters: [otlp]
    metrics:
      receivers: [otlp]
      exporters: [otlp]
    traces:
      receivers: [otlp]
      exporters: [otlp]