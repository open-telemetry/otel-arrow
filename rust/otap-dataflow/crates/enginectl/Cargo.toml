[package]
name = "otap-df-enginectl"
description = "Control CLI for the OTAP dataflow engine admin SDK"
version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true

[[bin]]
name = "df_enginectl"
path = "src/main.rs"

[lints]
workspace = true

[features]
default = ["crypto-ring"]
crypto-ring = ["otap-df-admin-api/crypto-ring", "dep:rustls", "rustls/ring"]
crypto-aws-lc = ["otap-df-admin-api/crypto-aws-lc", "dep:rustls", "rustls/aws_lc_rs"]
crypto-openssl = ["otap-df-admin-api/crypto-openssl", "dep:rustls", "dep:rustls-openssl"]

[dependencies]
otap-df-admin-api = { path = "../admin-api", default-features = false, features = ["http-client"] }
otap-df-config = { workspace = true }

clap = { workspace = true, features = ["derive", "env"] }
humantime = { workspace = true }
humantime-serde = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "time"] }
rustls = { workspace = true, optional = true }
rustls-openssl = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }
wiremock = { workspace = true }
