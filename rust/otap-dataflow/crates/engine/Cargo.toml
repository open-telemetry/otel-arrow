[package]
name = "otap-df-engine"
description = "Async pipeline engine"
version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
testing = []
jemalloc = ["dep:tikv-jemalloc-ctl", "dep:tikv-jemalloc-sys"]
jemalloc-testing = ["jemalloc"]
test-utils = []

[dependencies]
otap-df-channel = { workspace = true }
otap-df-pdata = { workspace = true }
otap-df-config = { workspace = true }
otap-df-state = { workspace = true }
otap-df-telemetry = { workspace = true }
otap-df-telemetry-macros = { workspace = true }

thiserror = { workspace = true }
serde_json = { workspace = true }
serde = { workspace = true }
tokio = { workspace = true }
linkme = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
flume = { workspace = true }
bitflags = { workspace = true }
bytemuck = { workspace = true }
bytes = { workspace = true }
smallvec = { workspace = true }
socket2 = { workspace = true }
uuid = { workspace = true }
once_cell = { workspace = true }
data-encoding = { workspace = true }
prost = { workspace = true }
byte-unit = { workspace = true }
cpu-time = { workspace = true }
memory-stats = { workspace = true }
nix = { workspace = true, features = ["resource"] }
parking_lot = { workspace = true }
futures-core = { workspace = true }
async-channel = { workspace = true }

[target.'cfg(not(windows))'.dependencies]
tikv-jemalloc-ctl = { workspace = true, optional = true }
tikv-jemalloc-sys = { workspace = true, optional = true }

[dev-dependencies]
otap-df-engine = { workspace = true, features = ["test-utils"] }

[target.'cfg(not(windows))'.dev-dependencies]
tikv-jemallocator = { workspace = true }
