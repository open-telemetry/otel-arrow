[package]
name = "otap-df-query-engine-playground"
version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Interactive web playground for executing OPL programs against OpenTelemetry data"

[[bin]]
name = "opl-playground"
path = "src/main.rs"

[dependencies]
arrow = { workspace = true, features = ["prettyprint"] }
axum = { workspace = true }
base64 = { workspace = true }
prost = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }

data_engine_parser_abstractions = { workspace = true }
otap-df-config = { workspace = true }
otap-df-pdata = { workspace = true, features = ["testing"] }
otap-df-query-engine = { workspace = true }
otap-df-query-engine-languages = { workspace = true }

[lints]
workspace = true
