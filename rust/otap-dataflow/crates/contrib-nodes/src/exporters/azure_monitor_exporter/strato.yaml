                        config:
                            bridge_options:
                                attributes_schema:
                                    options:
                                        allow_undefined_keys: true
                                    schema:
                                        TimeGenerated: DateTime
                            query: source | extend TimeGenerated = Timestamp, EventTime = Timestamp, HostName = Computer, SeverityLevel = case(SeverityLevel == 0, 'emergency', SeverityLevel == 1, 'alert', SeverityLevel == 2, 'critical', SeverityLevel == 3, 'error', SeverityLevel == 4, 'warning', SeverityLevel == 5, 'notice', SeverityLevel == 6, 'info', SeverityLevel == 7, 'debug', ''), Facility = case(Facility == 0, 'kern', Facility == 1, 'user', Facility == 2, 'mail', Facility == 3, 'daemon', Facility == 4, 'auth', Facility == 5, 'syslog', Facility == 6, 'lpr', Facility == 7, 'news', Facility == 8, 'uucp', Facility == 9, 'cron', Facility == 10, 'authpriv', Facility == 11, 'ftp', Facility == 12, 'ntp', Facility == 13, 'security', Facility == 14, 'console', Facility == 15, 'local0', Facility == 16, 'local1', Facility == 17, 'local2', Facility == 18, 'local3', Facility == 19, 'local4', Facility == 20, 'local5', Facility == 21, 'local6', Facility == 22, 'local7', ''), SyslogMessage = coalesce(Attributes['syslog.message'], Attributes['syslog.content'], '') | project-away Attributes['syslog.message'], Attributes['syslog.content']
