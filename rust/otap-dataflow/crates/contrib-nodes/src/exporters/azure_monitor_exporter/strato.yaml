                    CefFullyFormed/ms-cef-processor-kql:
                        type: urn:microsoft:processor:recordset_kql
                        config:
                            bridge_options:
                                attributes_schema:
                                    options:
                                        allow_undefined_keys: true
                                    schema:
                                        TimeGenerated: DateTime
                            query: source | extend SimplifiedDeviceAction = case(DeviceAction =~ 'permitted' or DeviceAction =~ 'est-allowed', 'Allow', DeviceAction =~ 'deny' or DeviceAction =~ 'denied', 'Deny', DeviceAction =~ 'discarded', 'Discarded', DeviceAction =~ 'teardown', 'Teardown', DeviceAction =~ 'dropping', 'Drop', DeviceAction), RemoteIP = case(CommunicationDirection =~ 'inbound', SourceIP, CommunicationDirection =~ 'outbound', DestinationIP, ''), RemotePort = case(CommunicationDirection =~ 'inbound', SourcePort, CommunicationDirection =~ 'outbound', DestinationPort, ''), TimeGenerated = Timestamp
