# Azure Monitor exporter, attribute passthrough mode.
#
# `schema.log_record_mapping.attributes: passthrough` emits every log record
# attribute as a top-level column (attribute key = column name). Keys are
# emitted verbatim, so each must already be a valid DCR column name. Attributes
# with no matching DCR column are dropped by that column at ingestion (the rest
# of the record is still ingested); the exporter reports no error.
#
# Passthrough covers log-record attributes only. Resource attributes, scope
# attributes, and top-level fields are emitted only when explicitly mapped.

version: otel_dataflow/v1

policies:
  channel_capacity:
    control:
      node: 100
      pipeline: 100
    pdata: 128

engine: {}

groups:
  default:
    pipelines:
      main:
        # Authentication comes from an extension: the exporter consumes a
        # `bearer_token_provider` capability bound to `azure_identity` below.
        extensions:
          azure_identity:
            type: "urn:microsoft:extension:azure_identity_auth"
            config:
              method: managed_identity   # or "development", "workload_identity"
              # For a user-assigned managed identity, set client_id.
              # client_id: "YOUR-USER-ASSIGNED-IDENTITY-CLIENT-ID"
              scope: "https://monitor.azure.com/.default"

        nodes:
          otlp-receiver:
            type: "urn:otel:receiver:otlp"
            config:
              protocols:
                grpc:
                  listening_addr: "0.0.0.0:4317"

          azure-monitor-exporter:
            type: "urn:microsoft:exporter:azure_monitor"
            # Bind the capability to the extension instance declared above.
            capabilities:
              bearer_token_provider: azure_identity
            config:
              # API configuration - Update with your actual values
              api:
                dcr_endpoint: "https://my-workspace.eastus-1.ingest.monitor.azure.com"
                stream_name: "Custom-MyTable_CL"
                dcr: "dcr-abc123"
                # Passthrough: each log attribute becomes its own top-level
                # column. Resource/scope/top-level fields are not emitted here.
                # The exporter auto-injects TimeGenerated from the record's
                # event time (unless mapped or passed through), so records
                # always carry a timestamp.
                schema:
                  log_record_mapping:
                    attributes: passthrough

        connections:
          - from: otlp-receiver
            to: azure-monitor-exporter
