# rust/otap-dataflow/crates/contrib-nodes/src/exporters/azure_monitor_exporter/otlp-ame-passthrough.yaml
# Azure Monitor Exporter Configuration using attribute passthrough mode.
#
# This configuration sets `schema.log_record_mapping.attributes` to the string
# `passthrough`. In this mode every log record attribute is emitted as-is into a
# single dynamic column named `Attributes` (attribute keys become JSON keys, so
# keys such as `service.name` need no sanitization and are never dropped).
#
# Only log attributes are emitted; resource attributes, scope attributes, and
# log-record top-level fields are not included unless you add explicit mappings
# alongside the passthrough entry.
#
# Your DCR/custom table must define a `dynamic` column named `Attributes` (plus
# the required `TimeGenerated` column). Use this when you don't want to enumerate
# every attribute as its own column.

version: otel_dataflow/v1

policies:
  channel_capacity:
    control:
      node: 100
      pipeline: 100
    pdata: 128

engine: {}

groups:
  default:
    pipelines:
      main:
        nodes:
          otlp-receiver:
            type: "urn:otel:receiver:otlp"
            config:
              protocols:
                grpc:
                  # Listen on all interfaces in container
                  listening_addr: "0.0.0.0:4317"

          azure-monitor-exporter:
            type: "urn:microsoft:exporter:azure_monitor"
            config:
              # API configuration - Update with your actual values
              api:
                dcr_endpoint: "https://my-workspace.eastus-1.ingest.monitor.azure.com"
                stream_name: "Custom-MyTable_CL"
                dcr: "dcr-abc123"
                # Attribute passthrough: emit all log attributes as-is into a
                # single dynamic column named `Attributes`. No resource/scope or
                # top-level field mappings are applied.
                schema:
                  log_record_mapping:
                    attributes: passthrough

              # Authentication configuration for AKS
              auth:
                # Use managed identity for AKS workloads
                method: "managedidentity"  # or "msi"

                # For user-assigned managed identity (common in AKS)
                client_id: "YOUR-USER-ASSIGNED-IDENTITY-CLIENT-ID"

                # OAuth scope for Azure Monitor
                scope: "https://monitor.azure.com/.default"

              # Heartbeat configuration (optional, disabled by default)
              heartbeat:
                enabled: false

        connections:
          - from: otlp-receiver
            to: azure-monitor-exporter
