# rust/otap-dataflow/crates/contrib-nodes/src/exporters/azure_monitor_exporter/otlp-ame-passthrough.yaml
# Azure Monitor Exporter Configuration using attribute passthrough mode.
#
# This configuration sets `schema.log_record_mapping.attributes` to the string
# `passthrough`. In this mode every log record attribute is emitted as-is as its
# own top-level "key": value column (the attribute key is the column name).
#
# Passthrough applies to log-record attributes only. Resource attributes, scope
# attributes, and top-level log-record fields are NOT passed through
# automatically; they are emitted only when explicitly mapped via
# resource_mapping / scope_mapping / log_record_mapping (which compose with
# passthrough). Attributes already mapped explicitly are skipped so they are not
# duplicated.
#
# WARNING - silent data loss: Azure Log Analytics only ingests columns defined in
# the DCR stream schema whose names follow the column-naming rules (letters,
# digits, underscores; must start with a letter or underscore). Attribute keys
# are emitted verbatim and are NOT sanitized, so a key such as "service.name"
# (or any key without a matching, validly-named DCR column) is silently dropped
# at ingestion. Map such attributes to valid column names explicitly.

version: otel_dataflow/v1

policies:
  channel_capacity:
    control:
      node: 100
      pipeline: 100
    pdata: 128

engine: {}

groups:
  default:
    pipelines:
      main:
        nodes:
          otlp-receiver:
            type: "urn:otel:receiver:otlp"
            config:
              protocols:
                grpc:
                  # Listen on all interfaces in container
                  listening_addr: "0.0.0.0:4317"

          azure-monitor-exporter:
            type: "urn:microsoft:exporter:azure_monitor"
            config:
              # API configuration - Update with your actual values
              api:
                dcr_endpoint: "https://my-workspace.eastus-1.ingest.monitor.azure.com"
                stream_name: "Custom-MyTable_CL"
                dcr: "dcr-abc123"
                # Attribute passthrough: emit each log attribute as-is as its own
                # top-level "key": value column. No resource/scope or top-level
                # field mappings are applied here.
                schema:
                  log_record_mapping:
                    attributes: passthrough

              # Authentication configuration for AKS
              auth:
                # Use managed identity for AKS workloads
                method: "managedidentity"  # or "msi"

                # For user-assigned managed identity (common in AKS)
                client_id: "YOUR-USER-ASSIGNED-IDENTITY-CLIENT-ID"

                # OAuth scope for Azure Monitor
                scope: "https://monitor.azure.com/.default"

              # Heartbeat configuration (optional, disabled by default)
              heartbeat:
                enabled: false

        connections:
          - from: otlp-receiver
            to: azure-monitor-exporter
