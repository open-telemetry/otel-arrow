# rust/otap-dataflow/crates/contrib-nodes/src/exporters/azure_monitor_exporter/otlp-ame-passthrough.yaml
# Azure Monitor Exporter Configuration using attribute passthrough mode.
#
# This configuration omits the `schema` block entirely. When `schema` is not
# provided, the exporter runs in attribute passthrough mode: every log record
# attribute is emitted as a JSON key/value pair using the attribute key as the
# column name. No field, resource, or scope mappings are applied.
#
# Use this when your DCR columns already match your OTel log record attribute
# names and you don't need explicit mappings.

version: otel_dataflow/v1

policies:
  channel_capacity:
    control:
      node: 100
      pipeline: 100
    pdata: 128

engine: {}

groups:
  default:
    pipelines:
      main:
        nodes:
          otlp-receiver:
            type: "urn:otel:receiver:otlp"
            config:
              protocols:
                grpc:
                  # Listen on all interfaces in container
                  listening_addr: "0.0.0.0:4317"

          azure-monitor-exporter:
            type: "urn:microsoft:exporter:azure_monitor"
            config:
              # API configuration - Update with your actual values
              api:
                dcr_endpoint: "https://my-workspace.eastus-1.ingest.monitor.azure.com"
                stream_name: "Custom-MyTable_CL"
                dcr: "dcr-abc123"
                # No `schema` block: passthrough mode is used. Every log record
                # attribute is written verbatim as a JSON key/value pair.

              # Authentication configuration for AKS
              auth:
                # Use managed identity for AKS workloads
                method: "managedidentity"  # or "msi"

                # For user-assigned managed identity (common in AKS)
                client_id: "YOUR-USER-ASSIGNED-IDENTITY-CLIENT-ID"

                # OAuth scope for Azure Monitor
                scope: "https://monitor.azure.com/.default"

              # Heartbeat configuration (optional, disabled by default)
              heartbeat:
                enabled: false

        connections:
          - from: otlp-receiver
            to: azure-monitor-exporter
