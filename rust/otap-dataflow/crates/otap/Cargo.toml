async-stream.workspace = true
humantime.workspace = true
weaver_semconv.workspace = true
weaver_resolved_schema.workspace = true
weaver_resolver.workspace = true
rand.workspace = true
reqwest = { workspace = true, features = ["rustls", "stream"] }
zip.workspace = true
tower = { workspace = true }
hyper-util = { workspace = true }
hyper = { workspace = true }
http-body-util = { workspace = true }
socket2 = { workspace = true }
ipnet = { workspace = true }
flate2 = { workspace = true }
zstd = { workspace = true }
url = { workspace = true }

# Azure feature dependencies (for object_store)
azure_identity = { workspace = true, optional = true }
azure_core = { workspace = true, optional = true,  features = ["reqwest"] }
rustls-native-certs = { workspace = true, optional = true }
arc-swap = { workspace = true, optional = true }
rustls = { workspace = true, optional = true }
rustls-pki-types = { workspace = true, optional = true }
tokio-rustls = { workspace = true, optional = true }
notify = { workspace = true, optional = true }

# Quiver persistence engine (durable buffer processor)
quiver = { package = "otap-df-quiver", path = "../quiver" }
blake3.workspace = true
byte-unit.workspace = true

[features]
test-utils = []
experimental-tls = ["dep:rustls", "dep:rustls-pki-types", "dep:tokio-rustls", "dep:rustls-native-certs", "tonic/tls-ring", "dep:arc-swap", "dep:notify"]
azure = ["object_store/azure", "object_store/cloud", "dep:azure_identity", "dep:azure_core"]
aws = ["object_store/aws", "object_store/cloud"]

[dev-dependencies]
flume.workspace = true
portpicker.workspace = true
pretty_assertions.workspace = true
tempfile.workspace = true
tokio-util.workspace = true
time.workspace = true
wiremock.workspace = true
rustls.workspace = true
tokio-rustls.workspace = true
rustls-pki-types.workspace = true
tokio-stream.workspace = true
otap-test-tls-certs.workspace = true
otap-df-engine = { path = "../engine", features = ["test-utils"] }
otap-df-state = { path = "../state" }
