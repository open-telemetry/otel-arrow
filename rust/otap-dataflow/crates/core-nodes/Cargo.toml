fluke-hpack.workspace = true
flume.workspace = true
otap-df-channel = { path = "../channel" }
otap-df-engine = { path = "../engine", features = ["test-utils"] }
otap-df-otap = { path = "../otap", features = ["test-utils", "crypto-ring"] }
