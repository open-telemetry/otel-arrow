# Engine-wide settings
settings:
  http_admin:
    bind_address: 127.0.0.1:23693

pipeline_groups:
  validation_test:
    pipelines:
      # ======================================================================
      # Validation pipeline to validate equivalence
      # ======================================================================
      validate1:
        quota:
          core_allocation:
            type: core_set
            set:
              - type: CoreRange
                start: 1
                end: 1
        nodes:
          suv_receiver:
            type: "urn:otel:otap:receiver"
            config:
              
              listening_addr: "127.0.0.1:19302"
              response_stream_channel_size: 256
              
          
          validation_exporter:
            type: "urn:otel:validation:exporter"
            config:
              control_inputs: 
              
              suv_input: suv_receiver
              validations:
                - type: signal_drop
                  min_drop_ratio: null
                  max_drop_ratio: null
                - type: attribute_require_key_value
                  domains:
                  - signal
                  pairs:
                  - key: ios.app.state
                    value: active
        connections:
        - from: suv_receiver
          to: validation_exporter
        

      # ======================================================================
      # System Under Validation pipeline
      # ======================================================================
      suv:
        quota:
          core_allocation:
            type: core_set
            set:
              - type: CoreRange
                start: 0
                end: 0
        nodes:
          receiver:
            type: urn:otel:otlp:receiver
            config:
              protocols:
                grpc:
                  listening_addr: 127.0.0.1:23013
          filter:
            type: urn:otel:filter:processor
            config:
              logs:
                include:
                  match_type: strict
                  record_attributes:
                  - key: ios.app.state
                    value: active
          exporter:
            type: urn:otel:otap:exporter
            config:
              grpc_endpoint: http://127.0.0.1:19302
              compression_method: none
              arrow:
                payload_compression: none
        connections:
        - from: receiver
          to: filter
        - from: filter
          to: exporter

      # ======================================================================
      # Pipeline generating traffic
      # ======================================================================

      traffic_gen1:
        quota:
          core_allocation:
            type: core_set
            set:
              - type: CoreRange
                start: 2
                end: 2

        nodes:
          receiver:
            type: "urn:otel:traffic_generator:receiver"
            config:
              traffic_config:
                max_signal_count: 500
                max_batch_size: 100
                signals_per_second: 100
                metric_weight: 0
                trace_weight: 0
                log_weight: 100
              registry_path: https://github.com/open-telemetry/semantic-conventions.git[model]

          fanout:
            type: "urn:otel:fanout_temp:processor"
            outputs: 
              - "suv_port"
            config:
          suv_exporter:
            type: "urn:otel:otlp:exporter"
            config:
              grpc_endpoint: "http://127.0.0.1:23013"

        connections:
        - from: receiver
          to: fanout
        - from: fanout["suv_port"]
          to: suv_exporter
