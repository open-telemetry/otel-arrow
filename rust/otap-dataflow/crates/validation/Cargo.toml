[package]
name = "otap-df-validation"
description = "Performs validation for encoding/decoding and pipelines with OTLP/OTAP requests"
version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
linkme = { workspace = true }
serde = { workspace = true }
serde_yaml = { workspace = true }
serde_json = { workspace = true }
tokio-util = { workspace = true }
tokio = { workspace = true }
portpicker = { workspace = true }
humantime-serde = { workspace = true }

testcontainers = { workspace = true }
minijinja = { workspace = true }

otap-df-admin-api = { workspace = true }
otap-df-engine = { workspace = true }
otap-df-channel = { workspace = true }
otap-df-config = { workspace = true }
otap-df-core-nodes = { workspace = true, features = ["dev-tools"] }
otap-df-pdata = { workspace = true, features = ["testing"] }
otap-df-telemetry = { workspace = true }
otap-df-telemetry-macros = { workspace = true }
otap-df-otap = { workspace = true }
otap-df-controller = { workspace = true }
prost = { workspace = true }

[features]
experimental-tls = ["otap-df-otap/experimental-tls", "otap-df-core-nodes/experimental-tls"]
crypto-ring = ["otap-df-otap/crypto-ring"]
crypto-aws-lc = ["otap-df-otap/crypto-aws-lc"]
crypto-openssl = ["otap-df-otap/crypto-openssl"]

[dev-dependencies]
tempfile = { workspace = true }
wiremock = { workspace = true }
otap-test-tls-certs = { workspace = true }
weaver_common = { workspace = true }
weaver_forge = { workspace = true }
weaver_resolved_schema = { workspace = true }
weaver_resolver = { workspace = true }
weaver_semconv = { workspace = true }
