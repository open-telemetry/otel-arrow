nodes:
  receiver:
    type: "receiver:otlp"
    config:
      protocols:
        grpc:
          listening_addr: 127.0.0.1:4317

  exporter:
    type: "exporter:otap"
    config:
      grpc_endpoint: http://127.0.0.1:4318
      compression_method: none
      arrow:
        payload_compression: none
connections:
  - from: receiver
    to: exporter
