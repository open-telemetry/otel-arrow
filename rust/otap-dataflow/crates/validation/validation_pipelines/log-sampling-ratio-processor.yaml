nodes:
  receiver:
    type: "urn:otel:receiver:otlp"
    config:
      protocols:
        grpc:
          listening_addr: 127.0.0.1:4317
  ratio_sampler:
    type: "urn:otel:processor:log_sampling"
    config:
      policy:
        ratio:
          emit: 1
          out_of: 10
  exporter:
    type: "urn:otel:exporter:otap"
    config:
      grpc_endpoint: http://127.0.0.1:4318
      compression_method: none
      arrow:
        payload_compression: none
connections:
  - from: receiver
    to: ratio_sampler
  - from: ratio_sampler
    to: exporter
