nodes:
  receiver:
    type: "urn:otel:receiver:otlp"
    config:
      protocols:
        grpc:
          listening_addr: 127.0.0.1:4317
  transform:
    type: "urn:otel:processor:transform"
    config:
      opl_query: 'logs | exclude attributes["thread.id"]'
  exporter:
    type: "urn:otel:exporter:otap"
    config:
      grpc_endpoint: http://127.0.0.1:4318
      compression_method: none
      arrow:
        payload_compression: none
connections:
  - from: receiver
    to: transform
  - from: transform
    to: exporter
