[package]
name = "otap-df-query-engine"
version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true

[dependencies]
arrow = { workspace = true, features = ["prettyprint"] }
async-trait = { workspace = true }
datafusion = { workspace = true, features = [
    "crypto_expressions",
    "unicode_expressions",
] }
futures-core = { workspace = true }
memchr = { workspace = true }
paste = { workspace = true }
parking_lot = { workspace = true }
smallvec = { workspace = true }
thiserror = { workspace = true }
data_engine_expressions = { workspace = true }
data_engine_parser_abstractions = { workspace = true }

otap-df-pdata = { workspace = true, features = ["testing"] }

[dev-dependencies]
criterion = { workspace = true, features = ["async_tokio"] }
data_engine_kql_parser = { workspace = true }
data_engine_parser_abstractions = { workspace = true }
pretty_assertions = { workspace = true }
prost = { workspace = true }
tokio = { workspace = true }

otap-df-opl = { workspace = true }
otap-df-pdata = { workspace = true, features = ["testing"] }

[target.'cfg(not(windows))'.dev-dependencies]
tikv-jemallocator.workspace = true

[[bench]]
name = "filter"
harness = false

[[bench]]
name = "assign_attributes"
harness = false

[lints]
workspace = true
