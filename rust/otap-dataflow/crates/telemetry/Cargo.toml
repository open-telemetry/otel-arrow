[package]
name = "otap-df-telemetry"
description = "Type-safe and NUMA-aware internal telemetry system (ITS)"
version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
publish.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
testing = []
unsafe-optimizations = ["unchecked-index", "unchecked-arithmetic"]
unchecked-index = []
unchecked-arithmetic = []

[dependencies]
otap-df-pdata = { workspace = true }
otap-df-config = { workspace = true }
otap-df-pdata-views = { workspace = true }
otap-df-telemetry-macros = { workspace = true }

bytes = { workspace = true }
chrono = { workspace = true }
flume = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
slotmap = { workspace = true }
parking_lot = { workspace = true }
prost = { workspace = true }
serde = { workspace = true }
smallvec = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter","registry", "std", "fmt"] }

[dev-dependencies]
tempfile = { workspace = true }
otap-df-pdata = { workspace = true, features = ["testing"] }
