version: otel_dataflow/v1

# Topic-based variant of continuous_benchmark.yaml.
# This configuration keeps the same high-level benchmark shape (traffic
# generators -> SUT -> backend) but replaces OTLP/gRPC inter-pipeline transport
# with in-memory topics for direct performance comparison.
#
# Runtime CLI overrides:
# - --num-cores / --core-id-range override top-level
#   `policies.resources.core_allocation`.
# - Pipeline/group-level `policies.resources` still take precedence over that
#   top-level value.
# - --http-admin-bind overrides `engine.http_admin.bind_address`.

policies:
  channel_capacity:
    control:
      node: 256
      pipeline: 256
    pdata: 128
  health: {}
  telemetry:
    pipeline_metrics: true
    tokio_metrics: true
    channel_metrics: true
  resources:
    core_allocation:
      type: all_cores

engine:
  http_admin:
    bind_address: 127.0.0.1:8085
  telemetry:
    logs:
      level: info

  observability:
    pipeline:
      nodes:
        itr:
          type: internal_telemetry:receiver
          config: {}
        sink:
          type: noop:exporter
          config: null
      connections:
        - from: itr
          to: sink

groups:
  continuous_benchmark_topics:
    policies:
      channel_capacity:
        control:
          node: 256
          pipeline: 256
        pdata: 128

    # Topic declarations shared by all pipelines in this benchmark group.
    # These three topics replace the two ingress gRPC sockets and one backend
    # gRPC export socket used in continuous_benchmark.yaml.
    topics:
      ingress_1:
        description: "Traffic generator 1 -> SUT ingress"
        policies:
          queue_capacity: 4096
          queue_on_full: block
      ingress_2:
        description: "Traffic generator 2 -> SUT ingress"
        policies:
          queue_capacity: 4096
          queue_on_full: block
      backend_logs:
        description: "SUT logs output -> backend ingest"
        policies:
          queue_capacity: 4096
          queue_on_full: block

    pipelines:
      # ======================================================================
      # Traffic generation pipelines
      # ======================================================================

      traffic_gen1:
        policies:
          resources:
            core_allocation:
              type: core_count
              count: 15

        nodes:
          receiver:
            type: traffic_generator:receiver
            config:
              data_source: static
              generation_strategy: pre_generated
              traffic_config:
                signals_per_second: 150000
                max_signal_count: null
                metric_weight: 0
                trace_weight: 0
                log_weight: 30
          to_topic:
            type: topic:exporter
            config:
              topic: ingress_1
              queue_on_full: block

        connections:
          - from: receiver
            to: to_topic

      traffic_gen2:
        policies:
          resources:
            core_allocation:
              type: core_set
              set:
                - start: 21
                  end: 35

        nodes:
          receiver:
            type: traffic_generator:receiver
            config:
              traffic_config:
                signals_per_second: 100000
                max_signal_count: null
                metric_weight: 0
                trace_weight: 0
                log_weight: 30
              registry_path: https://github.com/open-telemetry/semantic-conventions.git[model]
          to_topic:
            type: topic:exporter
            config:
              topic: ingress_2
              queue_on_full: block

        connections:
          - from: receiver
            to: to_topic

      # ======================================================================
      # System Under Test pipeline
      # ======================================================================
      sut:
        policies:
          resources:
            core_allocation:
              type: core_set
              set:
                - start: 0
                  end: 1

        nodes:
          topic_recv1:
            type: topic:receiver
            config:
              topic: ingress_1
              subscription:
                mode: balanced
                group: sut_ingress_1
          topic_recv2:
            type: topic:receiver
            config:
              topic: ingress_2
              subscription:
                mode: balanced
                group: sut_ingress_2

          router:
            type: type_router:processor
            outputs: ["logs", "metrics", "traces"]
            config: {}

          retry:
            type: retry:processor
            config:
              multiplier: 1.5

          logs_to_topic:
            type: topic:exporter
            config:
              topic: backend_logs
              queue_on_full: block

          metrics_exporter:
            type: noop:exporter
            config: null

          spans_exporter:
            type: noop:exporter
            config: null

        connections:
          - from: topic_recv1
            to: router
          - from: topic_recv2
            to: router
          - from: router["logs"]
            to: retry
          - from: router["metrics"]
            to: metrics_exporter
          - from: router["traces"]
            to: spans_exporter
          - from: retry
            to: logs_to_topic

      # ======================================================================
      # Backend pipeline
      # ======================================================================
      backend:
        policies:
          resources:
            core_allocation:
              type: core_set
              set:
                - start: 1
                  end: 1

        nodes:
          from_topic:
            type: topic:receiver
            config:
              topic: backend_logs
              subscription:
                mode: balanced
                group: backend_workers

          perf_noop:
            type: noop:exporter
            config: null

        connections:
          - from: from_topic
            to: perf_noop
