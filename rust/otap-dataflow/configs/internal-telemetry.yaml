version: otel_dataflow/v1
policies:
  channel_capacity:
    control:
      node: 256
      pipeline: 256
    pdata: 128
  telemetry:
    runtime_metrics: detailed
engine:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              type: prometheus
              config:
                host: "0.0.0.0"
                port: 9090
                path: "/metrics"
    logs:
      level: "info"
      providers:
        global: its
        engine: its
        internal: console_direct
        admin: its
    resource:
      service.id: 1234
      service.name: test
  observability:
    pipeline:
      policies:
        channel_capacity:
          control:
            node: 64
            pipeline: 64
          pdata: 64
        telemetry:
          pipeline_metrics: false
          tokio_metrics: false
          runtime_metrics: detailed
      # Internal telemetry pipeline
      # Runs on a single thread (controller-managed) and can use dedicated policies.
      nodes:
        telemetry:
          type: "receiver:internal_telemetry"
          config: {}
        console:
          type: "exporter:console"
          config: {}
      connections:
        - from: telemetry
          to: console
groups:
  default:
    pipelines:
      main:
        policies:
          channel_capacity:
            control:
              node: 200
              pipeline: 200
            pdata: 20
        nodes:
          generator:
            type: receiver:traffic_generator
            config:
              traffic_config:
                max_signal_count: 100000
                max_batch_size: 1000
                signals_per_second: 1000
                log_weight: 100
              registry_path: https://github.com/open-telemetry/semantic-conventions.git[model]
            entity:
              extend:
                identity_attributes:
                  pipeline_name:
                    value: "MyCustomPipelineName"
                    brief: "Custom pipeline name for identification"
                  node_sequence: 1
          debug:
            type: processor:debug
            config:
              verbosity: basic
            entity:
              extend:
                identity_attributes:
                  pipeline_name:
                    value: "MyCustomPipelineName"
                    brief: "Custom pipeline name for identification"
                  node_sequence: 2
          noop:
            type: exporter:noop
            config: {}
            entity:
              extend:
                identity_attributes:
                  pipeline_name:
                    value: "MyCustomPipelineName"
                    brief: "Custom pipeline name for identification"
                  node_sequence: 3
        connections:
          - from: generator
            to: debug
          - from: debug
            to: noop
