version: otel_dataflow/v1
engine:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 9090
                path: "/metrics"
    resource:
      service.name: "test-component-metrics"
groups:
  default:
    pipelines:
      main:
        policies:
          channel_capacity:
            control:
              node: 100
              pipeline: 100
            pdata: 128
          telemetry:
            pipeline_metrics: true
            tokio_metrics: false
            channel_metrics: true
            # Test: set component_metrics to detailed level
            component_metrics: detailed

        nodes:
          receiver:
            type: receiver:traffic_generator
            config:
              traffic_config:
                max_signal_count: 100
                max_batch_size: 10
                signals_per_second: 10
                log_weight: 100
              registry_path: https://github.com/open-telemetry/semantic-conventions.git[model]
          debug:
            type: processor:debug
            config:
              verbosity: detailed
          noop:
            type: exporter:noop
            config:

        connections:
          - from: receiver
            to: debug
          - from: debug
            to: noop
