# Low-memory variant: OTLP receiver → batch processor → noop exporter
#
# Compared to otlp-batch-noop.yaml:
#   - pdata channel: 128 → 8
#   - max_concurrent_requests: auto(128) → 8 (match channel)
#   - batch otlp min_size: 65536 → 32768 (flush sooner, hold less)
#   - batch flush_timeout: 3s → 1s (flush sooner on low traffic)

version: otel_dataflow/v1
engine:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: "172.16.0.4"
                port: 9090
                path: "/metrics"
groups:
  default:
    pipelines:
      main:
        policies:
          channel_capacity:
            control:
              node: 100
              pipeline: 100
            pdata: 8

        nodes:
          receiver:
            type: receiver:otlp
            config:
              protocols:
                grpc:
                  listening_addr: "127.0.0.1:4317"
                  max_concurrent_requests: 8

          batch:
            type: processor:batch
            config:
              otap:
                min_size: 1000
                sizer: items
              otlp:
                min_size: 32768
                sizer: bytes
              format: preserve
              flush_timeout: 1s

          noop:
            type: exporter:noop
            config:

        connections:
          - from: receiver
            to: batch
          - from: batch
            to: noop
