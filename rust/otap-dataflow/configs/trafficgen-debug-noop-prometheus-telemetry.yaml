version: otel_dataflow/v1
# Internal metrics are exposed by the admin server at the fixed
# /api/v1/metrics path. Receiver metric views do not apply to this endpoint.
engine:
  http_admin:
    bind_address: "0.0.0.0:9090"
  telemetry:
    resource:
      service.name: "trafficgen-debug-noop-service"
groups:
  default:
    pipelines:
      main:
        policies:
          channel_capacity:
            control:
              node: 100
              pipeline: 100
            pdata: 128

        nodes:
          receiver:
            type: receiver:traffic_generator
            config:
              traffic_config:
                max_signal_count: 1000
                max_batch_size: 1000
                signals_per_second: 1000
                log_weight: 100
              registry_path: https://github.com/open-telemetry/semantic-conventions.git[model]
          debug:
            type: processor:debug
            config:
              verbosity: basic
          noop:
            type: exporter:noop
            config:

        connections:
          - from: receiver
            to: debug
          - from: debug
            to: noop
