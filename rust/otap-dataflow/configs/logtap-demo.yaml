version: otel_dataflow/v1

engine:
  http_admin:
    bind_address: "127.0.0.1:8080"

  telemetry:
    logs:
      level: "debug"
      providers:
        global: its
        engine: its
        internal: noop
        admin: console_direct
      tap:
        enabled: true
        max_entries: 2048
        max_bytes: 10485760  # 10 MiB

  # The internal telemetry pipeline is required: receiver:internal_telemetry
  # consumes the ITS log channel and calls log_tap.record() for each event,
  # which is what populates the ring buffer queried by the admin log-stream API.
  observability:
    pipeline:
      nodes:
        telemetry:
          type: "receiver:internal_telemetry"
          config: {}
        noop:
          type: "exporter:noop"
          config: {}
      connections:
        - from: telemetry
          to: noop

groups:
  default:
    pipelines:
      main:
        policies:
          channel_capacity:
            control:
              node: 100
              pipeline: 100
            pdata: 128

        nodes:
          receiver:
            type: receiver:traffic_generator
            config:
              traffic_config:
                max_batch_size: 50
                signals_per_second: 10
                log_weight: 100
              registry_path: https://github.com/open-telemetry/semantic-conventions.git[model]
          debug:
            type: processor:debug
            config:
              verbosity: basic
          noop:
            type: exporter:noop
            config:

        connections:
          - from: receiver
            to: debug
          - from: debug
            to: noop
