# platform: windows-only
# ETW to Console pipeline
#
# Subscribes to Windows ETW providers and prints events to the console.
#
# Usage (run as Administrator for ETW access):
#   cargo run --features etw-receiver -- -c configs/etw-console.yaml
#
# The receiver captures raw ETW events from the configured providers
# and emits summary as an internal log/event. Full Arrow encoding is a TODO.


version: otel_dataflow/v1
engine: { }
policies:
  resources:
    core_allocation:
      type: core_count
      count: 4
groups:
  default:
    pipelines:
      main:
        nodes:
          etw:
            type: receiver:etw
            config:
              session_name: "OtelArrowETW"
              providers:
                # Microsoft-Windows-Kernel-Process (manifest-based)
                #- guid: "22fb2cd6-0e7b-422b-a0c7-2fad1fd0e716"
                #  level: information
                # Microsoft.Windows.Kernel.Power (TraceLogging — will produce decoded fields)
                #- guid: "331c3b3a-2005-44c2-ac5e-77220c37d6b4"
                #  level: verbose
                # Rustic Provider
                - guid: "d2387720-2907-5677-8625-c1bdc4155197"
                  level: verbose
          console:
            type: exporter:console
            config: {}

        connections:
          - from: etw
            to: console

