# platform: windows-only
# ETW to Console pipeline
#
# Subscribes to Windows ETW providers and prints events to the console.
#
# Usage (run as Administrator for ETW access):
#   cargo run --features etw-receiver -- -c configs/etw-console.yaml
#
# The receiver captures ETW events from the configured providers,
# converts them to OTAP Arrow log record batches, and forwards them
# through the pipeline to the console exporter.


version: otel_dataflow/v1
engine: { }
policies:
  resources:
    core_allocation:
      type: core_count
      count: 4
groups:
  default:
    pipelines:
      main:
        nodes:
          etw:
            type: receiver:etw
            config:
              session_name: "OtelArrowETW"
              batching:
                max_size: 100
                max_duration: "50ms"
              providers:
                # Rustic Provider (Custom)
                - guid: "d2387720-2907-5677-8625-c1bdc4155197"
                  level: verbose
          console:
            type: exporter:console
            config: {}

        connections:
          - from: etw
            to: console

