version: otel_dataflow/v1
engine: { }
groups:
  default:
    pipelines:
      main:
        nodes:
          receiver:
            type: receiver:syslog_cef
            config:
              protocol:
                udp:
                  listening_addr: "0.0.0.0:5140"
          exporter:
            type: exporter:console
            config: {}

        connections:
          - from: receiver
            to: exporter
