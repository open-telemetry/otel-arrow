# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. pkg/otel/arrow).
# Must be one of the components listed in go/.chloggen/config.yaml.
component: benchmarks

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Use otelarrowreceiver as OTLP receiver for its admission controller, set num_streams, num_consumers consistently

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [2301]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  This is to place a realistic limit that is above what 1 CPU can encode/decode for
  OTC OTLP and OTAP tests, which have demonstrated the effectiveness of the Phase 1
  request-bytes admission controller. That receiver makes the OTLP and OTAP tests
  comparable, will reduce ~10x memory used in the overloaded OTLP tests.
