# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: engine

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add the `BearerTokenAuthorizer` capability, a request-facing access-control trait for data-path nodes (typically receivers) that authenticate callers with a bearer token. `authorize` performs authentication and authorization behind one call and returns an `AuthzDecision` (`Allow` carrying an `AuthorizedIdentity`, or `Deny`); an `Err` means the authorizer could not reach a decision and callers must fail closed.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3494]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  The capability is transport- and library-agnostic: the token is carried by a
  secret-protecting `BearerToken` built from a bare token or a whole
  `Authorization` header value (a `Bearer ` scheme prefix is stripped). The
  returned `AuthorizedIdentity` is scheme-agnostic (`subject` + `audience`) so a
  consumer can propagate the authenticated principal downstream. "No auth" is
  modeled by simply not binding the capability to a node, rather than a bypass
  flag.
