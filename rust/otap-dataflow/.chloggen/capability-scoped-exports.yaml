# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: breaking

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: engine

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Scope capability exports by capability module so every item has a single public path. Capability data types and registration handles move from the flat `capability::` namespace to `capability::<name>` (e.g. `capability::bearer_token_provider::BearerToken`), and trait variants move to `{local,shared}::capability::<name>`. `BearerToken::expose_secret` is renamed to `expose_token`.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3492]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  The `#[capability]` macro now emits its `local`/`shared` trait modules as
  `pub(crate)`; the traits are made public only through the hand-written
  `{local,shared}::capability` re-exports, so no capability item is reachable via
  two paths. Shared framework infrastructure (`CapabilityError`,
  `CapabilityErrorSource`, the instance-factory types, `ExtensionCapability`, and
  `KNOWN_CAPABILITIES`) remains flat at `capability::`.
