change_type: enhancement
component: pipeline
note: Add pressure-aware messages-per-second rate limiting for the Syslog / CEF receiver.
issues: [3484]
subtext: >-
  UDP datagrams and emitted TCP records are counted before parsing. Normal TCP
  lines count once; oversized lines emitted as multiple bounded-read fragments
  count once per emitted fragment. Over-limit UDP datagrams are dropped;
  over-limit TCP messages are dropped while keeping the connection open.
