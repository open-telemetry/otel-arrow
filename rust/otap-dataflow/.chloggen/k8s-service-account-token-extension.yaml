change_type: new_component

component: pipeline

note: Add the `k8s_service_account_token` extension, a `BearerTokenProvider` backed by the pod's mounted Kubernetes service account token.

issues: [3356]

subtext: |
  New extension in `otap-df-contrib-extensions` (feature
  `k8s-service-account-token-extension`, URN
  `urn:otel:extension:k8s_service_account_token`) that reads the pod's service
  account token from its mounted file and exposes it to data-path nodes via the
  shared `BearerTokenProvider` capability. Supports both projected volumes
  (short-lived, `exp`-bearing, kubelet-rotated) and legacy/static secret volumes.
  Refresh is event-driven: a watch on the token's mount directory picks up
  kubelet's atomic symlink swap, with an `exp`-derived backstop timer guarding
  against missed watch events, so an expired token is never served. Concurrent
  cache misses are coalesced onto a single read, pipeline startup is gated on the
  first successful token publish, and success/failure/publish counters plus
  read-latency telemetry are emitted.
