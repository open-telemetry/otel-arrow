# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: observability

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add filter-processor observability metrics for kept signals, batches seen, and configured include/exclude paths

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3053]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Adds counters to the `processor.filter.pdata` metric set, each emitted per
  signal type with a `log.`, `metric.`, or `span.` prefix. The log variants are
  `log.signals.kept`, `log.batches.seen`, `log.include.configured.batches`, and
  `log.exclude.configured.batches`; the `metric.*` and `span.*` variants follow
  the same pattern. The configured-batch counters indicate that a batch went
  through a configured include/exclude path, not that records matched the rule.
