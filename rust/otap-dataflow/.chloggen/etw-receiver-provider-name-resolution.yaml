# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: ETW receiver now accepts provider names in addition to GUIDs. Manifest-based and classic (MOF) providers are resolved via the Windows TdhEnumerateProviders API, and TraceLogging/EventSource providers fall back to the standard name-hash convention. An optional per-provider `kind` (auto, manifest, tracelogging) selects the resolution strategy.

