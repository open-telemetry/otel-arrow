# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: engine

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add the `#[component_inventory]` attribute macro and `inventory` module (RFC 0001, Phase 1)

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3435]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Introduces the runtime surface of RFC 0001 (component inventory): a
  `#[component_inventory]` proc macro in `otap-df-engine-macros` plus a
  `ComponentMeta`/`Category`/`COMPONENT_INVENTORY` distributed slice in
  `otap-df-engine`, mirroring the existing `#[capability]` ->
  `KNOWN_CAPABILITIES` mechanism. The macro re-emits the annotated item
  unchanged and registers one link-time inventory entry; it is zero-cost and
  read only by offline tooling. Phase 1 ships the four factory categories
  (Receiver/Exporter/Processor/Extension); the non-factory categories and the
  `cargo xtask component-inventory` command follow in later phases. No runtime,
  API, or config behavior changes for existing components.
