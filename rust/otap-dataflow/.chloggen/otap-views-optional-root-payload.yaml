# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: OTAP logs/metrics/traces views and OTLP encoders now accept a missing root payload and produce 0 rows / an empty result instead of erroring, matching the updated spec where a missing payload is semantically equivalent to one with 0 rows.

