# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: pipeline

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Auto-inject the mandatory `TimeGenerated` column in the Azure Monitor exporter when no mapping targets it. The value is taken from the log record's event time (`time_unix_nano`, falling back to `observed_time_unix_nano`, then the current time), so records carry their true event time instead of the ingestion arrival time Azure would otherwise stamp. An explicit mapping to `TimeGenerated` (resource, scope, field, or attribute), or a passthrough attribute named `TimeGenerated`, takes precedence and disables injection.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3407]

