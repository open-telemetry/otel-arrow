change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: pipeline

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add an attribute passthrough mode to the Azure Monitor exporter. Setting `schema.log_record_mapping.attributes` to `passthrough` emits every log record attribute as-is as its own top-level column named by the attribute key, avoiding per-attribute mapping configuration. Only log-record attributes are passed through; resource attributes, scope attributes, and top-level log-record fields are not passed through automatically and are emitted only when explicitly mapped. Passthrough composes with resource, scope, and top-level field mappings; when an attribute key collides with a mapped column, the attribute value wins and the column is emitted once. Attribute keys are emitted verbatim (not sanitized), so keys without a valid matching DCR column are dropped at ingestion.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3407]

