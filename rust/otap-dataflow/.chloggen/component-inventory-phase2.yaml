# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: engine

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add component inventory annotations across engine components and non-factory categories (RFC 0001, Phase 2)

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3435]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Adds non-factory Category variants (Admin, Controller, Cli, Subsystem, Safety)
  and annotates core components with #[component_inventory] metadata. Includes
  developer documentation in docs/component-inventory.md.

  The `cargo xtask component-inventory` baseline scanner parses source with
  `syn` (not text heuristics) and shares one attribute parser
  (`otap-df-engine-inventory-syntax`) with the proc-macro so the two cannot
  drift. Factory URNs are resolved via a workspace-wide `const` table
  (including cross-crate `use` re-exports); anything unresolved is reported
  loudly and fails the check rather than being recorded as a silent value. A
  link-time oracle test (`otap` crate) cross-checks the scanner's output
  against the compiler-resolved `COMPONENT_INVENTORY` slice for all linked
  components.
