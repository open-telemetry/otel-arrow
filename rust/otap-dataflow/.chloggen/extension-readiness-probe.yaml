change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: engine

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add opt-in extension readiness probe to gate pipeline startup on per-extension readiness signals.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3143]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Active and background extensions can now opt in to startup gating via
  `active().with_readiness_probe().shared(...).local(...)` (or the
  background twin), which applies the default 5-second readiness
  timeout. A longer timeout can be requested with
  `with_extended_readiness_probe_timeout(t)` — the method panics for
  `t < 5s` to surface unit errors at the faulty call site and emits an
  `INFO` event (`extension.readiness.timeout_override`) when an
  override is configured. The engine threads a `ReadinessSignaller`
  into each variant's `EffectHandler`; the extension fires it via
  `EffectHandler::signal_ready()` once it is ready to serve. The
  controller awaits all opted-in probes (in parallel) after the spawn
  barrier and before tipping nodes into their runtime, failing fast
  with a named laggard on timeout or dropped signaller. Extensions
  that do not opt in pay zero cost: `signal_ready()` is a silent no-op
  when no probe is registered.
