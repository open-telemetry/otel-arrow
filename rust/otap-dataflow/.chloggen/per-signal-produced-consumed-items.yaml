# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: breaking

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: engine

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add node produced and consumed message and item counts with signal and outcome datapoint attributes

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3300, 3436]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Every pipeline node records `produced.messages` on `node.producer` and `consumed.messages` on `node.consumer`, each dimensioned by `signal` and `outcome` datapoint attributes. Nodes that opt in to item counting also record `produced.items` and `consumed.items` with the same dimensions; nodes that do not opt in omit the item metrics rather than reporting zero. Enable item counting for all nodes with `telemetry.runtime_metrics: detailed`, or per node with `policies.telemetry.item_counts: true`. Counts are stamped on the pdata frame at send/receive time and recorded during ack/nack unwinding, so they are emitted for receivers, processors, and exporters uniformly.
