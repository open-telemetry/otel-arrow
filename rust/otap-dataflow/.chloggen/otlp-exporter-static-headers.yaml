# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: pipeline

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: "Add optional `headers` config field to `HttpClientSettings` and `GrpcClientSettings` for sending static request headers (e.g. `Authorization`, tenant routing) on every outbound OTLP/HTTP and OTLP/gRPC request"

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3303]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Headers are validated at config load: protocol-reserved names
  (Content-Type/Content-Encoding/Content-Length/Host) are rejected for HTTP and
  protocol headers always take precedence. The gRPC static metadata is built
  once at startup so the per-message hot path keeps its zero-allocation fast
  path. The OTAP (Arrow) exporter shares `GrpcClientSettings` but does not apply
  static headers to its streams yet, so it rejects a non-empty `headers` map at
  config load rather than silently dropping it. This is the static-header
  complement to header propagation (#2563).
