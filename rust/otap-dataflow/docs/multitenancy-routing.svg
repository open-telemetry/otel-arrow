<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="630" viewBox="0 0 1560 630" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><rect width="1560" height="630" fill="#ffffff"/><defs><marker id="ah-pdata" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,1 L7,4 L0,7 z" fill="#4f7a8a"/></marker><marker id="ah-ctrl" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,1 L7,4 L0,7 z" fill="#52606d"/></marker></defs><rect x="60" y="58" width="1440" height="2" fill="#4f7a8a"/><text x="60" y="42" font-size="34" font-weight="600" fill="#1f2933">Routing by tenant: no dedicated port</text><text x="1500" y="42" font-size="19" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" text-anchor="end">core ⊃ group ⊃ pipeline</text><text x="60" y="92" font-size="17" fill="#52606d">With no dedicated port, a shared ingress group routes by tenant token over a topic to per-tenant groups, each replicated on its own core.</text><rect x="700" y="150" width="800" height="122" rx="9" fill="#f4f6f8" stroke="#52606d" stroke-width="1.6"/><text x="716" y="172.0" font-size="14" font-weight="700" fill="#1f2933">core 1</text><text x="1486" y="172.0" text-anchor="end" font-size="12" font-style="italic" fill="#52606d">1 thread</text><rect x="714" y="178" width="772" height="82" rx="7" fill="#fcfcfd" stroke="#9aa5b1" stroke-width="1.3" stroke-dasharray="5,3"/><text x="726" y="195.0" font-size="12" font-weight="700" fill="#52606d">group · T1</text><rect x="728" y="204" width="744" height="44" rx="7" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="735.0" y="216.0" width="38" height="20" rx="6" fill="#c2902f"/><text x="754.0" y="230.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">T1</text><text x="780" y="224.0" font-size="14" font-weight="700" fill="#1f2933">pipe-t1</text><line x1="791.0" y1="234" x2="1000.7" y2="234" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><line x1="1011.7" y1="234" x2="1221.3" y2="234" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><line x1="1232.3" y1="234" x2="1442.0" y2="234" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><circle cx="786.0" cy="234" r="4.5" fill="#4f7a8a"/><circle cx="1006.7" cy="234" r="3.5" fill="#4f7a8a"/><circle cx="1227.3" cy="234" r="3.5" fill="#4f7a8a"/><circle cx="1448.0" cy="234" r="4.5" fill="#4f7a8a"/><rect x="700" y="294" width="800" height="122" rx="9" fill="#f4f6f8" stroke="#52606d" stroke-width="1.6"/><text x="716" y="316.0" font-size="14" font-weight="700" fill="#1f2933">core 2</text><text x="1486" y="316.0" text-anchor="end" font-size="12" font-style="italic" fill="#52606d">1 thread</text><rect x="714" y="322" width="772" height="82" rx="7" fill="#fcfcfd" stroke="#9aa5b1" stroke-width="1.3" stroke-dasharray="5,3"/><text x="726" y="339.0" font-size="12" font-weight="700" fill="#52606d">group · T2</text><rect x="728" y="348" width="744" height="44" rx="7" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="735.0" y="360.0" width="38" height="20" rx="6" fill="#b0487e"/><text x="754.0" y="374.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">T2</text><text x="780" y="368.0" font-size="14" font-weight="700" fill="#1f2933">pipe-t2</text><line x1="791.0" y1="378" x2="1000.7" y2="378" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><line x1="1011.7" y1="378" x2="1221.3" y2="378" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><line x1="1232.3" y1="378" x2="1442.0" y2="378" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><circle cx="786.0" cy="378" r="4.5" fill="#4f7a8a"/><circle cx="1006.7" cy="378" r="3.5" fill="#4f7a8a"/><circle cx="1227.3" cy="378" r="3.5" fill="#4f7a8a"/><circle cx="1448.0" cy="378" r="4.5" fill="#4f7a8a"/><rect x="700" y="438" width="800" height="122" rx="9" fill="#f4f6f8" stroke="#52606d" stroke-width="1.6"/><text x="716" y="460.0" font-size="14" font-weight="700" fill="#1f2933">core 3</text><text x="1486" y="460.0" text-anchor="end" font-size="12" font-style="italic" fill="#52606d">1 thread</text><rect x="714" y="466" width="772" height="82" rx="7" fill="#fcfcfd" stroke="#9aa5b1" stroke-width="1.3" stroke-dasharray="5,3"/><text x="726" y="483.0" font-size="12" font-weight="700" fill="#52606d">group · T3</text><rect x="728" y="492" width="744" height="44" rx="7" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="735.0" y="504.0" width="38" height="20" rx="6" fill="#46688f"/><text x="754.0" y="518.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">T3</text><text x="780" y="512.0" font-size="14" font-weight="700" fill="#1f2933">pipe-t3</text><line x1="791.0" y1="522" x2="1000.7" y2="522" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><line x1="1011.7" y1="522" x2="1221.3" y2="522" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><line x1="1232.3" y1="522" x2="1442.0" y2="522" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><circle cx="786.0" cy="522" r="4.5" fill="#4f7a8a"/><circle cx="1006.7" cy="522" r="3.5" fill="#4f7a8a"/><circle cx="1227.3" cy="522" r="3.5" fill="#4f7a8a"/><circle cx="1448.0" cy="522" r="4.5" fill="#4f7a8a"/><rect x="100" y="294.0" width="320" height="122" rx="9" fill="#f4f6f8" stroke="#52606d" stroke-width="1.6"/><text x="116" y="316.0" font-size="14" font-weight="700" fill="#1f2933">core 0</text><text x="406" y="316.0" text-anchor="end" font-size="12" font-style="italic" fill="#52606d">1 thread</text><rect x="114" y="322.0" width="292" height="82" rx="7" fill="#fcfcfd" stroke="#9aa5b1" stroke-width="1.3" stroke-dasharray="5,3"/><text x="126" y="339.0" font-size="12" font-weight="700" fill="#52606d">group · ingress</text><rect x="128" y="348.0" width="264" height="44" rx="7" fill="white" stroke="#52606d" stroke-width="1.6"/><text x="140" y="367.0" font-size="14" font-weight="700" fill="#1f2933">ingress</text><text x="380" y="367.0" text-anchor="end" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">route: tenant_token</text><circle cx="150" cy="377.0" r="4.5" fill="#4f7a8a"/><line x1="156.0" y1="377.0" x2="234.0" y2="377.0" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><rect x="236.0" y="366.0" width="48" height="22" rx="4" fill="#f2eef8" stroke="#6f5b9e" stroke-width="1.4"/><text x="260.0" y="381.0" text-anchor="middle" font-size="12" fill="#6f5b9e">router</text><line x1="286.0" y1="377.0" x2="364.0" y2="377.0" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><circle cx="370" cy="377.0" r="4.5" fill="#4f7a8a"/><circle cx="60.0" cy="370.0" r="9" fill="white" stroke="#52606d" stroke-width="1.6"/><line x1="70.0" y1="370.0" x2="100.0" y2="370.0" stroke="#4f7a8a" stroke-width="2.6" marker-end="url(#ah-pdata)"/><text x="60.0" y="356.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">shared port</text><line x1="422.0" y1="370.0" x2="458.0" y2="370.0" stroke="#4f7a8a" stroke-width="2.6" marker-end="url(#ah-pdata)"/><ellipse cx="480" cy="370.0" rx="20" ry="28" fill="white" stroke="#52606d" stroke-width="1.6"/><text x="480" y="374.0" text-anchor="middle" font-size="12" fill="#52606d">topic</text><path d="M500.0,370.0 C590.0,370.0 590.0,226.0 696.0,226.0" fill="none" stroke="#4f7a8a" stroke-width="2.6" marker-end="url(#ah-pdata)"/><path d="M500.0,370.0 C590.0,370.0 590.0,370.0 696.0,370.0" fill="none" stroke="#4f7a8a" stroke-width="2.6" marker-end="url(#ah-pdata)"/><path d="M500.0,370.0 C590.0,370.0 590.0,514.0 696.0,514.0" fill="none" stroke="#4f7a8a" stroke-width="2.6" marker-end="url(#ah-pdata)"/><text x="60" y="600" font-size="17" fill="#1f2933">The shared ingress is the only shared resource; routing by tenant token restores per-tenant isolation downstream, as dedicated ports would.</text></svg>