<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img">
  <title>Benchmark process and CPU-core topology</title>
  <desc>Backend on core 0, SUT on core 1, and three load generators on cores 2 through 4.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="back" markerWidth="10" markerHeight="10" refX="2" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M9,0 L9,6 L0,3 z" fill="#64748b"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .title { font-size: 25px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #475569; }
      .core { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 12; }
      .sut { fill: #e0f2fe; stroke: #0284c7; }
      .backend { fill: #dcfce7; stroke: #16a34a; }
      .loadgen { fill: #fef9c3; stroke: #ca8a04; }
      .tap { fill: #f1f5f9; stroke: #64748b; rx: 9; }
      .node-title { font-size: 16px; font-weight: 700; }
      .node-text { font-size: 12px; fill: #475569; }
      .core-label { font-size: 12px; fill: #334155; font-weight: 700; }
      .flow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .response { stroke: #64748b; stroke-width: 1.6; fill: none; stroke-dasharray: 5 5; marker-start: url(#back); }
      .measure { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 4 4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1120" height="500" fill="#f8fafc"/>
  <text x="36" y="48" class="title">Pinned Benchmark Topology</text>
  <text x="36" y="74" class="subtitle">
    Keep process roles on distinct cores so CPU, context switches, and syscalls are attributable.
  </text>

  <g transform="translate(42 350)">
    <rect class="core backend" x="0" y="0" width="185" height="100"/>
    <text class="core-label" x="18" y="25">core 0</text>
    <text class="node-title" x="18" y="52">Backend</text>
    <text class="node-text" x="18" y="75">backend*.yaml</text>
  </g>

  <g transform="translate(468 185)">
    <rect class="core sut" x="0" y="0" width="205" height="130"/>
    <text class="core-label" x="18" y="26">core 1</text>
    <text class="node-title" x="18" y="56">System Under Test</text>
    <text class="node-text" x="18" y="80">receiver -> processors</text>
    <text class="node-text" x="18" y="100">-> exporter</text>
  </g>

  <g transform="translate(42 115)">
    <rect class="core loadgen" x="0" y="0" width="170" height="82"/>
    <text class="core-label" x="16" y="24">core 2</text>
    <text class="node-title" x="16" y="50">Loadgen 0</text>
    <text class="node-text" x="16" y="68">smooth/open</text>
  </g>

  <g transform="translate(42 215)">
    <rect class="core loadgen" x="0" y="0" width="170" height="82"/>
    <text class="core-label" x="16" y="24">core 3</text>
    <text class="node-title" x="16" y="50">Loadgen 1</text>
    <text class="node-text" x="16" y="68">rate calibrated</text>
  </g>

  <g transform="translate(42 315)">
    <rect class="core loadgen" x="0" y="0" width="170" height="82"/>
    <text class="core-label" x="16" y="24">core 4</text>
    <text class="node-title" x="16" y="50">Loadgen 2</text>
    <text class="node-text" x="16" y="68">pre_generated</text>
  </g>

  <path class="flow" d="M214 156 C300 155 370 180 462 224"/>
  <path class="flow" d="M214 256 H460"/>
  <path class="flow" d="M214 356 C310 355 375 318 462 283"/>
  <path class="response" d="M462 239 C360 210 300 184 214 172"/>
  <path class="response" d="M460 272 H214"/>
  <path class="response" d="M462 293 C370 335 300 371 214 371"/>

  <path class="flow" d="M672 252 C770 252 810 382 902 398"/>
  <path class="response" d="M902 414 C810 410 760 310 674 284"/>

  <g transform="translate(902 350)">
    <rect class="core backend" x="0" y="0" width="185" height="100"/>
    <text class="core-label" x="18" y="25">core 0 target</text>
    <text class="node-title" x="18" y="52">Backend Sink</text>
    <text class="node-text" x="18" y="75">response path</text>
  </g>

  <g transform="translate(750 112)">
    <rect class="tap" x="0" y="0" width="300" height="126"/>
    <text class="node-title" x="18" y="29">Measurement Windows</text>
    <text class="node-text" x="18" y="55">perf stat: CPU and clean ctx/s</text>
    <text class="node-text" x="18" y="77">strace -f -c: syscall mix only</text>
    <text class="node-text" x="18" y="99">admin metrics: pipeline counters</text>
  </g>

  <path class="measure" d="M752 174 C705 190 692 208 674 232"/>
  <path class="measure" d="M790 238 C815 288 850 334 910 374"/>

  <text class="node-text" x="292" y="142">OTLP/OTAP requests</text>
  <text class="node-text" x="284" y="389">ACK/NACK and latency path</text>
  <text class="node-text" x="748" y="320">SUT export</text>
</svg>
