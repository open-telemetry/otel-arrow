<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" role="img">
  <title>Large payload experiment conclusion</title>
  <desc>Comparison of clean 5000 high-rate requests, clean 10000 low-rate requests, and dirty 10000 high-rate requests.</desc>
  <defs>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .title { font-size: 25px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #475569; }
      .card { fill: #ffffff; stroke-width: 1.6; rx: 12; }
      .good { stroke: #16a34a; fill: #f0fdf4; }
      .warn { stroke: #ca8a04; fill: #fefce8; }
      .bad { stroke: #dc2626; fill: #fef2f2; }
      .node-title { font-size: 18px; font-weight: 800; }
      .tag { font-size: 12px; font-weight: 700; }
      .metric { font-size: 13px; fill: #334155; }
      .big { font-size: 30px; font-weight: 800; }
      .caption { font-size: 13px; fill: #475569; }
      .rule { font-size: 15px; font-weight: 700; fill: #0f172a; }
    </style>
  </defs>

  <rect width="1120" height="470" fill="#f8fafc"/>
  <text x="36" y="48" class="title">Current Large-Payload Conclusion</text>
  <text x="36" y="74" class="subtitle">
    Larger OTAP requests lower syscall cadence only when they remain clean and matched-throughput.
  </text>

  <g transform="translate(46 120)">
    <rect class="card good" width="318" height="245"/>
    <text class="tag" x="22" y="34" fill="#15803d">PROMOTE FOR HIGH RATE</text>
    <text class="node-title" x="22" y="66">5000 @ 1.2M target</text>
    <text class="big" x="22" y="112" fill="#15803d">clean</text>
    <text class="metric" x="22" y="145">Delivered: 1.216M logs/s</text>
    <text class="metric" x="22" y="168">CPU: 503 ns/log</text>
    <text class="metric" x="22" y="191">SUT export p99: 13.8 ms</text>
    <text class="metric" x="22" y="214">send-full: 0, behind: 0</text>
    <text class="metric" x="22" y="237">stream enqueue avg: 0.0035 ms</text>
  </g>

  <g transform="translate(401 120)">
    <rect class="card warn" width="318" height="245"/>
    <text class="tag" x="22" y="34" fill="#a16207">CONDITIONAL LOW-RATE POINT</text>
    <text class="node-title" x="22" y="66">10000 @ 300k target</text>
    <text class="big" x="22" y="112" fill="#a16207">valid</text>
    <text class="metric" x="22" y="145">Delivered: 287k logs/s</text>
    <text class="metric" x="22" y="168">CPU: 750 ns/log</text>
    <text class="metric" x="22" y="191">SUT export p99: 89.7 ms</text>
    <text class="metric" x="22" y="214">send-full: 0, behind: 0</text>
    <text class="metric" x="22" y="237">response wait includes cadence</text>
  </g>

  <g transform="translate(756 120)">
    <rect class="card bad" width="318" height="245"/>
    <text class="tag" x="22" y="34" fill="#b91c1c">REJECT FOR OBJECTIVE RANKING</text>
    <text class="node-title" x="22" y="66">10000 @ 600k+</text>
    <text class="big" x="22" y="112" fill="#b91c1c">dirty</text>
    <text class="metric" x="22" y="145">Delivered: 370k-415k logs/s</text>
    <text class="metric" x="22" y="168">Accepted windows: 0</text>
    <text class="metric" x="22" y="191">stream enqueue: about 40 ms</text>
    <text class="metric" x="22" y="214">queue depth: about 50 of 64</text>
    <text class="metric" x="22" y="237">send-full and falling behind</text>
  </g>

  <g transform="translate(84 396)">
    <text class="rule">Optimizer rule:</text>
    <text class="caption" x="122" y="0">
      score CPU, ctx/s, p99, and syscall metrics only after throughput and backpressure gates pass.
    </text>
    <text class="caption" x="122" y="23">
      Lower epoll_wait/s from under-delivery is rejected, not promoted.
    </text>
  </g>
</svg>
