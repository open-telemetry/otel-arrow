" opacity="0.9" marker-end="url(#ah-pdata)"/><path d="M270.0,570.0 C495.0,570.0 495.0,404.0 716.0,404.0" fill="none" stroke="#3c7a52" stroke-width="2" opacity="0.9" marker-end="url(#ah-pdata)"/><path d="M270.0,577.0 C495.0,577.0 495.0,564.0 716.0,564.0" fill="none" stroke="#38507f" stroke-width="2" opacity="0.9" marker-end="url(#ah-pdata)"/><text x="60" y="654" font-size="17" fill="#1f2933">Same key → same partition: a tenant always lands on one CPU, so its state and limits are local; the set of tenants can grow without bound.</text></svg>