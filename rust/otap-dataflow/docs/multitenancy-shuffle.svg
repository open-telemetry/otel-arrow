<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="680" viewBox="0 0 1560 680" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><rect width="1560" height="680" fill="#ffffff"/><defs><marker id="ah-pdata" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,1 L7,4 L0,7 z" fill="#4f7a8a"/></marker><marker id="ah-ctrl" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,1 L7,4 L0,7 z" fill="#52606d"/></marker></defs><rect x="60" y="58" width="1440" height="2" fill="#4f7a8a"/><text x="60" y="42" font-size="34" font-weight="600" fill="#1f2933">Cross-core shuffle: partition tenants onto CPUs</text><text x="1500" y="42" font-size="19" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" text-anchor="end">hash(tenant_token) → partition</text><text x="60" y="92" font-size="17" fill="#52606d">For unbounded tenant sets, a partitioned shuffle hashes the tenant token and exchanges data across cores so each tenant lands on one partition.</text><rect x="60" y="198.0" width="210" height="74" rx="9" fill="#f4f6f8" stroke="#52606d" stroke-width="1.6"/><text x="76" y="220.0" font-size="14" font-weight="700" fill="#1f2933">core r0</text><text x="256" y="220.0" text-anchor="end" font-size="12" font-style="italic" fill="#52606d">ingress</text><rect x="86.5" y="244.5" width="15" height="11" rx="3" fill="#c0504d"/><rect x="112.5" y="244.5" width="15" height="11" rx="3" fill="#4f8f5f"/><rect x="138.5" y="244.5" width="15" height="11" rx="3" fill="#4569a0"/><rect x="60" y="358.0" width="210" height="74" rx="9" fill="#f4f6f8" stroke="#52606d" stroke-width="1.6"/><text x="76" y="380.0" font-size="14" font-weight="700" fill="#1f2933">core r1</text><text x="256" y="380.0" text-anchor="end" font-size="12" font-style="italic" fill="#52606d">ingress</text><rect x="86.5" y="404.5" width="15" height="11" rx="3" fill="#d67b78"/><rect x="112.5" y="404.5" width="15" height="11" rx="3" fill="#79a86a"/><rect x="138.5" y="404.5" width="15" height="11" rx="3" fill="#6f92c0"/><rect x="60" y="518.0" width="210" height="74" rx="9" fill="#f4f6f8" stroke="#52606d" stroke-width="1.6"/><text x="76" y="540.0" font-size="14" font-weight="700" fill="#1f2933">core r2</text><text x="256" y="540.0" text-anchor="end" font-size="12" font-style="italic" fill="#52606d">ingress</text><rect x="86.5" y="564.5" width="15" height="11" rx="3" fill="#9e3a4e"/><rect x="112.5" y="564.5" width="15" height="11" rx="3" fill="#3c7a52"/><rect x="138.5" y="564.5" width="15" height="11" rx="3" fill="#38507f"/><text x="60" y="150" font-size="14" font-weight="700" fill="#1f2933">ingress cores</text><text x="60" y="170" font-size="12" fill="#52606d">mixed tenants per core</text><rect x="720" y="178.0" width="780" height="114" rx="9" fill="#f4f6f8" stroke="#52606d" stroke-width="1.6"/><text x="736" y="200.0" font-size="14" font-weight="700" fill="#1f2933">core p0</text><text x="1486" y="200.0" text-anchor="end" font-size="12" font-style="italic" fill="#52606d">partition 0 · reds</text><rect x="732" y="204.0" width="756" height="76" rx="7" fill="#fcfcfd" stroke="#9aa5b1" stroke-width="1.3" stroke-dasharray="5,3"/><text x="744" y="221.0" font-size="12" font-weight="700" fill="#52606d">group · G</text><rect x="744" y="228.0" width="732" height="40" rx="6" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="756.0" y="238.0" width="44" height="20" rx="6" fill="#c0504d"/><text x="778.0" y="252.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">t1</text><rect x="806.0" y="238.0" width="44" height="20" rx="6" fill="#d67b78"/><text x="828.0" y="252.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">t2</text><rect x="856.0" y="238.0" width="44" height="20" rx="6" fill="#9e3a4e"/><text x="878.0" y="252.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">t3</text><line x1="945.0" y1="248.0" x2="1106.0" y2="248.0" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><line x1="1117.0" y1="248.0" x2="1278.0" y2="248.0" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><line x1="1289.0" y1="248.0" x2="1450.0" y2="248.0" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><circle cx="940.0" cy="248.0" r="4.5" fill="#4f7a8a"/><circle cx="1112.0" cy="248.0" r="3.5" fill="#4f7a8a"/><circle cx="1284.0" cy="248.0" r="3.5" fill="#4f7a8a"/><circle cx="1456.0" cy="248.0" r="4.5" fill="#4f7a8a"/><rect x="720" y="338.0" width="780" height="114" rx="9" fill="#f4f6f8" stroke="#52606d" stroke-width="1.6"/><text x="736" y="360.0" font-size="14" font-weight="700" fill="#1f2933">core p1</text><text x="1486" y="360.0" text-anchor="end" font-size="12" font-style="italic" fill="#52606d">partition 1 · greens</text><rect x="732" y="364.0" width="756" height="76" rx="7" fill="#fcfcfd" stroke="#9aa5b1" stroke-width="1.3" stroke-dasharray="5,3"/><text x="744" y="381.0" font-size="12" font-weight="700" fill="#52606d">group · G</text><rect x="744" y="388.0" width="732" height="40" rx="6" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="756.0" y="398.0" width="44" height="20" rx="6" fill="#4f8f5f"/><text x="778.0" y="412.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">t1</text><rect x="806.0" y="398.0" width="44" height="20" rx="6" fill="#79a86a"/><text x="828.0" y="412.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">t2</text><rect x="856.0" y="398.0" width="44" height="20" rx="6" fill="#3c7a52"/><text x="878.0" y="412.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">t3</text><line x1="945.0" y1="408.0" x2="1106.0" y2="408.0" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><line x1="1117.0" y1="408.0" x2="1278.0" y2="408.0" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><line x1="1289.0" y1="408.0" x2="1450.0" y2="408.0" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><circle cx="940.0" cy="408.0" r="4.5" fill="#4f7a8a"/><circle cx="1112.0" cy="408.0" r="3.5" fill="#4f7a8a"/><circle cx="1284.0" cy="408.0" r="3.5" fill="#4f7a8a"/><circle cx="1456.0" cy="408.0" r="4.5" fill="#4f7a8a"/><rect x="720" y="498.0" width="780" height="114" rx="9" fill="#f4f6f8" stroke="#52606d" stroke-width="1.6"/><text x="736" y="520.0" font-size="14" font-weight="700" fill="#1f2933">core p2</text><text x="1486" y="520.0" text-anchor="end" font-size="12" font-style="italic" fill="#52606d">partition 2 · blues</text><rect x="732" y="524.0" width="756" height="76" rx="7" fill="#fcfcfd" stroke="#9aa5b1" stroke-width="1.3" stroke-dasharray="5,3"/><text x="744" y="541.0" font-size="12" font-weight="700" fill="#52606d">group · G</text><rect x="744" y="548.0" width="732" height="40" rx="6" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="756.0" y="558.0" width="44" height="20" rx="6" fill="#4569a0"/><text x="778.0" y="572.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">t1</text><rect x="806.0" y="558.0" width="44" height="20" rx="6" fill="#6f92c0"/><text x="828.0" y="572.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">t2</text><rect x="856.0" y="558.0" width="44" height="20" rx="6" fill="#38507f"/><text x="878.0" y="572.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">t3</text><line x1="945.0" y1="568.0" x2="1106.0" y2="568.0" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><line x1="1117.0" y1="568.0" x2="1278.0" y2="568.0" stroke="#4f7a8a" stroke-width="2" marker-end="url(#ah-pdata)"/><line x1="1289.0" y1="568.0" x2="1450.0" y2="568.0" stroke="#