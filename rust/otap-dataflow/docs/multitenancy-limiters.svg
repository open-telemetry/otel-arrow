<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="560" viewBox="0 0 1560 560" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><rect width="1560" height="560" fill="#ffffff"/><defs><marker id="ah-pdata" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,1 L7,4 L0,7 z" fill="#4f7a8a"/></marker><marker id="ah-ctrl" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,1 L7,4 L0,7 z" fill="#52606d"/></marker></defs><rect x="60" y="58" width="1440" height="2" fill="#4f7a8a"/><text x="60" y="42" font-size="34" font-weight="600" fill="#1f2933">In-pipeline fairness: per-tenant limiters in one pipeline</text><text x="1500" y="42" font-size="19" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" text-anchor="end">core ⊃ group ⊃ pipeline</text><text x="60" y="92" font-size="17" fill="#52606d">Three tenants share one pipeline on one core. Separate limiter state per tenant throttles each independently: the noisy tenant is nacked while the well-behaved tenants flow through.</text><rect x="60" y="140" width="1440" height="340" rx="9" fill="#f4f6f8" stroke="#52606d" stroke-width="1.6"/><text x="76" y="162.0" font-size="14" font-weight="700" fill="#1f2933">core 0</text><text x="1486" y="162.0" text-anchor="end" font-size="12" font-style="italic" fill="#52606d">1 thread</text><rect x="74" y="168" width="1412" height="300" rx="7" fill="#fcfcfd" stroke="#9aa5b1" stroke-width="1.3" stroke-dasharray="5,3"/><text x="86" y="185.0" font-size="12" font-weight="700" fill="#52606d">group · G</text><rect x="88" y="194" width="1384" height="262" rx="7" fill="white" stroke="#52606d" stroke-width="1.6"/><text x="100" y="213.0" font-size="14" font-weight="700" fill="#1f2933">pipeline · shared by T1 · T2 · T3</text><text x="158" y="234" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">mixed in</text><rect x="142.5" y="299.5" width="15" height="11" rx="3" fill="#c2902f"/><rect x="158.5" y="299.5" width="15" height="11" rx="3" fill="#c2902f"/><rect x="118.5" y="329.5" width="15" height="11" rx="3" fill="#b0487e"/><rect x="134.5" y="329.5" width="15" height="11" rx="3" fill="#b0487e"/><rect x="150.5" y="329.5" width="15" height="11" rx="3" fill="#b0487e"/><rect x="166.5" y="329.5" width="15" height="11" rx="3" fill="#b0487e"/><rect x="182.5" y="329.5" width="15" height="11" rx="3" fill="#b0487e"/><rect x="142.5" y="359.5" width="15" height="11" rx="3" fill="#46688f"/><rect x="158.5" y="359.5" width="15" height="11" rx="3" fill="#46688f"/><text x="158" y="405" text-anchor="middle" font-size="12" fill="#b15a4f">T2 noisy</text><circle cx="268" cy="335.0" r="8" fill="white" stroke="#52606d" stroke-width="1.6"/><text x="268" y="358.0" text-anchor="middle" font-size="12" fill="#52606d">rx</text><line x1="202.0" y1="305.0" x2="258.0" y2="335.0" stroke="#c2902f" stroke-width="1.6"/><line x1="202.0" y1="335.0" x2="258.0" y2="335.0" stroke="#b0487e" stroke-width="1.6"/><line x1="202.0" y1="365.0" x2="258.0" y2="335.0" stroke="#46688f" stroke-width="1.6"/><line x1="278.0" y1="335.0" x2="326.0" y2="335.0" stroke="#4f7a8a" stroke-width="2.6" marker-end="url(#ah-pdata)"/><rect x="328" y="270.0" width="340" height="130" rx="8" fill="white" stroke="#6f5b9e" stroke-width="1.8"/><text x="498.0" y="290.0" text-anchor="middle" font-size="14" font-weight="700" fill="#6f5b9e">limiter · per-tenant state</text><rect x="337.0" y="306.0" width="30" height="18" rx="6" fill="#c2902f"/><text x="352.0" y="319.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">T1</text><rect x="372" y="308.0" width="218" height="14" rx="7" fill="#d9e1ec"/><rect x="372" y="308.0" width="74.1" height="14" rx="7" fill="#3f8f5f"/><rect x="596.0" y="305.0" width="62" height="20" rx="10" fill="white" stroke="#3f8f5f" stroke-width="1.4"/><text x="627.0" y="319.0" text-anchor="middle" font-size="12" font-weight="700" fill="#3f8f5f">PASS</text><rect x="337.0" y="336.0" width="30" height="18" rx="6" fill="#b0487e"/><text x="352.0" y="349.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">T2</text><rect x="372" y="338.0" width="218" height="14" rx="7" fill="#d9e1ec"/><rect x="372" y="338.0" width="218.0" height="14" rx="7" fill="#b15a4f"/><rect x="596.0" y="335.0" width="62" height="20" rx="10" fill="white" stroke="#b15a4f" stroke-width="1.4"/><text x="627.0" y="349.0" text-anchor="middle" font-size="12" font-weight="700" fill="#b15a4f">NACK</text><rect x="337.0" y="366.0" width="30" height="18" rx="6" fill="#46688f"/><text x="352.0" y="379.0" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">T3</text><rect x="372" y="368.0" width="218" height="14" rx="7" fill="#d9e1ec"/><rect x="372" y="368.0" width="65.4" height="14" rx="7" fill="#3f8f5f"/><rect x="596.0" y="365.0" width="62" height="20" rx="10" fill="white" stroke="#3f8f5f" stroke-width="1.4"/><text x="627.0" y="379.0" text-anchor="middle" font-size="12" font-weight="700" fill="#3f8f5f">PASS</text><line x1="670.0" y1="335.0" x2="728.0" y2="335.0" stroke="#4f7a8a" stroke-width="2.6" marker-end="url(#ah-pdata)"/><circle cx="738" cy="335.0" r="8" fill="white" stroke="#52606d" stroke-width="1.6"/><text x="738" y="358.0" text-anchor="middle" font-size="12" fill="#52606d">process</text><line x1="748.0" y1="335.0" x2="848.0" y2="335.0" stroke="#4f7a8a" stroke-width="2.6" marker-end="url(#ah-pdata)"/><circle cx="858" cy="335.0" r="8" fill="white" stroke="#52606d" stroke-width="1.6"/><text x="858" y="358.0" text-anchor="middle" font-size="12" fill="#52606d">tx</text><line x1="868.0" y1="335.0" x2="920.0" y2="335.0" stroke="#4f7a8a" stroke-width="2.6" marker-end="url(#ah-pdata)"/><rect x="930.5" y="321.5" width="15" height="11" rx="3" fill="#c2902f"/><rect x="948.5" y="321.5" width="15" height="11" rx="3" fill="#c2902f"/><rect x="930.5" y="337.5" width="15" height="11" rx="3" fill="#46688f"/><rect x="948.5" y="337.5" width="15" height="11" rx="3" fill="#46688f"/><text x="944" y="369" text-anchor="middle" font-size="12" fill="#3f8f5f">T1, T3 processed</text><path d="M498.0,400.0 L498.0,434.0 L268.0,434.0" fill="none" stroke="#b15a4f" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#ah-ctrl)"/><rect x="530.5" y="428.5" width="15" height="11" rx="3" fill="#b0487e"/><rect x="512.5" y="428.5" width="15" height="11" rx="3" fill="#b0487e"/><text x="568" y="438" font-size="12" font-weight="700" fill="#b15a4f">nack noisy T2 → backpressure to its source only</text><text x="60" y="534" font-size="17" fill="#1f2933">Contrast the shared case without per-tenant state: one blocked tenant nacks indiscriminately and starves the healthy ones (softness).</text></svg>