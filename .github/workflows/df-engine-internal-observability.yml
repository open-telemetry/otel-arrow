name: df-engine-internal-observability

# Validates that df_engine's internal observability surface (events,
# and eventually metrics + attributes) matches the in-tree semantic-
# conventions registry under `rust/otap-dataflow/semconv/`.
#
# The job boots `weaver registry live-check` against the in-tree
# registry, runs df_engine wired to emit its internal telemetry into
# weaver via OTLP, exercises every declared event with per-event
# triggers, and fails if any declared event receives zero samples or
# has an event-level violation. Attribute-level findings (attributes
# emitted by the engine but not yet declared) are tolerated today and
# tightened in follow-up PRs as the registry is filled in.
#
# Long-term intent: this is the authoritative gate ensuring df_engine's
# self-reported telemetry stays conformant with its declared contract.
#
# Tracking issue:
# https://github.com/open-telemetry/otel-arrow/issues/1613

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:

env:
  CARGO_TERM_COLOR: always
  WEAVER_VERSION: v0.23.0

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  weaver-live-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: ./rust/otap-dataflow
          cache-bin: false
      - name: Setup Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@3a3b7cc98e08f84bccda45c0f20522b51d64a88c # v0.23.0
        with:
          version: ${{ env.WEAVER_VERSION }}
      - name: Generate self-signed TLS cert
        run: |
          set -euo pipefail
          mkdir -p /tmp/df-engine-tls
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout /tmp/df-engine-tls/key.pem \
            -out   /tmp/df-engine-tls/cert.pem \
            -subj "/CN=127.0.0.1" \
            -addext "subjectAltName=IP:127.0.0.1,DNS:localhost" \
            >/dev/null 2>&1
          ls -la /tmp/df-engine-tls
      - name: Build df_engine
        run: cargo build --release --bin df_engine
        working-directory: ./rust/otap-dataflow
      # NOTE: The manual start/wait/stop dance for the weaver listener below
      # can be replaced with the `weaver-live-check-{start,stop}` composite
      # actions once https://github.com/open-telemetry/weaver/pull/1448
      # is released, which should cut this job roughly in half.
      - name: Run df_engine against weaver live-check
        timeout-minutes: 5
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p live-check-report

          echo "Weaver version:       ${WEAVER_VERSION}"
          weaver --version || true

          echo "::group::Start weaver live-check listener"
          weaver registry live-check \
            --registry rust/otap-dataflow/semconv \
            --input-source otlp \
            --otlp-grpc-port 4317 \
            --admin-port 4320 \
            --inactivity-timeout 60 \
            --format json \
            --output live-check-report \
            > live-check-report/weaver.log 2>&1 &
          WEAVER_PID=$!
          echo "weaver pid: $WEAVER_PID"
          echo "::endgroup::"

          # Wait for the OTLP listener to come up; fail fast if it never does.
          OTLP_UP=0
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/4317) >/dev/null 2>&1; then
              OTLP_UP=1
              break
            fi
            sleep 1
          done
          if [ "$OTLP_UP" -ne 1 ]; then
            echo "::error::weaver OTLP listener (127.0.0.1:4317) did not come up within 30s"
            tail -n 200 live-check-report/weaver.log || true
            kill -KILL "$WEAVER_PID" 2>/dev/null || true
            exit 1
          fi

          echo "::group::Start df_engine"
          ./rust/otap-dataflow/target/release/df_engine \
            --config rust/otap-dataflow/configs/internal-events-otlp.yaml \
            --num-cores 1 \
            > live-check-report/df_engine.log 2>&1 &
          ENGINE_PID=$!
          echo "df_engine pid: $ENGINE_PID"
          echo "::endgroup::"

          # Wait for the engine to report ready via its admin endpoint.
          # `/api/v1/readyz` signals all pipelines (including the TLS-enabled
          # OTLP receiver below) are up and serving.
          if ! curl --retry 30 --retry-delay 1 --retry-all-errors --max-time 2 -fsS \
              http://127.0.0.1:14319/api/v1/readyz > /dev/null; then
            echo "::error::df_engine admin /readyz did not become healthy within 30s"
            tail -n 200 live-check-report/df_engine.log || true
            kill -KILL "$ENGINE_PID" 2>/dev/null || true
            kill -KILL "$WEAVER_PID" 2>/dev/null || true
            exit 1
          fi

          # Run every trigger script in the registry. Convention:
          # `semconv/groups/event.<name>.yaml` is paired with
          # `semconv/triggers/<name>.sh`. Adding a new event means
          # adding both files; no edits to this workflow are needed.
          echo "::group::Trigger declared events"
          shopt -s nullglob
          for trigger in rust/otap-dataflow/semconv/triggers/*.sh; do
            echo "--- $(basename "$trigger") ---"
            bash "$trigger"
          done
          echo "::endgroup::"

          # Allow the internal_telemetry receiver to drain and the OTLP
          # exporter to flush to weaver.
          sleep 8

          echo "::group::Stop services"
          # df_engine does not implement SIGINT shutdown today; hard-kill it
          # and do NOT `wait` on it (would block indefinitely).
          kill -KILL "$ENGINE_PID" 2>/dev/null || true
          # Tell weaver to finalize the report.
          curl -fsS -X POST "http://127.0.0.1:4320/stop" || true
          # Weaver exits non-zero when any violations are found in the
          # report. That is currently expected because the registry is
          # not yet exhaustive (attributes emitted by the engine that
          # aren't declared show up as violations); the substantive
          # validation happens in the dedicated `Assert` step below.
          # Capture the exit code without letting `bash -e` abort the script.
          WEAVER_EXIT=0
          wait "$WEAVER_PID" || WEAVER_EXIT=$?
          echo "weaver exit code: $WEAVER_EXIT"
          echo "::endgroup::"

          echo "::group::Weaver log (tail)"
          tail -n 200 live-check-report/weaver.log || true
          echo "::endgroup::"

          echo "::group::df_engine log (tail)"
          tail -n 100 live-check-report/df_engine.log || true
          echo "::endgroup::"
      - name: Assert every registered event was validated
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          REPORT=live-check-report/live_check.json
          if [ ! -s "$REPORT" ]; then
            echo "::error::No live-check report found at $REPORT"
            exit 1
          fi

          # The two gates below (zero-sample detection and severity-scoped
          # exit code) are workarounds; weaver's native exit code does not
          # yet express them. They can be removed once both upstream
          # features land:
          #   - https://github.com/open-telemetry/weaver/issues/1473
          #     `--fail-on` for severity-based exit code
          #   - https://github.com/open-telemetry/weaver/issues/1474
          #     coverage / `--fail-on-coverage-below`
          # `semconv/triggers/<name>.sh` is the source of truth for the
          # set of events we expect to see (one trigger per declared
          # event, by convention).
          {
            echo "## df_engine events live-check"
            echo
            echo "| Event | Samples | Worst event-level advice |"
            echo "| --- | ---: | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          fail=0
          for trigger in rust/otap-dataflow/semconv/triggers/*.sh; do
            name="$(basename "$trigger" .sh)"
            read -r count worst < <(jq -r --arg n "$name" '
              [.samples[].log | select(.event_name == $n)] as $logs
              | [
                  ($logs | length),
                  (
                    [$logs[].live_check_result.highest_advice_level // empty]
                    | if   any(. == "violation")   then "violation"
                      elif any(. == "improvement") then "improvement"
                      elif any(. == "information") then "information"
                      elif length > 0             then "ok"
                      else "n/a" end
                  )
                ]
              | @tsv' "$REPORT")
            echo "| \`$name\` | $count | $worst |" >> "$GITHUB_STEP_SUMMARY"
            if [ "$count" = "0" ]; then
              echo "::error::declared event \`$name\` received zero samples"
              fail=1
            elif [ "$worst" = "violation" ]; then
              echo "::error::event \`$name\` has event-level violations"
              fail=1
            fi
          done
          exit "$fail"
      - name: Upload live-check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weaver-live-check-df-engine-events
          path: live-check-report
          if-no-files-found: warn
