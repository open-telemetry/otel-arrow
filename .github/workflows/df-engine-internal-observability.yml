name: df-engine-internal-observability

# Validates that df_engine's internal observability surface (events,
# and eventually metrics + attributes) matches the in-tree semantic-
# conventions registry under `rust/otap-dataflow/semconv/`.
#
# The job boots `weaver registry live-check` against the in-tree
# registry, runs df_engine wired to emit its internal telemetry into
# weaver via OTLP, exercises every declared event with per-event
# triggers, and fails if any declared event receives zero samples or
# has an event-level violation. Attribute-level findings (attributes
# emitted by the engine but not yet declared) are tolerated today and
# tightened in follow-up PRs as the registry is filled in.
#
# Long-term intent: this is the authoritative gate ensuring df_engine's
# self-reported telemetry stays conformant with its declared contract.
#
# Tracking issue:
# https://github.com/open-telemetry/otel-arrow/issues/1613

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:

env:
  CARGO_TERM_COLOR: always
  WEAVER_VERSION: v0.23.0

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  weaver-live-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: ./rust/otap-dataflow
          cache-bin: false
      - name: Setup Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@3a3b7cc98e08f84bccda45c0f20522b51d64a88c # v0.23.0
        with:
          version: ${{ env.WEAVER_VERSION }}
      - name: Generate self-signed TLS cert
        run: |
          set -euo pipefail
          mkdir -p /tmp/df-engine-tls
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout /tmp/df-engine-tls/key.pem \
            -out   /tmp/df-engine-tls/cert.pem \
            -subj "/CN=127.0.0.1" \
            -addext "subjectAltName=IP:127.0.0.1,DNS:localhost" \
            >/dev/null 2>&1
          ls -la /tmp/df-engine-tls
      - name: Build df_engine
        run: cargo build --release --bin df_engine
        working-directory: ./rust/otap-dataflow
      # NOTE: The manual start/wait/stop dance for the weaver listener below
      # can be replaced with the `weaver-live-check-{start,stop}` composite
      # actions once https://github.com/open-telemetry/weaver/pull/1448
      # is released, which should cut this job roughly in half.
      - name: Run df_engine against weaver live-check
        timeout-minutes: 5
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p live-check-report

          echo "Weaver version:       ${WEAVER_VERSION}"
          weaver --version || true

          echo "::group::Start weaver live-check listener"
          weaver registry live-check \
            --registry rust/otap-dataflow/semconv \
            --input-source otlp \
            --otlp-grpc-port 4317 \
            --admin-port 4320 \
            --inactivity-timeout 60 \
            --format json \
            --output live-check-report \
            > live-check-report/weaver.log 2>&1 &
          WEAVER_PID=$!
          echo "weaver pid: $WEAVER_PID"
          echo "::endgroup::"

          # Wait for the OTLP listener to come up; fail fast if it never does.
          OTLP_UP=0
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/4317) >/dev/null 2>&1; then
              OTLP_UP=1
              break
            fi
            sleep 1
          done
          if [ "$OTLP_UP" -ne 1 ]; then
            echo "::error::weaver OTLP listener (127.0.0.1:4317) did not come up within 30s"
            tail -n 200 live-check-report/weaver.log || true
            kill -KILL "$WEAVER_PID" 2>/dev/null || true
            exit 1
          fi

          echo "::group::Start df_engine"
          ./rust/otap-dataflow/target/release/df_engine \
            --config rust/otap-dataflow/configs/internal-events-otlp.yaml \
            --num-cores 1 \
            > live-check-report/df_engine.log 2>&1 &
          ENGINE_PID=$!
          echo "df_engine pid: $ENGINE_PID"
          echo "::endgroup::"

          # Wait for the engine's TLS listener to come up; fail fast otherwise.
          TLS_UP=0
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/14317) >/dev/null 2>&1; then
              TLS_UP=1
              break
            fi
            sleep 1
          done
          if [ "$TLS_UP" -ne 1 ]; then
            echo "::error::df_engine TLS listener (127.0.0.1:14317) did not come up within 30s"
            tail -n 200 live-check-report/df_engine.log || true
            kill -KILL "$ENGINE_PID" 2>/dev/null || true
            kill -KILL "$WEAVER_PID" 2>/dev/null || true
            exit 1
          fi

          echo "::group::Trigger declared events"
          # Per-event triggers go here. Adding a new event to the registry
          # also requires a snippet below that exercises it -- the assert
          # step fails if any declared event receives zero samples.

          # tls.handshake.failed: raw HTTP bytes to the TLS port are
          # rejected by `crates/otap/src/tls_utils.rs::create_tls_stream`.
          for i in 1 2 3 4 5; do
            curl --max-time 2 -sS http://127.0.0.1:14317/ 2>&1 | head -1 || true
            sleep 0.3
          done
          echo "::endgroup::"

          # Allow the internal_telemetry receiver to drain and the OTLP
          # exporter to flush to weaver.
          sleep 8

          echo "::group::Stop services"
          # df_engine does not implement SIGINT shutdown today; hard-kill it
          # and do NOT `wait` on it (would block indefinitely).
          kill -KILL "$ENGINE_PID" 2>/dev/null || true
          # Tell weaver to finalize the report.
          curl -fsS -X POST "http://127.0.0.1:4320/stop" || true
          # Weaver exits non-zero when any violations are found in the
          # report. That is currently expected because the registry is
          # not yet exhaustive (attributes emitted by the engine that
          # aren't declared show up as violations); the substantive
          # validation happens in the dedicated `Assert` step below.
          # Capture the exit code without letting `bash -e` abort the script.
          WEAVER_EXIT=0
          wait "$WEAVER_PID" || WEAVER_EXIT=$?
          echo "weaver exit code: $WEAVER_EXIT"
          echo "::endgroup::"

          echo "::group::Weaver log (tail)"
          tail -n 200 live-check-report/weaver.log || true
          echo "::endgroup::"

          echo "::group::df_engine log (tail)"
          tail -n 100 live-check-report/df_engine.log || true
          echo "::endgroup::"
      - name: Assert every registered event was validated
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          REPORT=live-check-report/live_check.json
          if [ ! -s "$REPORT" ]; then
            echo "::error::No live-check report found at $REPORT"
            exit 1
          fi

          python3 -m pip install --quiet pyyaml

          python3 - "$REPORT" rust/otap-dataflow/semconv/groups \
            <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import glob, json, os, sys
          import yaml

          report_path, groups_dir = sys.argv[1], sys.argv[2]

          # Discover every `type: event` group declared in the in-tree
          # semconv registry. Adding a new event = drop a new YAML file
          # under semconv/groups/ and trigger it; no edits needed here.
          expected = set()
          for path in sorted(glob.glob(os.path.join(groups_dir, "*.yaml"))):
              with open(path) as f:
                  doc = yaml.safe_load(f) or {}
              for g in doc.get("groups") or []:
                  if g.get("type") == "event":
                      # For event groups, the wire `event_name` is the
                      # `name:` field; `id:` is the in-registry group id.
                      ev = g.get("name") or g.get("id")
                      if ev:
                          expected.add(ev)

          d = json.load(open(report_path))
          samples = d.get("samples") or []

          # Bucket received OTLP log samples by event_name.
          by_name = {}
          for s in samples:
              log = s.get("log")
              if not isinstance(log, dict):
                  continue
              name = log.get("event_name")
              if name:
                  by_name.setdefault(name, []).append(log)

          print("## df_engine events live-check")
          print()
          print(f"- Samples received: **{len(samples)}**")
          print(f"- Events declared in registry: **{len(expected)}**")
          print()
          print("| Event | Samples | Worst event-level advice |")
          print("| --- | ---: | --- |")

          missing, violators = [], []
          for name in sorted(expected):
              logs = by_name.get(name) or []
              # Event-level gate: attribute-level findings (e.g. undeclared
              # `error` / `message` keys) are tolerated for now and will be
              # tightened in follow-ups under issue #1613.
              levels = [
                  (lg.get("live_check_result") or {}).get("highest_advice_level")
                  for lg in logs
              ]
              worst = "n/a"
              for lvl in ("violation", "improvement", "information", "not_stable"):
                  if lvl in levels:
                      worst = lvl
                      break
              print(f"| `{name}` | {len(logs)} | {worst} |")
              if not logs:
                  missing.append(name)
              elif "violation" in levels:
                  violators.append(name)

          ok = True
          if missing:
              ok = False
              print()
              print(f"::error::{len(missing)} declared event(s) received zero"
                    f" samples: {', '.join(missing)}. The exerciser did not"
                    " fire them, or the internal_telemetry -> OTLP path is"
                    " broken.")
          if violators:
              ok = False
              print()
              print(f"::error::{len(violators)} event(s) have event-level"
                    f" violations: {', '.join(violators)}.")
              for name in violators[:3]:
                  res = (by_name[name][0].get("live_check_result") or {})
                  print(json.dumps({name: res}, indent=2))
          sys.exit(0 if ok else 1)
          PY
      - name: Upload live-check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weaver-live-check-df-engine-events
          path: live-check-report
          if-no-files-found: warn
