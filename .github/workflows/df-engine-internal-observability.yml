name: df-engine-internal-observability

# Validates that df_engine's internal observability surface (events,
# and eventually metrics + attributes) matches the in-tree semantic-
# conventions registry under `rust/otap-dataflow/semconv/`.
#
# The job boots `weaver registry live-check` against the in-tree
# registry, runs df_engine wired to emit its internal telemetry into
# weaver via OTLP, exercises every declared event with per-event
# triggers, and fails if any declared event receives zero samples or
# has an event-level violation. Attribute-level findings (attributes
# emitted by the engine but not yet declared) are tolerated today and
# tightened in follow-up PRs as the registry is filled in.
#
# Long-term intent: this is the authoritative gate ensuring df_engine's
# self-reported telemetry stays conformant with its declared contract.
#
# Tracking issue:
# https://github.com/open-telemetry/otel-arrow/issues/1613

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:

env:
  CARGO_TERM_COLOR: always
  WEAVER_VERSION: v0.24.0

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  weaver-live-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: ./rust/otap-dataflow
          cache-bin: false
      - name: Setup Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@adcf6fda79c3df1cb537669442aef753b7019777 # v0.24.2
        with:
          version: ${{ env.WEAVER_VERSION }}
      - name: Generate self-signed TLS cert
        run: |
          set -euo pipefail
          mkdir -p /tmp/df-engine-tls
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout /tmp/df-engine-tls/key.pem \
            -out   /tmp/df-engine-tls/cert.pem \
            -subj "/CN=127.0.0.1" \
            -addext "subjectAltName=IP:127.0.0.1,DNS:localhost" \
            >/dev/null 2>&1
          ls -la /tmp/df-engine-tls
      - name: Build df_engine
        run: cargo build --locked --release --bin df_engine
        working-directory: ./rust/otap-dataflow
      # Weaver listener lifecycle (start, readiness probe, /stop, report
      # capture, artifact upload) is owned by the upstream composite
      # actions below. Pinned to the published v0.24.0 release, which is
      # the first tag to ship these actions.
      - name: Start weaver live-check listener
        id: weaver-start
        uses: open-telemetry/weaver/.github/actions/weaver-live-check-start@adcf6fda79c3df1cb537669442aef753b7019777 # v0.24.2
        with:
          registry: rust/otap-dataflow/semconv
          otlp-grpc-port: '4317'
          admin-port: '4320'
          # Generous safety net: the listener uses `--output http` so the
          # report is only retrievable via `/stop`. Make sure weaver does
          # not self-exit on inactivity before df_engine startup, triggers,
          # and flush complete (~30s readiness + triggers + 8s flush).
          inactivity-timeout: '300'
          # Pin the state dir explicitly so failure-path diagnostics
          # (weaver.log bundling) and the stop action both work even if
          # the start action fails before exporting
          # `WEAVER_LIVE_CHECK_STATE_DIR` via $GITHUB_ENV.
          state-dir: ${{ runner.temp }}/weaver-live-check-df-engine
      - name: Start df_engine
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p live-check-report
          ./rust/otap-dataflow/target/release/df_engine \
            --config rust/otap-dataflow/configs/internal-events-otlp.yaml \
            --num-cores 1 \
            > live-check-report/df_engine.log 2>&1 &
          ENGINE_PID=$!
          echo "df_engine pid: $ENGINE_PID"
          echo "ENGINE_PID=$ENGINE_PID" >> "$GITHUB_ENV"

          # Wait for the engine to report ready via its admin endpoint.
          # `/api/v1/readyz` signals all pipelines (including the TLS-enabled
          # OTLP receiver in the engine config) are up and serving.
          if ! curl --retry 30 --retry-delay 1 --retry-all-errors --max-time 2 -fsS \
              http://127.0.0.1:14319/api/v1/readyz > /dev/null; then
            echo "::error::df_engine admin /readyz did not become healthy within 30s"
            tail -n 200 live-check-report/df_engine.log || true
            kill -KILL "$ENGINE_PID" 2>/dev/null || true
            exit 1
          fi
      - name: Run active triggers
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          # Run every script in the trigger directory. These exist solely
          # to fire events that need active driving (e.g. network calls);
          # passive events fire from the engine config on its own and need
          # no script here. Adding a new event: declare it in
          # `semconv/groups/event.<name>.yaml`; if it cannot be exercised
          # purely by the engine config, drop a script in
          # `semconv/triggers/` that drives it.
          shopt -s nullglob
          for trigger in rust/otap-dataflow/semconv/triggers/*.sh; do
            echo "--- $(basename "$trigger") ---"
            bash "$trigger"
          done
      - name: Flush internal telemetry to weaver
        run: |
          # Allow the internal_telemetry receiver to drain and the OTLP
          # exporter to flush to weaver before we stop the listener.
          sleep 8
      - name: Stop df_engine
        if: always()
        run: |
          set -euo pipefail
          # df_engine does not implement SIGINT shutdown today; hard-kill
          # it and do NOT `wait` on it (would block indefinitely).
          if [ -n "${ENGINE_PID:-}" ]; then
            kill -KILL "$ENGINE_PID" 2>/dev/null || true
          fi
          echo "::group::df_engine log (tail)"
          tail -n 100 live-check-report/df_engine.log 2>/dev/null || true
          echo "::endgroup::"
      - name: Stop weaver live-check and collect report
        id: weaver-stop
        if: always()
        uses: open-telemetry/weaver/.github/actions/weaver-live-check-stop@adcf6fda79c3df1cb537669442aef753b7019777 # v0.24.2
        with:
          # Match the explicit state dir from the start action so this
          # works even if start failed before exporting it via env.
          state-dir: ${{ runner.temp }}/weaver-live-check-df-engine
          # Tolerate weaver's global findings exit code today: the
          # registry is not yet exhaustive, so attribute-level
          # violations from undeclared attributes are expected. The
          # substantive gate is the registry-driven event coverage
          # check in the next step.
          fail-on: 'none'
          # Keep using our own bundled upload (which also includes the
          # df_engine and weaver logs) below.
          upload-report: 'false'
      - name: Assert every registered event was validated
        if: always()
        working-directory: ${{ github.workspace }}
        env:
          REPORT_PATH: ${{ steps.weaver-stop.outputs['report-path'] }}
        run: |
          set -euo pipefail
          REPORT="${REPORT_PATH:-}"
          if [ -z "$REPORT" ] || [ ! -s "$REPORT" ]; then
            echo "::error::No live-check report found (path='$REPORT')"
            exit 1
          fi

          # The two gates below (zero-sample detection and severity-scoped
          # exit code) are workarounds; weaver's native exit code does not
          # yet express them. They can be removed once both upstream
          # features land:
          #   - https://github.com/open-telemetry/weaver/issues/1473
          #     `--fail-on` for severity-based exit code
          #   - https://github.com/open-telemetry/weaver/issues/1474
          #     coverage / `--fail-on-coverage-below`
          # The expected event set is enumerated directly from
          # `semconv/groups/*.yaml` -- the registry is the single source
          # of truth, and `semconv/triggers/` is just a bag of scripts
          # to run before validation.
          {
            echo "## df_engine events live-check"
            echo
            echo "| Event | Samples | Worst event-level advice |"
            echo "| --- | ---: | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          mapfile -t expected < <(
            yq eval-all '.groups[] | select(.type == "event") | .name' \
              rust/otap-dataflow/semconv/groups/*.yaml \
              | grep -Ev '^(---|null)$' | sort -u
          )
          if [ "${#expected[@]}" -eq 0 ]; then
            echo "::error::No events discovered under semconv/groups/"
            exit 1
          fi

          fail=0
          for name in "${expected[@]}"; do
            read -r count worst < <(jq -r --arg n "$name" '
              [.samples[].log | select(.event_name == $n)] as $logs
              | [
                  ($logs | length),
                  (
                    [$logs[].live_check_result.highest_advice_level // empty]
                    | if   any(. == "violation")   then "violation"
                      elif any(. == "improvement") then "improvement"
                      elif any(. == "information") then "information"
                      elif length > 0             then "ok"
                      else "n/a" end
                  )
                ]
              | @tsv' "$REPORT")
            echo "| \`$name\` | $count | $worst |" >> "$GITHUB_STEP_SUMMARY"
            if [ "$count" = "0" ]; then
              echo "::error::declared event \`$name\` received zero samples"
              fail=1
            elif [ "$worst" = "violation" ]; then
              echo "::error::event \`$name\` has event-level violations"
              fail=1
            fi
          done
          exit "$fail"
      - name: Bundle live-check artifacts
        if: always()
        env:
          REPORT_PATH: ${{ steps.weaver-stop.outputs['report-path'] }}
          WEAVER_STATE_DIR: ${{ runner.temp }}/weaver-live-check-df-engine
        run: |
          set -euo pipefail
          mkdir -p live-check-report
          if [ -n "${REPORT_PATH:-}" ] && [ -s "$REPORT_PATH" ]; then
            cp "$REPORT_PATH" live-check-report/live_check.json
          fi
          # weaver.log lives in the start action's state dir. Use the
          # explicit path we passed in (works even on a start failure
          # where $WEAVER_LIVE_CHECK_STATE_DIR was never exported).
          if [ -s "$WEAVER_STATE_DIR/weaver.log" ]; then
            cp "$WEAVER_STATE_DIR/weaver.log" live-check-report/weaver.log
          fi
          ls -la live-check-report || true
      - name: Upload live-check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weaver-live-check-df-engine-events
          path: live-check-report
          if-no-files-found: warn
