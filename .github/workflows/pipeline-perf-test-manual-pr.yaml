# Manual version of the pipeline perf test that can be triggered for a given PR.
# This workflow writes to / expects to find a placeholder status on the PR ref since we aren't
# able to directly insert a state into it from 'outside' of that context.
name: Pipeline Performance Tests - Manual PR
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to run performance tests against"
        required: true
        type: number
      suite_config:
        description: "Path to benchmark suite config (relative to tools/pipeline_perf_test/)"
        required: true
        type: string
        default: test_suites/integration/continuous/100klrps-docker.yaml

# Cancel in-progress runs for the same PR if a new manual run is started
concurrency:
  group: ${{ github.workflow }}-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  pipeline-perf-test:
    runs-on: oracle-bare-metal-64cpu-1024gb-x86-64-ubuntu-24
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Disk usage diagnostics
        run: |
          echo "=== Overall disk usage ==="
          df -h
          echo ""
          echo "=== Largest directories under / (top 20) ==="
          sudo du -h --max-depth=3 / 2>/dev/null | sort -rh | head -20
          echo ""
          echo "=== Docker disk usage ==="
          docker system df -v 2>/dev/null || echo "Docker not running or not available"
          echo ""
          echo "=== Docker images ==="
          docker images --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}\t{{.CreatedSince}}' 2>/dev/null || true
          echo ""
          echo "=== Docker volumes ==="
          docker volume ls 2>/dev/null || true
          echo ""
          echo "=== Docker containers (all) ==="
          docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Size}}\t{{.Status}}' 2>/dev/null || true
          echo ""
          echo "=== /home usage ==="
          sudo du -h --max-depth=2 /home 2>/dev/null | sort -rh | head -20
          echo ""
          echo "=== /var usage ==="
          sudo du -h --max-depth=2 /var 2>/dev/null | sort -rh | head -20
          echo ""
          echo "=== /tmp usage ==="
          sudo du -h --max-depth=1 /tmp 2>/dev/null | sort -rh | head -10

      # Check out the PR's merge commit so tests run against how it would integrate with the base branch.
      # This works for PRs from the same repo or forks.
      - name: Checkout PR merge ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/pull/${{ inputs.pr_number }}/merge
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Set up Python (non-OL8)
        if: ${{ steps.detect_os.outputs.id != 'ol' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build dataflow_engine
        run: |
          git submodule init
          git submodule update
          cd rust/otap-dataflow
          docker buildx build --load --build-context otel-arrow=../../ -f Dockerfile -t df_engine .
          cd ../..

      - name: Install dependencies
        run: |
          python -m pip install --user --require-hashes -r tools/pipeline_perf_test/orchestrator/requirements.lock.txt
          python -m pip install --user --require-hashes -r tools/pipeline_perf_test/load_generator/requirements.lock.txt

      - name: Run pipeline performance test suite
        run: |
          cd tools/pipeline_perf_test
          python orchestrator/run_orchestrator.py --config "${{ inputs.suite_config }}"

      - name: Set PR status based on result
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            // Read PR number from workflow inputs
            const prNumber = context.payload.inputs.pr_number;

            // Get PR info
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const sha = pr.head.sha;

            // Map job result to status state
            const state = '{{ job.status }}' === 'success' ? 'success' : 'failure';

            // Set commit status on PR
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'perf-tests',
              description: state === 'success'
                ? 'Manual pipeline performance tests ran'
                : 'Manual pipeline performance tests failed'
            });
