# This action runs the pipeline perf benchmarking suite on dedicated Oracle
# bare-metal hardware when the 'pipelineperf' label is added to a PR.
# Basic perf validation on ubuntu-latest is handled by Rust-CI (rust-ci.yml).
# The results from this workflow do not update the charts.
name: Pipeline Perf Dedicated

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - main

permissions:
  contents: read

# Cancel in-progress runs for the same PR if a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Run on dedicated Oracle hardware when 'pipelineperf' label is present
  pipeline-perf-test-dedicated:
    if: contains(github.event.pull_request.labels.*.name, 'pipelineperf')
    runs-on: oracle-bare-metal-64cpu-1024gb-x86-64-ubuntu-24
    steps:
      # Route tool-created temp files to RUNNER_TEMP, which GitHub Actions empties
      # at the start and end of every job. Required when running directly on the
      # shared bare-metal host (no job-level container) per
      # https://github.com/open-telemetry/community/blob/main/docs/how-to-use-bare-metal-runner.md
      - name: Route temp files to RUNNER_TEMP
        run: |
          echo "TMPDIR=$RUNNER_TEMP" >> "$GITHUB_ENV"
          echo "TMP=$RUNNER_TEMP" >> "$GITHUB_ENV"
          echo "TEMP=$RUNNER_TEMP" >> "$GITHUB_ENV"

      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Disk usage diagnostics
        run: |
          echo "=== Overall disk usage ==="
          df -h
          echo ""
          echo "=== Largest directories under / (top 20) ==="
          sudo du -h --max-depth=3 / 2>/dev/null | sort -rh | head -20
          echo ""
          echo "=== Docker disk usage ==="
          docker system df -v 2>/dev/null || echo "Docker not running or not available"
          echo ""
          echo "=== Docker images ==="
          docker images --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}\t{{.CreatedSince}}' 2>/dev/null || true
          echo ""
          echo "=== Docker volumes ==="
          docker volume ls 2>/dev/null || true
          echo ""
          echo "=== Docker containers (all) ==="
          docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Size}}\t{{.Status}}' 2>/dev/null || true
          echo ""
          echo "=== /home usage ==="
          sudo du -h --max-depth=2 /home 2>/dev/null | sort -rh | head -20
          echo ""
          echo "=== /var usage ==="
          sudo du -h --max-depth=2 /var 2>/dev/null | sort -rh | head -20
          echo ""
          echo "=== /tmp usage ==="
          sudo du -h --max-depth=1 /tmp 2>/dev/null | sort -rh | head -10

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set up Python (non-OL8)
        if: ${{ steps.detect_os.outputs.id != 'ol' }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build dataflow_engine
        run: |
          git submodule init
          git submodule update
          cd rust/otap-dataflow
          docker buildx build --load --build-arg FEATURES=clickhouse-exporter --build-context otel-arrow=../../ -f Dockerfile -t df_engine .
          cd ../..

      - name: Install dependencies
        run: |
          python -m pip install --user --require-hashes -r tools/pipeline_perf_test/orchestrator/requirements.lock.txt
          python -m pip install --user --require-hashes -r tools/pipeline_perf_test/load_generator/requirements.lock.txt

      - name: Run ClickHouse performance test suite
        run: |
          cd tools/pipeline_perf_test
          python orchestrator/run_orchestrator.py --config test_suites/integration/clickhouse/otap-clickhouse-logs.yaml

      - name: Upload ClickHouse benchmark results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clickhouse-pipeline-perf-results
          path: tools/pipeline_perf_test/results/clickhouse/gh-actions-benchmark/*.json

      - name: Post-run disk usage diagnostics
        if: always()
        run: |
          echo "=== Overall disk usage ==="
          df -h
          echo ""
          echo "=== Docker disk usage ==="
          docker system df -v 2>/dev/null || true

      # Bare-metal host cleanup: remove only the Docker artifacts created by
      # this job. Avoid broad commands (e.g. rm -rf /tmp/*) per the shared
      # runner guidelines.
      - name: Clean up Docker artifacts created by this job
        if: always()
        run: |
          docker rm -f load-generator df-engine clickhouse 2>/dev/null || true
          docker rmi -f df_engine clickhouse/clickhouse-server:25.6 2>/dev/null || true
          # Prune dangling (unused) build cache and images only.
          docker builder prune -f 2>/dev/null || true
          docker image prune -f 2>/dev/null || true
