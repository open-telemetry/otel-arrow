# tools/comparison_dashboard publishing - trigger relay.
#
# This file lives on the `benchmarks` branch only. Its job is to
# dispatch to the main `comparison-dashboard.yml` workflow when new
# per-suite data is committed under `docs/comparison_data/`. 
name: Comparison Dashboard - Trigger Relay

on:
  workflow_dispatch:
  push:
    branches: [benchmarks]
    paths:
      - 'docs/comparison_data/**'

permissions:
  actions: write
  contents: read

concurrency:
  group: comparison-dashboard-trigger
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - name: Dispatch publish workflow on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run comparison-dashboard.yml \
            --repo "${{ github.repository }}" \
            --ref main
