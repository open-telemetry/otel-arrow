name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.40.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run mode (just show what would happen)"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  prepare-release:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout (dry run)
        if: inputs.dry_run
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.ref }}

      - name: Create GitHub App token
        if: "!inputs.dry_run"
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.OTELBOT_ARROW_APP_ID }}
          private-key: ${{ secrets.OTELBOT_ARROW_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        if: "!inputs.dry_run"
        id: get-user-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Checkout (release preparation)
        if: "!inputs.dry_run"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.ref }}
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          cache-dependency-path: "**/*.sum"

      - name: Validate inputs
        run: ./.github/workflows/scripts/validate-version.sh "${{ inputs.version }}"

      - name: Get last released version
        id: last_version
        run: |
          LAST_VERSION=$(./.github/workflows/scripts/get-last-version.sh)
          echo "last_version=$LAST_VERSION" >> $GITHUB_OUTPUT
          echo "Last released version: $LAST_VERSION"
          echo "New version: ${{ inputs.version }}"

      - name: Validate version increment
        run: ./.github/workflows/scripts/validate-version-increment.sh "${{ steps.last_version.outputs.last_version }}" "${{ inputs.version }}"

      - name: Generate dependency-bot changelog entries
        run: |
          # Renovate and Dependabot do not author chloggen entries on their
          # own PRs. Synthesize one umbrella entry per tree summarizing
          # their merged PRs since the last release tag. The script
          # silently skips a tree if it has no qualifying commits.
          ./.github/workflows/scripts/generate-dependency-changelog.sh \
            go Go go/.chloggen/auto-dependency-updates.yaml
          ./.github/workflows/scripts/generate-dependency-changelog.sh \
            rust/otap-dataflow Rust \
            rust/otap-dataflow/.chloggen/auto-dependency-updates.yaml

      - name: Render chloggen entries into CHANGELOG files
        run: |
          # Renders pending entries from go/.chloggen/ and
          # rust/otap-dataflow/.chloggen/ into their respective CHANGELOG.md
          # files under the new `## v${{ inputs.version }}` heading, then
          # deletes the consumed .yaml entry files.
          make chlog-install
          make chlog-update VERSION="v${{ inputs.version }}"

      - name: Bump Rust crate versions
        run: |
          # Rust crates currently track the same release version as Go.
          # Replace the version in both [workspace.package] and the root
          # [package] section (both have `version = "X.Y.Z"` at column 0).
          sed -i 's/^version = "[0-9]\+\.[0-9]\+\.[0-9]\+"/version = "${{ inputs.version }}"/g' rust/otap-dataflow/Cargo.toml
          echo "Updated rust/otap-dataflow/Cargo.toml to ${{ inputs.version }}"

      - name: Extract release notes for PR body
        id: changelog
        run: |
          # Pull the freshly-rendered section from each CHANGELOG and
          # combine them under per-language `## What's Changed (...)`
          # headings for embedding in the PR body. --allow-missing keeps
          # the workflow working if one side had no chloggen entries
          # this release.
          ./.github/workflows/scripts/extract-changelog.sh \
            --version "${{ inputs.version }}" \
            --file go/CHANGELOG.md \
            --allow-missing \
            /tmp/go_release_content.txt
          ./.github/workflows/scripts/extract-changelog.sh \
            --version "${{ inputs.version }}" \
            --file rust/otap-dataflow/CHANGELOG.md \
            --allow-missing \
            /tmp/rust_release_content.txt

          {
            echo "## What's Changed (Go :hamster:)"
            echo ""
            if [ -s /tmp/go_release_content.txt ]; then
              cat /tmp/go_release_content.txt
            else
              echo "_No Go changes in this release._"
            fi
            echo ""
            echo "## What's Changed (Rust :crab:)"
            echo ""
            if [ -s /tmp/rust_release_content.txt ]; then
              cat /tmp/rust_release_content.txt
            else
              echo "_No Rust changes in this release._"
            fi
          } > /tmp/combined_release_content.txt

          echo "Combined release notes preview:"
          echo "----------------------------------------"
          cat /tmp/combined_release_content.txt
          echo "----------------------------------------"

      - name: Dry run - Show planned changes
        if: inputs.dry_run
        run: |
          # Write to GitHub Step Summary
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # :clipboard: Release Preparation Dry Run

          ## Summary
          **DRY RUN MODE** - No changes will be made to the repository

          ## Planned Changes
          - **New version**: `${{ inputs.version }}`
          - **Last version**: `${{ steps.last_version.outputs.last_version }}`

          ## Git Operations
          - Create branch: `otelbot/release-v${{ inputs.version }}`
          - Commit version updates
          - Create pull request

          ## File Changes
          The following files would be modified:
          - `go/.chloggen/auto-dependency-updates.yaml`, `rust/otap-dataflow/.chloggen/auto-dependency-updates.yaml` - Auto-generated entries aggregating renovate[bot]/dependabot[bot] PRs (created only when such commits exist for the tree)
          - `go/CHANGELOG.md` - Render pending `go/.chloggen/*.yaml` entries under `## v${{ inputs.version }}`
          - `rust/otap-dataflow/CHANGELOG.md` - Render pending `rust/otap-dataflow/.chloggen/*.yaml` entries under `## v${{ inputs.version }}`
          - `go/.chloggen/*.yaml`, `rust/otap-dataflow/.chloggen/*.yaml` - Consumed entries deleted
          - `rust/otap-dataflow/Cargo.toml` - Bump workspace and root package version to ${{ inputs.version }}

          ## Release Notes Preview
          ```
          EOF
          cat /tmp/combined_release_content.txt >> $GITHUB_STEP_SUMMARY
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ```

          ## Next Steps
          1. Review the planned changes above
          2. Run again without dry-run when ready
          3. After merging the PR, run the **Push Release** workflow to create git tags and GitHub release

          ---
          **Note**: This is a dry run. To execute the actual release preparation, set `dry_run` to `false`.
          EOF

      - name: Create release branch and commit changes
        if: "!inputs.dry_run"
        run: |
          # Configure git for otelbot
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

          # Use script to create branch and commit
          ./.github/workflows/scripts/create-release-branch.sh "${{ inputs.version }}" --push

      - name: Create or update pull request
        if: "!inputs.dry_run"
        env:
          # not using secrets.GITHUB_TOKEN since pull requests from that token do not trigger workflows
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Read combined changelog content for PR body
          CHANGELOG_CONTENT=$(cat /tmp/combined_release_content.txt)

          # Create PR body content
          cat > /tmp/pr_body.md << EOF
          ## Release v${{ inputs.version }}

          This PR prepares the repository for release v${{ inputs.version }}.

          ### Changes included:
          - Rendered pending chloggen entries into \`go/CHANGELOG.md\` and \`rust/otap-dataflow/CHANGELOG.md\`
          - Bumped \`rust/otap-dataflow/Cargo.toml\` (workspace + root package)

          ${CHANGELOG_CONTENT}

          ### Checklist:
          - [ ] Verify both CHANGELOG.md files render the expected entries
          - [ ] Verify Rust crate versions updated
          - [ ] Confirm all tests pass
          - [ ] Ready to merge and tag release

          After merging this PR, run the **Push Release** workflow to create git tags and publish the GitHub release.
          EOF

          BRANCH="otelbot/release-v${{ inputs.version }}"
          TITLE="chore(release) Prepare Release v${{ inputs.version }}"

          # Check if a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #$EXISTING_PR"
            gh pr edit "$EXISTING_PR" \
              --title "$TITLE" \
              --body-file /tmp/pr_body.md \
              --base main \
              --add-label release
          else
            gh pr create \
              --title "$TITLE" \
              --body-file /tmp/pr_body.md \
              --head "$BRANCH" \
              --base main \
              --label release
          fi

      - name: Summary
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo ":heavy_check_mark: Dry run completed successfully"
            echo "No changes were made to the repository"
            echo "Review the planned changes above and run again without dry-run when ready"
          else
            echo ":heavy_check_mark: Release preparation completed successfully"
            echo ""
            echo "Next steps:"
            echo "1. Review and merge the pull request: https://github.com/open-telemetry/otel-arrow/pulls"
            echo "2. After merging, run the 'Push Release' workflow to create git tags and GitHub release"
            echo ""
            echo "Release branch: otelbot/release-v${{ inputs.version }}"
            echo "Release version: v${{ inputs.version }}"
          fi
