name: Flaky Test Tracker

# Runs daily and on-demand to detect flaky tests from recent CI runs.
# Parses JUnit XML artifacts from Rust-CI workflow runs, identifies tests
# marked as flaky (failed then passed on retry), and creates/updates a
# tracking issue with a summary table.

permissions:
  contents: read
  issues: write
  actions: read

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  # The label applied to the flaky test tracking issue.
  FLAKY_ISSUE_LABEL: "flaky-test"
  # How many recent Rust-CI workflow runs to scan.
  LOOKBACK_RUNS: 20

jobs:
  detect-flaky-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure flaky-test label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "$FLAKY_ISSUE_LABEL" \
            --description "Automatically detected flaky tests" \
            --color "FBCA04" \
            --force

      - name: Download JUnit XML from recent Rust-CI runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p junit-artifacts

          # Get the workflow ID for Rust-CI
          WORKFLOW_ID=$(gh api "repos/${{ github.repository }}/actions/workflows" \
            --jq '.workflows[] | select(.name == "Rust-CI") | .id')

          if [[ -z "$WORKFLOW_ID" ]]; then
            echo "::warning::Could not find Rust-CI workflow"
            exit 0
          fi

          echo "Rust-CI workflow ID: $WORKFLOW_ID"

          # Get recent completed runs on the default branch
          RUN_IDS=$(gh api "repos/${{ github.repository }}/actions/workflows/$WORKFLOW_ID/runs?branch=main&status=completed&per_page=$LOOKBACK_RUNS" \
            --jq '.workflow_runs[].id')

          echo "Found $(echo "$RUN_IDS" | wc -l) recent runs"

          for RUN_ID in $RUN_IDS; do
            echo "Checking run $RUN_ID for JUnit artifacts..."
            # List artifacts for this run that match our naming pattern
            ARTIFACT_INFO=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
              --jq '.artifacts[] | select(.name | startswith("junit-xml-")) | "\(.id) \(.name)"' || true)

            while IFS=' ' read -r ARTIFACT_ID ARTIFACT_NAME; do
              [[ -z "$ARTIFACT_ID" ]] && continue
              echo "  Downloading artifact $ARTIFACT_NAME ($ARTIFACT_ID) from run $RUN_ID"
              DEST_DIR="junit-artifacts/run-$RUN_ID/$ARTIFACT_NAME"
              mkdir -p "$DEST_DIR"
              gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" \
                > "$DEST_DIR/artifact.zip" || true
              (cd "$DEST_DIR" && unzip -o -q "artifact.zip" 2>/dev/null && rm -f "artifact.zip") || true
            done <<< "$ARTIFACT_INFO"
          done

          echo "Downloaded artifacts:"
          find junit-artifacts -name '*.xml' | head -50 || echo "No XML files found"

      - name: Parse JUnit XML and detect flaky tests
        id: parse
        env:
          GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          FLAKY_ISSUE_LABEL: ${{ env.FLAKY_ISSUE_LABEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          cat > parse_flaky.py << 'PYTHON_SCRIPT'
          #!/usr/bin/env python3
          """Parse JUnit XML files and detect flaky tests.

          Flaky tests are identified by:
          1. Tests with <flakyFailure> elements (nextest marks retried-then-passed tests)
          2. Tests that fail in some runs and pass in others across multiple CI runs

          Enhanced reporting includes:
          - Failure messages from JUnit XML
          - OS/platform correlation from artifact names
          - New-vs-recurring detection by comparing with the previous issue body
          """
          import json
          import os
          import re
          import subprocess
          import sys
          import xml.etree.ElementTree as ET
          from collections import defaultdict
          from pathlib import Path

          # OS labels we expect to find in artifact directory names
          # e.g. junit-xml-required-ubuntu-latest-1 -> "ubuntu-latest"
          KNOWN_OS_PATTERNS = [
              "ubuntu-latest",
              "ubuntu-24.04-arm",
              "windows-latest",
              "macos-latest",
          ]

          def extract_os_from_path(xml_file):
              """Extract the OS from the artifact directory name in the file path."""
              path_str = str(xml_file)
              for os_name in KNOWN_OS_PATTERNS:
                  if os_name in path_str:
                      return os_name
              return "unknown"

          def parse_junit_files(artifacts_dir):
              """Parse all JUnit XML files and collect test results."""
              test_results = defaultdict(lambda: {
                  "pass": set(),       # run_ids where test passed
                  "fail": set(),       # run_ids where test failed
                  "flaky_direct": 0,   # nextest flakyFailure count
                  "fail_messages": [],  # failure message texts (deduplicated later)
                  "fail_os": defaultdict(int),  # os_name -> failure count
                  "pass_os": defaultdict(int),  # os_name -> pass count
              })

              artifacts_path = Path(artifacts_dir)
              if not artifacts_path.exists():
                  print("No artifacts directory found", file=sys.stderr)
                  return test_results

              for xml_file in artifacts_path.rglob("*.xml"):
                  # Extract run ID from path (junit-artifacts/run-<id>/...)
                  run_id = "unknown"
                  for part in xml_file.parts:
                      if part.startswith("run-"):
                          run_id = part.removeprefix("run-")
                          break

                  os_name = extract_os_from_path(xml_file)

                  try:
                      tree = ET.parse(xml_file)
                  except ET.ParseError:
                      print(f"Warning: Could not parse {xml_file}", file=sys.stderr)
                      continue

                  root = tree.getroot()

                  # Handle both <testsuites> wrapper and direct <testsuite>
                  if root.tag == "testsuites":
                      testsuites = root.findall("testsuite")
                  elif root.tag == "testsuite":
                      testsuites = [root]
                  else:
                      continue

                  for testsuite in testsuites:
                      for testcase in testsuite.findall("testcase"):
                          name = testcase.get("name", "")
                          classname = testcase.get("classname", "")
                          full_name = f"{classname}::{name}" if classname else name
                          result = test_results[full_name]

                          # Check for nextest's flakyFailure marker
                          flaky_elements = testcase.findall("flakyFailure")
                          if flaky_elements:
                              result["flaky_direct"] += len(flaky_elements)
                              result["pass"].add(run_id)
                              result["pass_os"][os_name] += 1
                              # Capture the failure message from flaky retries
                              for fe in flaky_elements:
                                  msg = fe.get("message", "") or (fe.text or "").strip()
                                  if msg:
                                      result["fail_messages"].append(msg)
                              result["fail_os"][os_name] += 1
                              continue

                          # Check for failure/error
                          failure = testcase.find("failure")
                          error = testcase.find("error")
                          if failure is not None or error is not None:
                              result["fail"].add(run_id)
                              result["fail_os"][os_name] += 1
                              # Capture failure message
                              elem = failure if failure is not None else error
                              msg = elem.get("message", "") or (elem.text or "").strip()
                              if msg:
                                  result["fail_messages"].append(msg)
                          else:
                              result["pass"].add(run_id)
                              result["pass_os"][os_name] += 1

              return test_results

          def identify_flaky_tests(test_results):
              """Identify tests that are flaky based on collected results."""
              flaky_tests = []

              for test_name, results in test_results.items():
                  is_flaky = False
                  reason = ""

                  if results["flaky_direct"] > 0:
                      is_flaky = True
                      reason = f"Marked flaky by nextest ({results['flaky_direct']}x)"
                  elif results["pass"] and results["fail"]:
                      is_flaky = True
                      total = len(results["pass"]) + len(results["fail"])
                      fail_rate = len(results["fail"]) / total * 100
                      reason = f"Intermittent failure ({fail_rate:.0f}% fail rate, {len(results['fail'])}/{total} runs)"

                  if is_flaky:
                      # Deduplicate and truncate failure messages
                      unique_msgs = list(dict.fromkeys(results["fail_messages"]))
                      truncated_msgs = []
                      for msg in unique_msgs[:3]:  # keep at most 3 unique messages
                          msg_oneline = msg.replace("\n", " ").strip()
                          if len(msg_oneline) > 200:
                              msg_oneline = msg_oneline[:197] + "..."
                          truncated_msgs.append(msg_oneline)

                      # Determine which OSes see failures
                      affected_os = sorted(results["fail_os"].keys())
                      all_os = sorted(set(list(results["fail_os"].keys()) + list(results["pass_os"].keys())))

                      flaky_tests.append({
                          "name": test_name,
                          "reason": reason,
                          "pass_count": len(results["pass"]),
                          "fail_count": len(results["fail"]),
                          "flaky_direct": results["flaky_direct"],
                          "fail_run_ids": sorted(results["fail"]),
                          "flaky_run_ids": sorted(results["pass"] | results["fail"]) if results["flaky_direct"] > 0 else [],
                          "fail_messages": truncated_msgs,
                          "affected_os": affected_os,
                          "all_os": all_os,
                      })

              flaky_tests.sort(key=lambda t: (-t["flaky_direct"], -t["fail_count"]))
              return flaky_tests

          def get_previous_flaky_names(issue_label, issue_title):
              """Fetch the set of test names from the existing tracking issue, if any."""
              try:
                  result = subprocess.run(
                      ["gh", "issue", "list",
                       "--label", issue_label,
                       "--state", "open",
                       "--search", issue_title,
                       "--json", "body,title",
                       "--jq", f'.[] | select(.title == "{issue_title}") | .body'],
                      capture_output=True, text=True, timeout=30,
                  )
                  body = result.stdout.strip()
                  if not body:
                      return set()
                  # Extract test names from table rows: | `test_name` | ... |
                  return set(re.findall(r"\|\s*`([^`]+)`\s*\|", body))
              except Exception as e:
                  print(f"Warning: Could not fetch previous issue: {e}", file=sys.stderr)
                  return set()

          def format_issue_body(flaky_tests, lookback_runs, repo_url, previous_names):
              """Format the GitHub issue body as Markdown."""
              lines = []
              lines.append("## Flaky Test Report")
              lines.append("")
              lines.append(f"Automatically generated by scanning JUnit XML results from the last **{lookback_runs}** Rust-CI runs on `main`.")
              lines.append("")

              if not flaky_tests:
                  lines.append("**No flaky tests detected.** :tada:")
                  lines.append("")
                  lines.append("This issue will be updated automatically if flaky tests are detected in future runs.")
                  return "\n".join(lines)

              # Count new tests
              current_names = {t["name"] for t in flaky_tests}
              new_names = current_names - previous_names if previous_names else set()
              resolved_names = previous_names - current_names if previous_names else set()

              lines.append(f"**{len(flaky_tests)} flaky test(s) detected.**")
              if new_names:
                  lines.append(f" :new: **{len(new_names)} new** since last report.")
              if resolved_names:
                  lines.append(f" :white_check_mark: **{len(resolved_names)} resolved** since last report.")
              lines.append("")

              # Summary table
              lines.append("| Status | Test | Platform | Detection | Passes | Failures | Failed Runs |")
              lines.append("|--------|------|----------|-----------|--------|----------|-------------|")

              for t in flaky_tests:
                  name = t["name"]
                  display_name = name
                  if len(display_name) > 80:
                      display_name = "..." + display_name[-77:]

                  # New-vs-recurring badge
                  status = ":new:" if name in new_names else ""

                  # Platform info
                  if t["affected_os"] and t["affected_os"] != ["unknown"]:
                      if set(t["affected_os"]) == set(t["all_os"]):
                          platform = "all platforms"
                      else:
                          platform = ", ".join(t["affected_os"])
                  else:
                      platform = "—"

                  # Build links to the failed/flaky CI runs
                  run_ids = t["fail_run_ids"] or t["flaky_run_ids"]
                  if run_ids:
                      run_links = ", ".join(
                          f"[#{rid[-4:]}]({repo_url}/actions/runs/{rid})" if rid != "unknown" else rid
                          for rid in run_ids[:5]
                      )
                      if len(run_ids) > 5:
                          run_links += f" (+{len(run_ids) - 5} more)"
                  else:
                      run_links = "—"

                  lines.append(
                      f"| {status} | `{display_name}` | {platform} | {t['reason']} | {t['pass_count']} | {t['fail_count']} | {run_links} |"
                  )

              # Failure message details (collapsible section to keep the issue tidy)
              tests_with_msgs = [t for t in flaky_tests if t["fail_messages"]]
              if tests_with_msgs:
                  lines.append("")
                  lines.append("<details>")
                  lines.append("<summary><strong>Failure messages</strong></summary>")
                  lines.append("")
                  for t in tests_with_msgs:
                      name = t["name"]
                      if len(name) > 80:
                          name = "..." + name[-77:]
                      lines.append(f"**`{name}`**")
                      for msg in t["fail_messages"]:
                          lines.append(f"```")
                          lines.append(msg)
                          lines.append(f"```")
                      lines.append("")
                  lines.append("</details>")

              # Resolved tests (if any previously-known tests are no longer flaky)
              if resolved_names:
                  lines.append("")
                  lines.append("<details>")
                  lines.append("<summary><strong>Resolved since last report</strong></summary>")
                  lines.append("")
                  for name in sorted(resolved_names):
                      display_name = name
                      if len(display_name) > 80:
                          display_name = "..." + display_name[-77:]
                      lines.append(f"- ~`{display_name}`~")
                  lines.append("")
                  lines.append("</details>")

              lines.append("")
              lines.append("### How to fix")
              lines.append("")
              lines.append("1. **Investigate** the root cause of each flaky test (timing, resource contention, ordering dependency, etc.)")
              lines.append("2. **Add retries** for known-flaky tests by adding an override to `rust/otap-dataflow/.config/nextest.toml`:")
              lines.append("   ```toml")
              lines.append("   [[profile.ci.overrides]]")
              lines.append('   filter = "test(test_name_here)"')
              lines.append("   retries = 5")
              lines.append("   ```")
              lines.append("3. **Fix** the underlying issue and remove the quarantine override.")
              lines.append("")
              lines.append("---")
              lines.append(f"*Last updated: automatically by [flaky-test-tracker](../actions/workflows/flaky-test-tracker.yml)*")

              return "\n".join(lines)

          if __name__ == "__main__":
              lookback = int(os.environ.get("LOOKBACK_RUNS", "20"))
              repo_url = os.environ.get("GITHUB_REPO_URL", "")
              issue_label = os.environ.get("FLAKY_ISSUE_LABEL", "flaky-test")
              issue_title = "Flaky Test Report (automated)"

              test_results = parse_junit_files("junit-artifacts")
              flaky_tests = identify_flaky_tests(test_results)
              previous_names = get_previous_flaky_names(issue_label, issue_title)
              body = format_issue_body(flaky_tests, lookback, repo_url, previous_names)

              # Write outputs
              with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
                  f.write(f"flaky_count={len(flaky_tests)}\n")

              with open("flaky-report.md", "w") as f:
                  f.write(body)

              print(f"Found {len(flaky_tests)} flaky test(s)")
              for t in flaky_tests:
                  os_info = f" [{', '.join(t['affected_os'])}]" if t["affected_os"] else ""
                  print(f"  - {t['name']}: {t['reason']}{os_info}")
          PYTHON_SCRIPT

          python3 parse_flaky.py

      - name: Create or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BODY=$(cat flaky-report.md)
          TITLE="Flaky Test Report (automated)"

          # Find existing open issue with the flaky-test label and our title
          EXISTING_ISSUE=$(gh issue list \
            --label "$FLAKY_ISSUE_LABEL" \
            --state open \
            --search "$TITLE" \
            --json number,title \
            --jq '.[] | select(.title == "'"$TITLE"'") | .number' \
            | head -1)

          if [[ -n "$EXISTING_ISSUE" ]]; then
            echo "Updating existing issue #$EXISTING_ISSUE"
            gh issue edit "$EXISTING_ISSUE" --body "$BODY"
          else
            echo "Creating new tracking issue"
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "$FLAKY_ISSUE_LABEL"
          fi

      - name: Post summary
        if: always()
        run: |
          if [[ -f flaky-report.md ]]; then
            cat flaky-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
