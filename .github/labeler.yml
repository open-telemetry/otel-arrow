# Path-based PR labeling, applied by .github/workflows/labeler.yml
# (actions/labeler). Label names follow the taxonomy proposed in
# https://github.com/open-telemetry/otel-arrow/issues/1749.
#
# Note: labels referenced here must exist in the repository before they
# can be applied. Until issue #1749 is resolved and the new labels are
# created, actions/labeler will log warnings for missing labels but the
# workflow itself will still succeed.

# --- Language buckets ---------------------------------------------------

lang:go:
  - changed-files:
      - any-glob-to-any-file: "go/**/*"

lang:rust:
  - changed-files:
      - any-glob-to-any-file: "rust/**/*"

# --- Repo infrastructure ------------------------------------------------

ci-repo:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**/*"
          - "Makefile"
          - "tools/**/*"

release:
  - changed-files:
      - any-glob-to-any-file:
          - "**/.chloggen/**"
          - "**/CHANGELOG.md"
          - "RELEASING.md"
          - ".github/workflows/prepare-release.yml"
          - ".github/workflows/push-release.yml"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**/*"
          - "rust/otap-dataflow/docs/**/*"

# --- Cross-cutting areas ------------------------------------------------

area:apache-arrow:
  - changed-files:
      - any-glob-to-any-file:
          - "go/pkg/arrow/**"
          - "go/pkg/otel/**/arrow/**"

# --- Pipeline / dataflow engine -----------------------------------------

area:engine:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/engine/**"
          - "rust/otap-dataflow/crates/engine-macros/**"
          - "rust/otap-dataflow/crates/controller/**"
          - "rust/otap-dataflow/crates/channel/**"
          - "rust/otap-dataflow/crates/control-channel/**"
          - "rust/otap-dataflow/crates/state/**"
          - "rust/otap-dataflow/crates/admin/**"
          - "rust/otap-dataflow/crates/admin-api/**"
          - "rust/otap-dataflow/crates/admin-types/**"

area:engine/config:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/config/**"

area:pipeline:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/otap/**"
          - "rust/otap-dataflow/crates/core-nodes/**"
          - "rust/otap-dataflow/crates/contrib-nodes/**"

# --- Node-type areas (rust/otap-dataflow contrib + core nodes) ----------

area:receiver:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/*receiver*/**"
          - "rust/otap-dataflow/crates/core-nodes/src/receivers/**"
          - "rust/otap-dataflow/crates/contrib-nodes/src/receivers/**"

area:processor:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/*processor*/**"
          - "rust/otap-dataflow/crates/core-nodes/src/processors/**"
          - "rust/otap-dataflow/crates/contrib-nodes/src/processors/**"

area:exporter:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/*exporter*/**"
          - "rust/otap-dataflow/crates/core-nodes/src/exporters/**"
          - "rust/otap-dataflow/crates/contrib-nodes/src/exporters/**"

area:syslog:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/**/*syslog*/**"

area:parquet:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/**/*parquet*/**"

# --- Observability / telemetry of the dataflow itself -------------------

area:observability:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/telemetry/**"
          - "rust/otap-dataflow/crates/telemetry-macros/**"

area:quiver:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/quiver/**"
          - "rust/otap-dataflow/crates/quiver-e2e/**"

area:validation:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/validation/**"

# --- Query engine -------------------------------------------------------

area:query-engine:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/query-engine/**"
          - "rust/otap-dataflow/crates/query-engine-languages/**"
          - "rust/experimental/query_engine/**"

area:query-engine/otap:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/query-engine/**"

area:query-engine/recordset:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/experimental/query_engine/engine-recordset*/**"

area:query-engine/kql:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/experimental/query_engine/kql-parser/**"

area:query-engine/ottl:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/query-engine-languages/src/ottl/**"

area:opl-parser:
  - changed-files:
      - any-glob-to-any-file:
          - "rust/otap-dataflow/crates/query-engine-languages/src/opl/**"
