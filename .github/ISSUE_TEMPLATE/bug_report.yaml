name: Bug Report
description: Report a bug in OTel-Arrow
type: Bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!
        Please fill out the information below to help us diagnose and fix the issue.

  - type: checkboxes
    id: searched
    attributes:
      label: Pre-filing checklist
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Component(s)
      description: Which component(s) does this bug affect?
      multiple: true
      options:
        - Rust OTAP dataflow (rust/otap-dataflow/)
        - Go OTel Arrow Receiver/Exporter (go/)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
            1. Set up ...
            2. Run command ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages and logs if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OTel-Arrow Version
      description: The OTel-Arrow version or commit hash.
      placeholder: "e.g., bae72455"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide relevant environment details.
      placeholder: |
        - OS: [e.g., Ubuntu 22.04, macOS 14, Windows 11]
        - Rust version: [e.g., 1.94.0]
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant configuration (collector YAML, code snippets, etc.).
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: Relevant log output or error messages.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (screenshots, related issues, etc.).
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        **Tip:** React with :+1: to help us prioritize this issue. Use comments to add helpful context, not just "+1".
