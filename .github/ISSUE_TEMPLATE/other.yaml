name: Other Issue
description: Report an issue that doesn't fit the bug, feature request, or task templates
labels: ["triage:deciding"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for questions, discussion topics, or anything else that doesn't fit the bug, feature request, or task templates.

  - type: checkboxes
    id: searched
    attributes:
      label: Pre-filing checklist
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Component(s)
      description: Which component(s) does this relate to?
      multiple: true
      options:
        - Rust OTAP dataflow (rust/otap-dataflow/)
        - Rust Beaubourg (rust/beaubourg/)
        - Documentation
        - CI / Build
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the issue.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, references, or screenshots.
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        **Tip:** React with :+1: to help us prioritize this issue. Use comments to add helpful context, not just "+1".
