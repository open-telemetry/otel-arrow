# Configuration for the Perf Regression Watcher workflow.
#
# The watcher reads this file from the default branch on every run.
# Editing it here is enough to retune thresholds — no workflow change required.

# Default threshold used when a benchmark has no explicit override below.
# A benchmark is flagged when |current - previous| / previous * 100 >= threshold.
default_threshold_pct: 10

# Allowlist of benchmarks the scheduled watcher monitors. Empty/missing = all
# discovered data.js files. Use this to keep the signal high while flaky
# benchmarks (e.g. scaling-efficiency, idle-*) are stabilized; expand as
# benchmarks earn maintainer trust.
monitor:
  - docs/benchmarks/nightly/syslog/data.js      # syslog UDP

# Per-benchmark overrides. The `path` must match a data.js file under
# docs/benchmarks/ on the benchmarks branch. Optional `metrics:` list scopes
# the override to specific bench names within that file; if omitted, the
# override applies to every metric in the file.
metric_overrides:
  - path: docs/benchmarks/binary-size/data.js
    threshold_pct: 5

# Paths to exclude from the watcher entirely (relative to repo root on the
# benchmarks branch).
ignored_paths: []
