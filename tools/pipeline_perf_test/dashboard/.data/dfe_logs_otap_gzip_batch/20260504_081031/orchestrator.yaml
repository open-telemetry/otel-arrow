name: DFE OTAP Batch Processor w/ Gzip (Logs)
components:
  load-generator:
    deployment:
      docker:
        image: df_engine:latest
        network: testbed
        ports:
          - "8085:8080"
        volumes:
          - 'dashboard/.data/dfe_logs_otap_gzip_batch/20260504_081031/loadgen-config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8085/api/v1/telemetry/metrics?format=prometheus&reset=false
  df-engine:
    deployment:
      docker:
        image: df_engine:latest
        network: testbed
        ports:
          - "8086:8080"
        volumes:
          - 'dashboard/.data/dfe_logs_otap_gzip_batch/20260504_081031/engine-config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8086/api/v1/telemetry/metrics?format=prometheus&reset=false
  backend-service:
    deployment:
      docker:
        image: df_engine:latest
        network: testbed
        ports:
          - "8087:8080"
        volumes:
          - 'dashboard/.data/dfe_logs_otap_gzip_batch/20260504_081031/backend-config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8087/api/v1/telemetry/metrics?format=prometheus&reset=false

tests:
  # 100k: 1 loadgen core
  - name: 100k
    from_template:
      path: dashboard/templates/steps/df-engine.yaml
      variables:
        engine_config_template: dashboard/templates/engine/otap-batch-otap.yaml
        loadgen_config_template: dashboard/templates/loadgen/otap.yaml.j2
        backend_config_template: dashboard/templates/backend/otap.yaml.j2
        data_dir: dashboard/.data/dfe_logs_otap_gzip_batch/20260504_081031
        test_dir: dashboard/.data/dfe_logs_otap_gzip_batch/20260504_081031/tests/100k
        report_config: dashboard/reports/integration_report_logs.yaml
        compression_method: gzip
        report_name: "DF Engine 100k - DFE OTAP Batch Processor w/ Gzip (Logs)"
        observation_interval: 20
        signals_per_second: 100000
        max_batch_size: 1000
        log_weight: 100
        metric_weight: 0
        trace_weight: 0
        engine_core_start: 0
        engine_core_end: 0
        backend_core_start: 1
        backend_core_end: 1
        loadgen_core_start: 2
        loadgen_core_end: 2

