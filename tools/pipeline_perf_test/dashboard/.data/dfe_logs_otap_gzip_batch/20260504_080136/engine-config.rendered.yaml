version: otel_dataflow/v1
policies:
  channel_capacity:
    control:
      node: 100
      pipeline: 100
    pdata: 100
  resources:
    core_allocation:
      type: core_set
      set:
        - start: 0
          end: 0
engine:
  telemetry:
    logs:
      level: info
groups:
  default:
    pipelines:
      main:
        nodes:
          receiver:
            type: urn:otel:receiver:otap
            config:
              listening_addr: 0.0.0.0:4317
              response_stream_channel_size: 100
              wait_for_result: true
              compression_method: gzip
          batch:
            type: urn:otel:processor:batch
            config:
              otlp:
                min_size: 8192
                max_size: 8192
                sizer: items
              max_batch_duration: 200ms
          exporter:
            type: urn:otel:exporter:otap
            config:
              grpc_endpoint: http://backend-service:1235
              compression_method: gzip
              arrow:
                payload_compression: none
        connections:
          - from: receiver
            to: batch
          - from: batch
            to: exporter