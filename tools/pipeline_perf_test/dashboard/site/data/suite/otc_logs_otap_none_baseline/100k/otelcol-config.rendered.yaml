receivers:
  otelarrow:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  otelarrow:
    endpoint: 'backend-service:1235'
    compression: none
    tls:
      insecure: true
    arrow:
      payload_compression: none
      disabled: false

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8086
  pipelines:
    logs/arrow:
      receivers: [otelarrow]
      exporters: [otelarrow]
    metrics/arrow:
      receivers: [otelarrow]
      exporters: [otelarrow]
    traces/arrow:
      receivers: [otelarrow]
      exporters: [otelarrow]