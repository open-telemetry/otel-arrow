version: otel_dataflow/v1
policies:
  channel_capacity:
    control:
      node: 100
      pipeline: 100
    pdata: 100
  resources:
    core_allocation:
      type: core_set
      set:
        - start: 0
          end: 0
engine:
  telemetry:
    logs:
      level: info
groups:
  default:
    pipelines:
      main:
        nodes:
          receiver:
            type: urn:otel:receiver:otlp
            config:
              protocols:
                grpc:
                  listening_addr: 0.0.0.0:4317
                  wait_for_result: false
          batch:
            type: urn:otel:processor:batch
            config:
              otlp:
                min_size: 262144
                sizer: bytes
              max_batch_duration: 200ms
          exporter:
            type: urn:otel:exporter:otlp_grpc
            config:
              grpc_endpoint: http://backend-service:1235
              compression_method: 
        connections:
        - from: receiver
          to: batch
        - from: batch
          to: exporter