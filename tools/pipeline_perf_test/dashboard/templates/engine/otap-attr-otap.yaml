version: otel_dataflow/v1
policies:
  channel_capacity:
    control:
      node: 100
      pipeline: 100
    pdata: 100
  resources:
    core_allocation:
      type: core_set
      set:
        - start: {{core_start}}
          end: {{core_end}}
engine:
  telemetry:
    logs:
      level: info
groups:
  default:
    pipelines:
      main:
        nodes:
          receiver:
            type: urn:otel:receiver:otap
            config:
              listening_addr: 0.0.0.0:4317
              response_stream_channel_size: 100
              compression_method: {% if compression_method == "none" %}null{% else %}{{compression_method}}{% endif %}
          attr:
            type: urn:otel:processor:attribute
            config:
              actions:
              - action: rename
                source_key: ios.app.state
                destination_key: ios.app.state2
                apply_to:
                - signal
          exporter:
            type: urn:otel:exporter:otap
            config:
              grpc_endpoint: http://{{backend_hostname}}:1235
              compression_method: {{ compression_method | default("none") }}
              arrow:
                payload_compression: {{ payload_compression | default("none") }}
        connections:
          - from: receiver
            to: attr
          - from: attr
            to: exporter
