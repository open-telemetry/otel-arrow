receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  otlp:
    endpoint: '{{backend_hostname}}:1235'
    compression: {{ compression_method | default("none") }}
    tls:
      insecure: true

processors:
  batch: 
    send_batch_size: {{ send_batch_size | default(8192) }}
    send_batch_max_size: {{ send_batch_maz_size | default(0) }}
    timeout: {{ batch_timeout | default("200ms") }}

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8086
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp]
