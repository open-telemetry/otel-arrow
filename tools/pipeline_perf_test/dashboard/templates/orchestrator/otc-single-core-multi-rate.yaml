name: {{suite_name}}
components:
  load-generator:
    deployment:
      docker:
        image: {{df_engine_image}}
        network: testbed
        ports:
          - "8085:8080"
        volumes:
          - '{{data_dir}}/loadgen-config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8085/api/v1/telemetry/metrics?format=prometheus&reset=false
  go-collector:
    deployment:
      docker:
        image: {{otelcol_image}}
        network: testbed
        ports:
          - "8086:8086"
        volumes:
          - '{{data_dir}}/otelcol-config.rendered.yaml:/tmp/config.yaml:ro'
        environment:
          - GOMAXPROCS={{default.otelcol_gomaxprocs | default(1)}}
{%- if default.otelcol_gomemlimit is defined %}
          - GOMEMLIMIT={{default.otelcol_gomemlimit}}
{%- endif %}
        command:
          - "--config"
          - "/tmp/config.yaml"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8086/metrics
  backend-service:
    deployment:
      docker:
        image: {{df_engine_image}}
        network: testbed
        ports:
          - "8087:8080"
        volumes:
          - '{{data_dir}}/backend-config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8087/api/v1/telemetry/metrics?format=prometheus&reset=false

{%- set signal = default.signal | default("logs") %}
{%- if signal == "logs" %}
{%- set log_weight = 100 %}{%- set metric_weight = 0 %}{%- set trace_weight = 0 %}
{%- elif signal == "metrics" %}
{%- set log_weight = 0 %}{%- set metric_weight = 100 %}{%- set trace_weight = 0 %}
{%- elif signal == "traces" %}
{%- set log_weight = 0 %}{%- set metric_weight = 0 %}{%- set trace_weight = 100 %}
{%- endif %}

tests:
  # 100k: 1 loadgen core
  - name: 100k
    from_template:
      path: dashboard/templates/steps/otelcol.yaml
      variables:
        collector_config_template: {{default.collector_config}}
        loadgen_config_template: {{default.loadgen_config}}
        backend_config_template: {{default.backend_config}}
        data_dir: {{data_dir}}
        test_dir: {{data_dir}}/tests/100k
        report_config: {{default.report}}
        compression_method: {{default.compression_method | default("none")}}
        report_name: "OTel Collector 100k - {{suite_name}}"
        observation_interval: {{default.observation_interval | default(20)}}
        signals_per_second: 100000
        max_batch_size: {{default.max_batch_size | default(1000)}}
        log_weight: {{log_weight}}
        metric_weight: {{metric_weight}}
        trace_weight: {{trace_weight}}
        backend_core_start: 1
        backend_core_end: 1
        loadgen_core_start: 2
        loadgen_core_end: 2

