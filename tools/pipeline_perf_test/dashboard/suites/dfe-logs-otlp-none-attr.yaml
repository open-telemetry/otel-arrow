name: DFE OTLP Attribute Processor (Logs)
slug: dfe_logs_otlp_none_attr
description: Dataflow Engine Attribute processor for OTLP logs replacing a single attribute
orchestrator_template: dashboard/templates/orchestrator/dfe-single-core-multi-rate.yaml

meta:
  binary: dfe
  protocols: [otap]
  signals: [logs]
  compression: none

variables:
  report: dashboard/reports/integration_report_logs.yaml
  engine_config: dashboard/templates/engine/otlp-attr-otlp.yaml
  loadgen_config: dashboard/templates/loadgen/otlp.yaml.j2
  backend_config: dashboard/templates/backend/otlp.yaml.j2
  protocol: otlp
  signal: logs
  observation_interval: 20
  max_batch_size: 1000
  compression_method: none
