name: OTC OTLP Batch Processor (Logs)
slug: otc_logs_otlp_none_batch
description: OpenTelemetry Collector OTLP logs through a batch processor with no compression
orchestrator_template: dashboard/templates/orchestrator/otc-single-core-multi-rate.yaml

meta:
  binary: otc
  protocols: [otlp]
  signals: [logs]
  compression: none

variables:
  report: dashboard/reports/integration_report_logs.yaml
  collector_config: dashboard/templates/otelcol/otlp-batch-otlp.yaml
  loadgen_config: dashboard/templates/loadgen/otlp.yaml.j2
  backend_config: dashboard/templates/backend/otlp.yaml.j2
  protocol: otlp
  signal: logs
  observation_interval: 20
  max_batch_size: 1000
  compression_method: none
  otelcol_gomaxprocs: 1
