# Idle State Performance Test (Windows) - Single Core
# Measures baseline resource consumption with no active telemetry traffic on 1 core
# Uses Windows Docker containers on GitHub Actions windows-latest runner
from_template:
  path: test_suites/integration/continuous/idle-state-template-windows.yaml.j2
  variables:
    core_label: "Single Core"
    core_range: "0-0"
    allocated_cores: 1
    port: 8086
    result_subdir: "1core"
