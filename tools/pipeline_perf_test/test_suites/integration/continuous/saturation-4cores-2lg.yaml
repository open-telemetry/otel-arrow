# Saturation test: 4-core engine with 2 separate loadgen containers.
# Two containers = different source IPs = better SO_REUSEPORT distribution.
# Layout (16 cores total):
#   Engine:       cores 0-3  (4 cores)
#   Loadgen 1:    cores 4-5  (2 cores)
#   Loadgen 2:    cores 6-7  (2 cores)
#   Backend:      cores 12-15 (4 cores)
from_template:
  path: test_suites/integration/continuous/saturation-2lg-template.yaml.j2
  variables:
    num_cores: 4
    engine_core_range: "0-3"
    loadgen1_cores: 2
    loadgen1_core_range: "4-5"
    loadgen2_cores: 2
    loadgen2_core_range: "6-7"
    backend_cores: 4
    backend_core_range: "12-15"
    max_batch_size: 512
