# Saturation test with 1 core df_engine
from_template:
  path: test_suites/integration/continuous/saturation-cores-template.yaml.j2
  variables:
    num_cores: 1
    engine_core_range: "0-0"
    loadgen_cores: 2
    loadgen_core_range: "1-2"
    backend_cores: 1
    backend_core_range: "3-3"
    max_batch_size: 512
