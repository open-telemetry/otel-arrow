steps:
  - name: Deploy Backend Engine
    action:
      component_action:
        phase: deploy
        target: backend-service
    hooks:
      run:
        pre:
          # Render the engine config into the suite config directory
          - render_template:
              template_path: './test_suites/integration/templates/configs/backend/config.yaml.j2'
              output_path: ./test_suites/integration/configs/backend/config.rendered.yaml
              variables:
                # ----- General settings -----
                # default_pipeline_ctrl_msg_channel_size: 100
                # default_node_ctrl_msg_channel_size: 100
                # default_pdata_channel_size: 100
                # ----- Receiver config -----
                # backend_receiver_type: otap             # Options: otap, otlp, or custom/invalid
                # listening_addr: "0.0.0.0:1235"
                # compression_method: zstd                # Default is 'zstd' for otap, 'gzip' for otlp
                backend_receiver_type: '{{backend_receiver_type}}'
        post:
          # Wait for the telemetry endpoint to be active (TODO: switch to healthcheck endpoint when available).
          - ready_check_http:
              url: http://localhost:8087/api/v1/telemetry/metrics?reset=false
              method: GET
              expected_status_code: 200
  - name: Deploy Dataflow Engine
    action:
      component_action:
        phase: deploy
        target: df-engine
    hooks:
      run:
        pre:
          # Render the engine config into the suite config directory
          - render_template:
              template_path: '{{engine_config_template}}'
              output_path: ./test_suites/integration/configs/engine/config.rendered.yaml
              variables:
                backend_hostname: backend-service
        post:
          # Wait for the telemetry endpoint to be active (TODO: switch to healthcheck endpoint when available).
          - ready_check_http:
              url: http://localhost:8086/api/v1/telemetry/metrics?reset=false
              method: GET
              expected_status_code: 200
  - name: Deploy Load Generator
    action:
      component_action:
        phase: deploy
        target: load-generator
    hooks:
      run:
        pre:
          # Render the engine config into the suite config directory
          - render_template:
              template_path: './test_suites/integration/templates/configs/loadgen/config.yaml.j2'
              output_path: ./test_suites/integration/configs/loadgen/config.rendered.yaml
              variables:
                # ----- General settings -----
                # default_pipeline_ctrl_msg_channel_size: 100
                # default_node_ctrl_msg_channel_size: 100
                # default_pdata_channel_size: 100
                # ----- Receiver traffic config -----
                max_batch_size: {{max_batch_size | default(1000)}}
                signals_per_second: {% if signals_per_second is none %}null{% else %}{{signals_per_second | default(100000)}}{% endif %}
                generation_strategy: {{generation_strategy | default("pre_generated")}}
                metric_weight: {{metric_weight | default(0)}}
                trace_weight: {{trace_weight | default(0)}}
                log_weight: {{log_weight | default(100)}}
                # registry_path: "https://github.com/open-telemetry/semantic-conventions.git[model]"
                # ----- Exporter config -----
                # loadgen_exporter_type: otap        # Options: otap, otlp, or custom/invalid
                # engine_hostname: localhost
                # exporter_port: 4317
                # compression_method: zstd           # Default is 'zstd' for otap, 'gzip' for otlp
                engine_hostname: df-engine
                loadgen_exporter_type: '{{loadgen_exporter_type}}'
                {% if exporter_extra_config is defined %}exporter_extra_config: {{exporter_extra_config}}{% endif %}

        post:
          # Wait for the telemetry endpoint to be active (TODO: switch to healthcheck endpoint when available).
          - ready_check_http:
              url: http://localhost:8085/api/v1/telemetry/metrics?reset=false
              method: GET
              expected_status_code: 200
  - name: Monitor All
    action:
      multi_component_action:
        phase: start_monitoring
        targets:
          - backend-service
          - load-generator
          - df-engine
  - name: Wait for data
    action:
      wait:
        delay_seconds: {{wait_for_data_interval | default(5)}}
  # This is the main observation window, marked by custome events at start/stop
  - name: Observe Load
    action:
      wait:
        delay_seconds: {{observation_interval | default(20)}}
    hooks:
      run:
        pre:
          - record_event:
              name: observation_start
        post:
          - record_event:
              name: observation_stop
  # Stop the load generator from sending traffic.
  # Uses wait=false so the orchestrator is not blocked waiting for pipeline
  # drain to complete. The admin server stays alive after pipeline shutdown
  # by design (run_forever parks the main thread), so wait=true would block
  # until timeout_secs and then return 504 -- aborting the suite before the
  # report step runs and losing all collected metrics.
  # Instead we initiate the drain (wait=false, immediate 202) then poll
  # /readyz until pipelines terminate (503) or the endpoint stops responding.
  - name: Stop Load Generator
    hooks:
      run:
        pre:
          - send_http_request:
              url: http://localhost:8085/api/v1/groups/shutdown?wait=false&timeout_secs={{drain_timeout_secs | default(60)}}
              headers:
                "Content-Type": "application/json"
              timeout: 10
              on_error:
                continue: true
          - run_command:
              command: >-
                for i in $(seq 1 60); do
                  status=$(curl -sf -o /dev/null -w "%{http_code}"
                    http://localhost:8085/api/v1/readyz 2>/dev/null || echo "000");
                  if [ "$status" = "503" ] || [ "$status" = "000" ]; then
                    echo "Load generator no longer ready after $((i * 5))s (status=${status})";
                    exit 0;
                  fi;
                  sleep 5;
                done;
                echo "WARNING: Load generator still running after 300s, proceeding anyway";
                exit 0
    action:
      no_op: {}
  # Stop the df-engine and wait for it to drain in-flight data to backend.
  - name: Stop Engine
    hooks:
      run:
        pre:
          - send_http_request:
              url: http://localhost:8086/api/v1/groups/shutdown?wait=false&timeout_secs={{drain_timeout_secs | default(60)}}
              headers:
                "Content-Type": "application/json"
              timeout: 10
              on_error:
                continue: true
          - run_command:
              command: >-
                for i in $(seq 1 60); do
                  status=$(curl -sf -o /dev/null -w "%{http_code}"
                    http://localhost:8086/api/v1/readyz 2>/dev/null || echo "000");
                  if [ "$status" = "503" ] || [ "$status" = "000" ]; then
                    echo "Engine no longer ready after $((i * 5))s (status=${status})";
                    exit 0;
                  fi;
                  sleep 5;
                done;
                echo "WARNING: Engine still running after 300s, proceeding anyway";
                exit 0
    action:
      no_op: {}
  # Stop the backend-service (ensures any internal processing completes).
  - name: Stop Backend
    hooks:
      run:
        pre:
          - send_http_request:
              url: http://localhost:8087/api/v1/groups/shutdown?wait=false&timeout_secs={{drain_timeout_secs | default(60)}}
              headers:
                "Content-Type": "application/json"
              timeout: 10
              on_error:
                continue: true
          - run_command:
              command: >-
                for i in $(seq 1 60); do
                  status=$(curl -sf -o /dev/null -w "%{http_code}"
                    http://localhost:8087/api/v1/readyz 2>/dev/null || echo "000");
                  if [ "$status" = "503" ] || [ "$status" = "000" ]; then
                    echo "Backend no longer ready after $((i * 5))s (status=${status})";
                    exit 0;
                  fi;
                  sleep 5;
                done;
                echo "WARNING: Backend still running after 300s, proceeding anyway";
                exit 0
    action:
      no_op: {}
  # Brief wait to ensure final metrics are visible before scraping.
  - name: Wait For Metrics Update
    action:
      wait:
        delay_seconds: 1
  # Stop monitoring all components.
  - name: Stop Monitoring All
    action:
      multi_component_action:
        phase: stop_monitoring
        targets:
          - backend-service
          - load-generator
          - df-engine
  # Stop all running components.
  - name: Destroy All
    action:
      multi_component_action:
        phase: destroy
        targets:
          - load-generator
          - df-engine
          - backend-service
  # Run the report
  - name: Run Report
    action:
      wait:
        delay_seconds: 0
    hooks:
      run:
        post:
          # Print all Docker container logs
          - print_container_logs: {}
          - sql_report:
              name: Integration Report - Logs
              report_config_file: {{report_config | default('./test_suites/integration/configs/integration_report_logs.yaml')}}
              output:
                - format:
                    template: {}
                  destination:
                    console: {}
                - format:
                    template:
                      path:  ./test_suites/integration/templates/reports/gh-action-sqlreport.j2
                  destination:
                    file:
                      directory: results/{{result_dir | default('integration')}}/gh-actions-benchmark
