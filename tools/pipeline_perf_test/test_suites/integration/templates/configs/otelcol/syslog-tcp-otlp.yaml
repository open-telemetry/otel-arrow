receivers:
  syslog:
    tcp:
      listen_address: "0.0.0.0:4317"
    protocol: rfc3164

exporters:
  otlp:
    endpoint: '{{backend_hostname}}:1235'
    tls:
      insecure: true
    sending_queue:
      enabled: false

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8086
  pipelines:
    logs:
      receivers: [syslog]
      exporters: [otlp]
