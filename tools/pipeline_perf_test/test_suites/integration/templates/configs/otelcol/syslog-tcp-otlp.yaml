receivers:
  syslog:
    tcp:
      listen_address: "0.0.0.0:4317"
    protocol: rfc3164

exporters:
  otlp:
    endpoint: '{{backend_hostname}}:1235'
    tls:
      insecure: true
    # 100 standing requests, 5 at a time, asynchronous, no batching.
    sending_queue:
      enabled: true
      sizer: requests
      queue_size: 100
      num_consumers: 5
      block_on_overflow: true
      batch:
        enabled: false

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8086
  pipelines:
    logs:
      receivers: [syslog]
      exporters: [otlp]
