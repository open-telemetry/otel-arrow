receivers:
  syslog:
    tcp:
      listen_address: "0.0.0.0:4317"
    protocol: rfc3164

exporters:
  otelarrow:
    endpoint: '{{backend_hostname}}:1235'
    compression: none
    arrow:
      payload_compression: zstd
    tls:
      insecure: true

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8086
  pipelines:
    logs:
      receivers: [syslog]
      exporters: [otelarrow]
