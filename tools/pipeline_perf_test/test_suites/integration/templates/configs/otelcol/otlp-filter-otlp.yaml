receivers:
  # otelarrow is used as the OTLP receiver for its admission controller.
  otelarrow:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
    admission:
      # memory limits applies to OTAP and OTLP data.
      request_limit_mib: 128
      waiting_limit_mib: 32

exporters:
  otlp:
    endpoint: '{{backend_hostname}}:1235'
    tls:
      insecure: true
    # 100 standing requests, 5 at a time, asynchronous, no batching.
    sending_queue:
      enabled: true
      sizer: requests
      queue_size: 100
      num_consumers: 5
      block_on_overflow: true
      batch:
        enabled: false

processors:
  filter:
    error_mode: ignore
    logs:
      include:
        match_type: strict
        record_attributes:
          - key: ios.app.state
            value: active
service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8086
  pipelines:
    logs:
      receivers: [otelarrow]
      processors: [filter]
      exporters: [otlp]
