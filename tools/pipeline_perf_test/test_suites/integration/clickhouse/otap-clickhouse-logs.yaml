name: ClickHouse OTAP Logs
components:
  load-generator:
    deployment:
      docker:
        image: df_engine:latest
        network: testbed
        ports:
          - "8085:8080"
        volumes:
          - 'test_suites/integration/configs/loadgen/config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--core-id-range"
          - "2-2"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8085/api/v1/telemetry/metrics?format=prometheus&reset=false

  df-engine:
    deployment:
      docker:
        image: df_engine:latest
        network: testbed
        ports:
          - "8086:8080"
        volumes:
          - 'test_suites/integration/configs/engine/config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--core-id-range"
          - "3-3"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8086/api/v1/telemetry/metrics?format=prometheus&reset=false

  clickhouse:
    deployment:
      docker:
        image: clickhouse/clickhouse-server:25.6@sha256:00d0f351e150ee2e7a1842ecc217066ab2c4a4781931f262ee99460ed4e2fcf7
        network: testbed
        cpuset_cpus: "4-7"
        ports:
          - "8123:8123"
        environment:
          CLICKHOUSE_PASSWORD: test
    monitoring:
      docker_component:
        allocated_cores: 4

tests:
  - name: OTAP-CLICKHOUSE-LOGS-SYNC
    from_template:
      path: test_suites/integration/templates/test_steps/df-loadgen-clickhouse-steps-docker.yaml
      variables:
        engine_config_template: test_suites/integration/templates/configs/engine/clickhouse/otap-clickhouse-logs.yaml.j2
        clickhouse_database: otap_perf_sync
        clickhouse_async_insert: false
        loadgen_exporter_type: otap
        max_batch_size: 512
        signals_per_second: 50000
        observation_interval: 60
        result_dir: clickhouse
  - name: OTAP-CLICKHOUSE-LOGS-ASYNC
    from_template:
      path: test_suites/integration/templates/test_steps/df-loadgen-clickhouse-steps-docker.yaml
      variables:
        engine_config_template: test_suites/integration/templates/configs/engine/clickhouse/otap-clickhouse-logs.yaml.j2
        clickhouse_database: otap_perf_async
        clickhouse_async_insert: true
        loadgen_exporter_type: otap
        max_batch_size: 512
        signals_per_second: 100000
        observation_interval: 60
        result_dir: clickhouse
