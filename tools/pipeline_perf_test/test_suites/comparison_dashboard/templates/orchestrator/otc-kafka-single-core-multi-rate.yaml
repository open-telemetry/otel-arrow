name: {{suite_name}}
components:
  load-generator:
    deployment:
      docker:
        image: {{df_engine_image}}
        network: testbed
        ports:
          - "8085:8080"
        volumes:
          - '{{data_dir}}/loadgen-config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8085/api/v1/telemetry/metrics?format=prometheus&reset=false
  kafka-producer:
    deployment:
      docker:
        image: {{otelcol_image}}
        network: testbed
        ports:
          - "8086:8086"
        volumes:
          - '{{data_dir}}/kafka-producer-config.rendered.yaml:/tmp/config.yaml:ro'
        environment:
          - GOMAXPROCS={{variables.otelcol_gomaxprocs | default(1)}}
{%- if variables.otelcol_gomemlimit is defined %}
          - GOMEMLIMIT={{variables.otelcol_gomemlimit}}
{%- endif %}
        command:
          - "--config"
          - "/tmp/config.yaml"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8086/metrics
  kafka-broker:
    deployment:
      docker:
        image: {{kafka_image}}
        network: testbed
        ports:
          - "9094:9094"
        environment:
          - KAFKA_NODE_ID=1
          - KAFKA_PROCESS_ROLES=broker,controller
          - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-broker:9093
          - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
          - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-broker:9092,EXTERNAL://localhost:9094
          - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
          - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
          - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
          - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
          - KAFKA_NUM_PARTITIONS=1
          - KAFKA_LOG_RETENTION_MS=300000
          - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
          - CLUSTER_ID=benchmark-kafka-cluster-id
    monitoring:
      docker_component:
        allocated_cores: 1
  kafka-consumer:
    deployment:
      docker:
        image: {{otelcol_image}}
        network: testbed
        ports:
          - "8088:8088"
        volumes:
          - '{{data_dir}}/kafka-consumer-config.rendered.yaml:/tmp/config.yaml:ro'
        environment:
          - GOMAXPROCS={{variables.otelcol_gomaxprocs | default(1)}}
{%- if variables.otelcol_gomemlimit is defined %}
          - GOMEMLIMIT={{variables.otelcol_gomemlimit}}
{%- endif %}
        command:
          - "--config"
          - "/tmp/config.yaml"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8088/metrics
  backend-service:
    deployment:
      docker:
        image: {{df_engine_image}}
        network: testbed
        ports:
          - "8087:8080"
        volumes:
          - '{{data_dir}}/backend-config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8087/api/v1/telemetry/metrics?format=prometheus&reset=false

{%- set signal = variables.signal | default("logs") %}
{%- if signal == "logs" %}
{%- set log_weight = 100 %}{%- set metric_weight = 0 %}{%- set trace_weight = 0 %}
{%- elif signal == "metrics" %}
{%- set log_weight = 0 %}{%- set metric_weight = 100 %}{%- set trace_weight = 0 %}
{%- elif signal == "traces" %}
{%- set log_weight = 0 %}{%- set metric_weight = 0 %}{%- set trace_weight = 100 %}
{%- endif %}

{# Spread every suite-defined variable as a flat key (so step/leaf templates can
reference them by bare name) and forward the whole `variables` dict so any
downstream template can also use namespaced access (`variables.X`). Per-test
overrides below the spread win on key collision. #}
{% macro forward_variables() -%}
{%- for k, v in variables.items() %}
        {{ k }}: {{ v | tojson }}
{%- endfor %}
        variables: {{ variables | tojson }}
{%- endmacro -%}

tests:
  # 100k: 1 loadgen core
  - name: 100k
    from_template:
      path: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/steps/otelcol-kafka.yaml
      variables:{{ forward_variables() }}
        data_dir: {{data_dir}}
        test_dir: {{data_dir}}/tests/100k
        report_name: "OTel Collector Kafka 100k - {{suite_name}}"
        observation_interval: {{observation_interval}}
        signals_per_second: 100000
        log_weight: {{log_weight}}
        metric_weight: {{metric_weight}}
        trace_weight: {{trace_weight}}
        backend_core_start: 2
        backend_core_end: 2
        loadgen_core_start: 3
        loadgen_core_end: 3

