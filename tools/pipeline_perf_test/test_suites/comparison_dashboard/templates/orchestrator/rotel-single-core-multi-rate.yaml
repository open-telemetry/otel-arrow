{%- set protocol = variables.protocol | default("otlp") %}
{%- set compression = variables.compression_method | default("none") %}
{%- set batch_max_size = variables.rotel_batch_max_size | default(8192) %}
{%- set batch_timeout = variables.rotel_batch_timeout | default("200ms") %}
name: {{suite_name}}
components:
  load-generator:
    deployment:
      docker:
        image: {{df_engine_image}}
        network: testbed
        ports:
          - "8085:8080"
        volumes:
          - '{{data_dir}}/loadgen-config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8085/api/v1/telemetry/metrics?format=prometheus&reset=false
  rotel:
    deployment:
      docker:
        image: {{rotel_image}}
        network: testbed
        environment:
          - TOKIO_WORKER_THREADS=1
          - RUST_LOG=info
        # rotel image ENTRYPOINT is `/rotel start --otlp-grpc-endpoint 0.0.0.0:4317
        # --otlp-http-endpoint 0.0.0.0:4318`, so receivers are already bound.
        # We only append exporter + batch tuning here.
        command:
          - "--exporter"
          - "otlp"
{%- if protocol == "otlphttp" %}
          - "--otlp-exporter-protocol"
          - "http"
          - "--otlp-exporter-endpoint"
          - "backend-service:1235"
{%- else %}
          - "--otlp-exporter-protocol"
          - "grpc"
          - "--otlp-exporter-endpoint"
          - "backend-service:1235"
{%- endif %}
          - "--otlp-exporter-compression"
          - "{{compression}}"
          - "--batch-max-size"
          - "{{batch_max_size}}"
          - "--batch-timeout"
          - "{{batch_timeout}}"
    monitoring:
      docker_component:
        allocated_cores: 1
  backend-service:
    deployment:
      docker:
        image: {{df_engine_image}}
        network: testbed
        ports:
          - "8087:8080"
        volumes:
          - '{{data_dir}}/backend-config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8087/api/v1/telemetry/metrics?format=prometheus&reset=false

{%- set signal = variables.signal | default("logs") %}
{%- if signal == "logs" %}
{%- set log_weight = 100 %}{%- set metric_weight = 0 %}{%- set trace_weight = 0 %}
{%- elif signal == "metrics" %}
{%- set log_weight = 0 %}{%- set metric_weight = 100 %}{%- set trace_weight = 0 %}
{%- elif signal == "traces" %}
{%- set log_weight = 0 %}{%- set metric_weight = 0 %}{%- set trace_weight = 100 %}
{%- endif %}

{# Spread every suite-defined variable as a flat key (so step/leaf templates can
reference them by bare name) and forward the whole `variables` dict so any
downstream template can also use namespaced access (`variables.X`). Per-test
overrides below the spread win on key collision. #}
{% macro forward_variables() -%}
{%- for k, v in variables.items() %}
        {{ k }}: {{ v | tojson }}
{%- endfor %}
        variables: {{ variables | tojson }}
{%- endmacro -%}

tests:
  - name: 100k
    from_template:
      path: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/steps/rotel.yaml
      variables:{{ forward_variables() }}
        data_dir: {{data_dir}}
        test_dir: {{data_dir}}/tests/100k
        report_name: "Rotel 100k - {{suite_name}}"
        observation_interval: {{observation_interval}}
        signals_per_second: 100000
        log_weight: {{log_weight}}
        metric_weight: {{metric_weight}}
        trace_weight: {{trace_weight}}
        backend_core_start: 1
        backend_core_end: 1
        loadgen_core_start: 2
        loadgen_core_end: 2

