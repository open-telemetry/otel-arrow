name: {{suite_name}}
components:
  load-generator:
    deployment:
      docker:
        image: {{df_engine_image}}
        network: testbed
        ports:
          - "8085:8080"
        volumes:
          - '{{data_dir}}/loadgen-config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8085/api/v1/telemetry/metrics?format=prometheus&reset=false
  go-collector:
    deployment:
      docker:
        image: {{otelcol_image}}
        network: testbed
        ports:
          - "8086:8086"
        volumes:
          - '{{data_dir}}/otelcol-config.rendered.yaml:/tmp/config.yaml:ro'
        environment:
          - GOMAXPROCS={{variables.otelcol_gomaxprocs | default(1)}}
{%- if variables.otelcol_gomemlimit is defined %}
          - GOMEMLIMIT={{variables.otelcol_gomemlimit}}
{%- endif %}
        command:
          - "--config"
          - "/tmp/config.yaml"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8086/metrics
  backend-service:
    deployment:
      docker:
        image: {{df_engine_image}}
        network: testbed
        ports:
          - "8087:8080"
        volumes:
          - '{{data_dir}}/backend-config.rendered.yaml:/home/nonroot/config.yaml:ro'
        command:
          - "--config"
          - "./config.yaml"
          - "--http-admin-bind"
          - "0.0.0.0:8080"
    monitoring:
      docker_component:
        allocated_cores: 1
      prometheus:
        endpoint: http://localhost:8087/api/v1/telemetry/metrics?format=prometheus&reset=false

{%- set signal = variables.signal | default("logs") %}
{%- if signal == "logs" %}
{%- set log_weight = 100 %}{%- set metric_weight = 0 %}{%- set trace_weight = 0 %}
{%- elif signal == "metrics" %}
{%- set log_weight = 0 %}{%- set metric_weight = 100 %}{%- set trace_weight = 0 %}
{%- elif signal == "traces" %}
{%- set log_weight = 0 %}{%- set metric_weight = 0 %}{%- set trace_weight = 100 %}
{%- endif %}

{# Spread every suite-defined variable as a flat key (so step/leaf templates can
reference them by bare name) and forward the whole `variables` dict so any
downstream template can also use namespaced access (`variables.X`). Per-test
overrides below the spread win on key collision. #}
{% macro forward_variables() -%}
{%- for k, v in variables.items() %}
        {{ k }}: {{ v | tojson }}
{%- endfor %}
        variables: {{ variables | tojson }}
{%- endmacro -%}

{# All tests run at a fixed 400k signals/sec rate with 4 loadgen cores; only
the size of the action list varies between them, controlling how many
insert/rename actions the processor is configured with. The suite supplies
the full `rename_pairs` / `insert_actions` list and each test below slices
it to length N. #}
tests:
  - name: transform-1
    from_template:
      path: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/steps/otelcol.yaml
      variables:{{ forward_variables() }}
        data_dir: {{data_dir}}
        test_dir: {{data_dir}}/tests/transform-1
        report_name: "OTel Collector transform-1 - {{suite_name}}"
        observation_interval: {{observation_interval}}
        signals_per_second: 100000
        rename_pairs: {{ (variables.rename_pairs | default([]))[:1] | tojson }}
        insert_actions: {{ (variables.insert_actions | default([]))[:1] | tojson }}
        log_weight: {{log_weight}}
        metric_weight: {{metric_weight}}
        trace_weight: {{trace_weight}}
        backend_core_start: 1
        backend_core_end: 1
        loadgen_core_start: 2
        loadgen_core_end: 5

  - name: transform-2
