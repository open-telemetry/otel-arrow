name: OTC OTAP Attr Insert Multi Transform (Logs)
slug: otc_logs_otap_none_attr_insert_multi_transform
description: OpenTelemetry Collector OTAP logs, attributes processor insert sweep over 1-4 insert actions at 240k signals/sec
orchestrator_template: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/orchestrator/otc-single-core-multi-transform.yaml

meta:
  binary: otc
  protocols: [otap]
  signals: [logs]
  compression: none

variables:
  report: ../pipeline_perf_test/test_suites/comparison_dashboard/reports/report_logs.yaml
  collector_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/otelcol/otap-attr-insert.yaml.j2
  loadgen_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/loadgen/otap.yaml.j2
  backend_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/backend/otap.yaml.j2
  protocol: otap
  signal: logs
  loadgen_max_batch_size: 1000
  data_source: synthetic
  num_log_attributes: 12
  compression_method: none
  otelcol_gomaxprocs: 1
  insert_actions:
    - {key: "processing.engine",   value: "benchmark"}
    - {key: "processing.stage",    value: "benchmark"}
    - {key: "processing.batch.id", value: "benchmark"}
    - {key: "processing.cluster",  value: "benchmark"}
