name: OTC OTLP Attr Insert Multi Batch (Logs)
slug: otc_logs_otlp_none_attr_insert_multi_batch
description: OpenTelemetry Collector OTLP logs, attributes processor inserting processing.engine=benchmark, swept across loadgen batch sizes at 400k signals/sec
orchestrator_template: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/orchestrator/otc-single-core-multi-batch-size.yaml

meta:
  binary: otc
  protocols: [otlp]
  signals: [logs]
  compression: none

variables:
  report: ../pipeline_perf_test/test_suites/comparison_dashboard/reports/report_logs.yaml
  collector_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/otelcol/otlp-attr-insert.yaml.j2
  loadgen_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/loadgen/otlp.yaml.j2
  backend_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/backend/otlp.yaml.j2
  protocol: otlp
  signal: logs
  compression_method: none
  otelcol_gomaxprocs: 1
  insert_actions:
    - {key: "processing.engine", value: "benchmark"}
