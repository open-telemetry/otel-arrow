name: OTC OTAP Baseline w/ Zstd (Metrics)
slug: otc_metrics_otap_zstd_baseline
description: OpenTelemetry Collector baseline for OTAP metrics with zstd compression
orchestrator_template: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/orchestrator/otc-single-core-multi-rate.yaml

meta:
  binary: otc
  protocols: [otap]
  signals: [metrics]
  compression: zstd

variables:
  report: ../pipeline_perf_test/test_suites/comparison_dashboard/reports/report_metrics.yaml
  collector_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/otelcol/otap-otap.yaml.j2
  loadgen_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/loadgen/otap.yaml.j2
  backend_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/backend/otap.yaml.j2
  protocol: otap
  signal: metrics
  loadgen_max_batch_size: 1000
  compression_method: zstd
  otelcol_gomaxprocs: 1
