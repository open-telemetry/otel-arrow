name: OTC OTAP Transform Rename Multi Transform (Logs)
slug: otc_logs_otap_none_transform_rename_multi_transform
description: OpenTelemetry Collector OTAP logs, transform processor (OTTL) rename sweep over 1-4 rename actions at 240k signals/sec
orchestrator_template: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/orchestrator/otc-single-core-multi-transform.yaml

meta:
  binary: otc
  protocols: [otap]
  signals: [logs]
  compression: none

variables:
  report: ../pipeline_perf_test/test_suites/comparison_dashboard/reports/report_logs.yaml
  collector_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/otelcol/otap-transform-rename.yaml.j2
  loadgen_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/loadgen/otap.yaml.j2
  backend_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/backend/otap.yaml.j2
  protocol: otap
  signal: logs
  loadgen_max_batch_size: 1000
  data_source: synthetic
  num_log_attributes: 12
  compression_method: none
  otelcol_gomaxprocs: 1
  rename_pairs:
    - {source: "exception.type",       destination: "exception.kind"}
    - {source: "exception.message",    destination: "exception.msg"}
    - {source: "exception.stacktrace", destination: "exception.trace"}
    - {source: "user.id",              destination: "end_user.id"}
