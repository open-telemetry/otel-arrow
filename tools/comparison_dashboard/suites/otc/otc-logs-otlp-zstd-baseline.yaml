name: OTC OTLP Baseline w/ Zstd (Logs)
slug: otc_logs_otlp_zstd_baseline
description: OpenTelemetry Collector baseline for OTLP logs with zstd compression
orchestrator_template: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/orchestrator/otc-single-core-multi-rate.yaml

meta:
  binary: otc
  protocols: [otlp]
  signals: [logs]
  compression: zstd

variables:
  report: ../pipeline_perf_test/test_suites/comparison_dashboard/reports/report_logs.yaml
  collector_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/otelcol/otlp-otlp.yaml.j2
