name: DFE OTLP Transform Rename Multi Transform (Logs)
slug: dfe_logs_otlp_none_transform_rename_multi_transform
description: Dataflow Engine OTLP logs, transform processor (OPL) rename sweep over 1-4 rename actions at 400k signals/sec
orchestrator_template: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/orchestrator/dfe-single-core-multi-transform.yaml

meta:
  binary: dfe
  protocols: [otlp]
  signals: [logs]
  compression: none

variables:
  report: ../pipeline_perf_test/test_suites/comparison_dashboard/reports/report_logs.yaml
  engine_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/engine/otlp-transform-rename.yaml.j2
  loadgen_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/loadgen/otlp.yaml.j2
  backend_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/backend/otlp.yaml.j2
  protocol: otlp
  signal: logs
  loadgen_max_batch_size: 1000
  data_source: synthetic
  num_log_attributes: 12
  compression_method: none
  wait_for_result: true
  rename_pairs:
    - {source: "exception.type",       destination: "exception.kind"}
    - {source: "exception.message",    destination: "exception.msg"}
    - {source: "exception.stacktrace", destination: "exception.trace"}
    - {source: "user.id",              destination: "end_user.id"}
