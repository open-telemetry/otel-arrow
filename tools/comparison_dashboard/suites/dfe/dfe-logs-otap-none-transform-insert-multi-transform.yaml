name: DFE OTAP Transform Insert Multi Transform (Logs)
slug: dfe_logs_otap_none_transform_insert_multi_transform
description: Dataflow Engine OTAP logs, transform processor (OPL) insert sweep over 1-4 insert actions at 200k signals/sec
orchestrator_template: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/orchestrator/dfe-single-core-multi-transform.yaml

meta:
  binary: dfe
  protocols: [otap]
  signals: [logs]
  compression: none

variables:
  report: ../pipeline_perf_test/test_suites/comparison_dashboard/reports/report_logs.yaml
  engine_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/engine/otap-transform-insert.yaml.j2
  loadgen_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/loadgen/otap.yaml.j2
  backend_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/backend/otap.yaml.j2
  protocol: otap
  signal: logs
  loadgen_max_batch_size: 1000
  data_source: synthetic
  num_log_attributes: 12
  compression_method: none
  wait_for_result: true
  insert_actions:
    - {key: "processing.engine",   value: "benchmark"}
    - {key: "processing.stage",    value: "benchmark"}
    - {key: "processing.batch.id", value: "benchmark"}
    - {key: "processing.cluster",  value: "benchmark"}
