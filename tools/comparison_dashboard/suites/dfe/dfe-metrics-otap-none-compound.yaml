name: DFE OTAP Metrics compound (lowbatch + manyproc)
slug: dfe_metrics_otap_none_compound
description: OTAP metrics passthrough, no compression, small batch + 8 no-op processors + large channels (max moves/copies)
orchestrator_template: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/orchestrator/dfe-single-core-multi-rate.yaml

meta:
  binary: dfe
  protocols: [otap]
  signals: [metrics]
  compression: none

variables:
  report: ../pipeline_perf_test/test_suites/comparison_dashboard/reports/report_metrics.yaml
  engine_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/engine/otap-otap-manyproc.yaml.j2
  loadgen_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/loadgen/otap.yaml.j2
  backend_config: ../pipeline_perf_test/test_suites/comparison_dashboard/templates/backend/otap.yaml.j2
  protocol: otap
  signal: metrics
  loadgen_max_batch_size: 64
  compression_method: none
  num_processors: 8
  pdata_channel_size: 2000
  wait_for_result: true
