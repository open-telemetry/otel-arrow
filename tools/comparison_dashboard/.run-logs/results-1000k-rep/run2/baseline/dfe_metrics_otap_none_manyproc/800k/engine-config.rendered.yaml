version: otel_dataflow/v1
policies:
  channel_capacity:
    control:
      node: 100
      pipeline: 100
    pdata: 2000
  resources:
    core_allocation:
      type: core_set
      set:
        - start: 0
          end: 0
engine:
  telemetry:
    logs:
      level: info
groups:
  default:
    pipelines:
      main:
        nodes:
          receiver:
            type: urn:otel:receiver:otap
            config:
              listening_addr: 0.0.0.0:4317
              response_stream_channel_size: 100
              max_concurrent_requests_per_stream: 64
              wait_for_result: true
              compression_method: null
          proc0:
            type: urn:otel:processor:delay
            config:
              delay: 0s
          proc1:
            type: urn:otel:processor:delay
            config:
              delay: 0s
          proc2:
            type: urn:otel:processor:delay
            config:
              delay: 0s
          proc3:
            type: urn:otel:processor:delay
            config:
              delay: 0s
          proc4:
            type: urn:otel:processor:delay
            config:
              delay: 0s
          proc5:
            type: urn:otel:processor:delay
            config:
              delay: 0s
          proc6:
            type: urn:otel:processor:delay
            config:
              delay: 0s
          proc7:
            type: urn:otel:processor:delay
            config:
              delay: 0s
          exporter:
            type: urn:otel:exporter:otap
            config:
              grpc_endpoint: http://backend-service:1235
              compression_method: none
              arrow:
                payload_compression: none
        connections:
          - from: receiver
            to: proc0
          - from: proc0
            to: proc1
          - from: proc1
            to: proc2
          - from: proc2
            to: proc3
          - from: proc3
            to: proc4
          - from: proc4
            to: proc5
          - from: proc5
            to: proc6
          - from: proc6
            to: proc7
          - from: proc7
            to: exporter