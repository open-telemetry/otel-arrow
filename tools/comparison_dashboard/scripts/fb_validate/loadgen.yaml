version: otel_dataflow/v1
policies:
  channel_capacity:
    control:
      pipeline: 100
      node: 100
    pdata: 100
  resources:
    core_allocation:
      type: core_set
      set:
        - start: 0
          end: 0

engine: {}

groups:
  default:
    pipelines:
      main:
        nodes:
          receiver:
            type: "urn:otel:receiver:traffic_generator"
            config:
              data_source: semantic_conventions
              generation_strategy: pre_generated
              traffic_config:
                production_mode: smooth
                max_batch_size: 100
                signals_per_second: 2000
                metric_weight: 0
                trace_weight: 0
                log_weight: 100

          exporter:
            type: "urn:otel:exporter:otlp_grpc"
            config:
              grpc_endpoint: "http://fbval-fluent-bit:4317"
              compression_method: null
              max_in_flight: 256

        connections:
          - from: receiver
            to: exporter

