slug: logs_attr_processor_rename_multi_transform
name: Attribute Rename Multi Transform (Logs)
description: >
  Cost of running 1, 2, 3, or 4 rename actions on logs, comparing the
  attributes processor vs the transform processor (OPL/OTTL) across the
  Dataflow Engine (OTAP and OTLP) and the OpenTelemetry Collector (OTLP)
  at a fixed 240k logs/sec generated load.

chart:
  axes:
    x:
      title: Number of Rename Actions
      description: Number of rename actions configured on the processor. All tests run at a fixed 240k logs/sec generated load.

tests:
  - name: transform-1
    label: "1"
    loadgen_rate: 240000
  - name: transform-2
    label: "2"
    loadgen_rate: 240000
  - name: transform-3
    label: "3"
    loadgen_rate: 240000
  - name: transform-4
    label: "4"
    loadgen_rate: 240000

