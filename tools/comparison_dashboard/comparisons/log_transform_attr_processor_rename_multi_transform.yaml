slug: log_transform_attr_processor_rename_multi_transform
name: Log Attribute Rename (Multi Transform)
description: >
  Renaming 1-4 attributes on logs across engines and transports at a fixed
  200k logs/sec generated load.

chart:
  axes:
    x:
      title: Number of Rename Actions
      description: Number of rename actions configured on the processor. All tests run at a fixed 200k logs/sec generated load.

tests:
  - name: transform-1
    label: "1"
    loadgen_rate: 200000
    description: 1 rename action @ 200k logs/sec
  - name: transform-2
    label: "2"
    loadgen_rate: 200000
    description: 2 rename actions @ 200k logs/sec
  - name: transform-3
    label: "3"
    loadgen_rate: 200000
    description: 3 rename actions @ 200k logs/sec
  - name: transform-4
    label: "4"
    loadgen_rate: 200000
    description: 4 rename actions @ 200k logs/sec

