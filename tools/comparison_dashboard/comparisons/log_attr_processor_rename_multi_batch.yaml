slug: log_attr_processor_rename_multi_batch
name: Log Attribute Rename (Multi Batch)
description: >
  Renaming the semantic-convention attribute exception.type to exception.kind
  on logs. Comparing the attributes processor across engines and transports
  with varying loadgen batch sizes at a fixed 400k logs/sec generated load.

chart:
  axes:
    x:
      title: Loadgen Batch Size (logs/batch)
      description: Batch size emitted by the load generator. All tests run at a fixed 400k logs/sec generated load.

tests:
  - name: batch-256
    label: "256"
    loadgen_rate: 400000
  - name: batch-512
    label: "512"
    loadgen_rate: 400000
  - name: batch-1024
    label: "1024"
    loadgen_rate: 400000
  - name: batch-2048
    label: "2048"
    loadgen_rate: 400000
  - name: batch-4096
    label: "4096"
    loadgen_rate: 400000

suites:
  # DFE OTAP
  - name: DFE OTAP Attr Rename
    slug: dfe_logs_otap_none_attr_rename_multi_batch
    short: DFE OTAP/Attr

  # DFE OTLP
  - name: DFE OTLP Attr Rename
    slug: dfe_logs_otlp_none_attr_rename_multi_batch
    short: DFE OTLP/Attr

  # OTC OTLP
  - name: OTC OTLP Attr Rename
    slug: otc_logs_otlp_none_attr_rename_multi_batch
    short: OTC OTLP/Attr
