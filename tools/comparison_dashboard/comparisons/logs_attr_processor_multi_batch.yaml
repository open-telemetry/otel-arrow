slug: logs_attr_processor_multi_batch
name: Attribute Processor Multi Batch Size (Logs)
description: >
  Attribute processor insert and rename workloads on logs across the Dataflow
  Engine (OTAP and OTLP) and the OpenTelemetry Collector (OTLP), swept across
  loadgen batch sizes (256, 512, 1024, 2048, 4096) at a fixed 400k logs/sec
  generated load.

chart:
  axes:
    x:
      title: Loadgen Batch Size (logs/batch)
      description: Maximum batch size emitted by the load generator. All tests run at a fixed 400k logs/sec generated load.

tests:
  - name: batch-256
    label: "256"
    loadgen_rate: 400000
  - name: batch-512
    label: "512"
    loadgen_rate: 400000
  - name: batch-1024
    label: "1024"
    loadgen_rate: 400000
  - name: batch-2048
    label: "2048"
    loadgen_rate: 400000
  - name: batch-4096
    label: "4096"
    loadgen_rate: 400000

suites:
  # DFE
  - name: DFE OTAP Attr Insert Multi Batch (Logs)
    slug: dfe_logs_otap_none_attr_insert_multi_batch
    short: DFE/OTAP/Insert
  - name: DFE OTAP Attr Rename Multi Batch (Logs)
    slug: dfe_logs_otap_none_attr_rename_multi_batch
    short: DFE/OTAP/Rename
  - name: DFE OTLP Attr Insert Multi Batch (Logs)
    slug: dfe_logs_otlp_none_attr_insert_multi_batch
    short: DFE/OTLP/Insert
  - name: DFE OTLP Attr Rename Multi Batch (Logs)
    slug: dfe_logs_otlp_none_attr_rename_multi_batch
    short: DFE/OTLP/Rename

  # OTC
  - name: OTC OTLP Attr Insert Multi Batch (Logs)
    slug: otc_logs_otlp_none_attr_insert_multi_batch
    short: OTC/OTLP/Insert
  - name: OTC OTLP Attr Rename Multi Batch (Logs)
    slug: otc_logs_otlp_none_attr_rename_multi_batch
    short: OTC/OTLP/Rename
