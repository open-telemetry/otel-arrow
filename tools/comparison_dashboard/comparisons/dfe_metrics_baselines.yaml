slug: dfe_metrics_baselines
name: Dataflow Engine Metrics
description: Baseline DFE metrics runs across OTAP, OTLP, and OTLP/HTTP with none, gzip, and zstd compression.

chart:
  metrics:
    default: cpu_percentage_normalized_avg

tests:
  - name: 100k
    loadgen_rate: 100000
  - name: 200k
    loadgen_rate: 200000
  - name: 300k
    loadgen_rate: 300000
  - name: 400k
    loadgen_rate: 400000
  - name: 600k
    loadgen_rate: 600000
  - name: 800k
    loadgen_rate: 800000
  - name: 1000k
    loadgen_rate: 1000000
    label: 1M

suites:
  # OTAP
  - name: DFE Metrics OTAP Baseline (None)
    slug: dfe_metrics_otap_none_baseline
    short: OTAP/None
  - name: DFE Metrics OTAP Baseline (Gzip)
    slug: dfe_metrics_otap_gzip_baseline
    short: OTAP/Gzip
  - name: DFE Metrics OTAP Baseline (Zstd)
    slug: dfe_metrics_otap_zstd_baseline
    short: OTAP/Zstd

  # OTLP
  - name: DFE Metrics OTLP Baseline (None)
    slug: dfe_metrics_otlp_none_baseline
    short: OTLP/None
  - name: DFE Metrics OTLP Baseline (Gzip)
    slug: dfe_metrics_otlp_gzip_baseline
    short: OTLP/Gzip
  - name: DFE Metrics OTLP Baseline (Zstd)
    slug: dfe_metrics_otlp_zstd_baseline
    short: OTLP/Zstd

  # OTLP/HTTP
  - name: DFE Metrics OTLP/HTTP Baseline (None)
    slug: dfe_metrics_otlphttp_none_baseline
    short: OTLP-HTTP/None
  - name: DFE Metrics OTLP/HTTP Baseline (Gzip)
    slug: dfe_metrics_otlphttp_gzip_baseline
    short: OTLP-HTTP/Gzip
  - name: DFE Metrics OTLP/HTTP Baseline (Zstd)
    slug: dfe_metrics_otlphttp_zstd_baseline
    short: OTLP-HTTP/Zstd
