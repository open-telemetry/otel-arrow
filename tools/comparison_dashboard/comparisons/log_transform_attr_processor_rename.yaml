slug: log_transform_attr_processor_rename
name: Attribute Rename (DFE vs OTC)
description: >
  Renaming the semantic-convention attribute exception.type to exception.kind
  on logs. Comparing the attributes processor vs the transform processor (OPL)
  on the Dataflow Engine (OTAP and OTLP) and on the OpenTelemetry Collector
  (OTLP).

chart:
  axes:
    x:
      title: Generated Load (logs/sec)
      description: Rate at which the load generator is configured to produce logs e.g. "100k" == "100,000 logs/sec".

tests:
  - name: 100k
    loadgen_rate: 100000
  - name: 200k
    loadgen_rate: 200000
  - name: 300k
    loadgen_rate: 300000
  - name: 400k
    loadgen_rate: 400000
  - name: 600k
    loadgen_rate: 600000
  - name: 800k
    loadgen_rate: 800000
  - name: 1000k
    loadgen_rate: 1000000
    label: 1M

