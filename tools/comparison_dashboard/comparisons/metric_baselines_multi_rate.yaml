slug: metric_baselines_multi_rate
name: Metric Baselines
description: Baseline metric runs across engines over OTAP, OTLP, and OTLP/HTTP with none, gzip, and zstd compression.

chart:
  axes:
    x:
      title: Generated Load (datapoints/sec)
      description: Rate at which the load generator is configured to submit metric datapoints e.g. "100k" == "100,000 datapoints/sec".

tests:
  - name: 100k
    loadgen_rate: 100000
  - name: 200k
    loadgen_rate: 200000
  - name: 300k
    loadgen_rate: 300000
  - name: 400k
    loadgen_rate: 400000
  - name: 600k
    loadgen_rate: 600000
  - name: 800k
    loadgen_rate: 800000
  - name: 1000k
    loadgen_rate: 1000000
    label: 1M

