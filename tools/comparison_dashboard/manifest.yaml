# Comparison dashboard manifest.
#
# Single source of truth for what the dashboard knows about. All paths are
# resolved relative to this file's directory.
#
# Consumed by dashboard.py:
#   - `dashboard.py validate` (manifest checks only)
#   - `dashboard.py build`    (builds the static site)
#   - `dashboard.py run`      (resolves which suites are runnable)
#   - `dashboard.py serve`    (serves a built site directory)

# Variables passed straight through to Jinja template rendering at the top
# level. The scripts have no special knowledge of these keys -- add them as
# orchestrator templates require.
variables:
  df_engine_image: df_engine:latest
  otelcol_image: otel/opentelemetry-collector-contrib:latest
  fluent_bit_image: fluent/fluent-bit:5.0

# Allowed values for every meta key a suite may declare. Validation rejects
# any meta key not listed here, and any value (or list element) outside the
# allowed set. Each entry is an object with `value` (the token used in suite
# YAMLs and filter UI) and `description` (long-form text shown as the
# tooltip when hovering the filter chip in the dashboard).
meta:
  binary:
    - { value: dfe, description: "Dataflow Engine - the OTAP-native pipeline engine developed as a part of OTel Arrow." }
    - { value: otc, description: "OpenTelemetry Collector (contrib distribution)." }
    - { value: fbit, description: "Fluent Bit - A lightweight telemetry agent engine under the fluentd project umbrella." }
  protocols:
    - { value: otap, description: "OpenTelemetry Arrow Protocol - columnar gRPC transport using Apache Arrow record batches." }
    - { value: otlp, description: "OpenTelemetry Protocol over gRPC (row-oriented protobuf)." }
    - { value: otlphttp, description: "OpenTelemetry Protocol over HTTP/protobuf." }
  signals:
    - { value: logs, description: "OpenTelemetry Logs signal." }
    - { value: metrics, description: "OpenTelemetry Metrics signal." }
    - { value: traces, description: "OpenTelemetry Traces signal." }
  compression:
    - { value: none, description: "No payload compression on the wire." }
    - { value: gzip, description: "gzip payload compression." }
    - { value: zstd, description: "zstd payload compression." }

# Glossary entries shown in the pinned legend banner on every page. These are
# independent from `meta` so the legend can cover terms that aren't filter
# values (e.g. Backpressure). Order is preserved in the rendered banner.
glossary:
  - term: DFE
    definition: Dataflow Engine - the OTAP-native Rust pipeline being benchmarked in this repo.
  - term: OTC
    definition: OpenTelemetry Collector (contrib distribution) - the reference Go implementation.
  - term: FBIT
    definition: Fluent Bit - An observability pipeline engine in the fluentd family.
  - term: OTAP
    definition: OpenTelemetry Arrow Protocol - columnar gRPC transport using Apache Arrow record batches.
  - term: OTLP
    definition: OpenTelemetry Protocol - the standard row-oriented gRPC/HTTP protobuf protocol.
  - term: OTLP HTTP
    definition: OpenTelemetry Protocol over pure HTTP.

# Display registry for dashboard metrics. Names must match the `name` field on
# per-test metric records in published suite data; units come from those
# records (manifest declares label only).
metrics:
  - name: cpu_percentage_normalized_avg
    label: CPU Average
  - name: cpu_percentage_normalized_max
    label: CPU Max
  - name: ram_mib_avg
    label: Memory Average
  - name: ram_mib_max
    label: Memory Max
  - name: network_tx_bytes_rate_avg
    label: Network TX Rate
  - name: network_rx_bytes_rate_avg
    label: Network RX Rate
  - name: dropped_logs_percentage
    label: Dropped Logs
  - name: logs_delivery_deviation_percentage
    label: Logs Delivery Deviation
  - name: logs_produced_rate
    label: Offered Load Rate
  - name: loadgen_logs_sent_rate
    label: Loadgen Sent Rate
  - name: logs_received_rate
    label: Collector Received Rate
  - name: collector_logs_sent_rate
    label: Collector Sent Rate
  - name: backend_logs_received_rate
    label: Backend Received Rate
  - name: uncompressed_bytes_per_log
    label: Uncompressed Bytes Per Log
  - name: egress_bytes_per_log
    label: Egress Bytes Per Log
  - name: test_duration
    label: Test Duration

